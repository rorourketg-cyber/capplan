<body>
<div id="masthead">
  <div class="logo"><div class="logo-icon"><svg viewBox="0 0 18 18" width="18" height="18" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,10 7,14 15,4"/></svg></div><div class="logo-text">Cap<span>Plan</span></div></div>
  <div class="module-name">Maximum Purchase Price</div>
  <div style="position:relative"><button style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:5px;padding:6px 12px;color:white;font-size:12px;font-weight:600" id="cur-btn" onclick="toggleCur()"><span id="cur-label">$ USD</span> ▾</button><div id="cur-dropdown" style="display:none;position:absolute;right:0;top:110%;background:white;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(15,29,46,.16);min-width:200px;z-index:300;overflow:hidden"></div></div>
</div>
<div id="model-banner">What is the maximum we should pay for this asset?</div>
<div id="stepper">
  <div class="step active" id="step1"><div class="step-num" id="sn1">1</div><div class="step-label">Asset Details</div></div>
  <div class="step-sep">›</div>
  <div class="step" id="step2"><div class="step-num" id="sn2">2</div><div class="step-label">Results</div></div>
</div>
<div id="main-content"></div>
<script>
var CURRENCIES=[{code:"USD",symbol:"$",label:"US Dollar"},{code:"EUR",symbol:"€",label:"Euro"},{code:"JPY",symbol:"¥",label:"Japanese Yen"},{code:"GBP",symbol:"£",label:"British Pound"},{code:"INR",symbol:"₹",label:"Indian Rupee"},{code:"CHF",symbol:"CHF",label:"Swiss Franc"},{code:"CAD",symbol:"CA$",label:"Canadian Dollar"},{code:"AUD",symbol:"AU$",label:"Australian Dollar"},{code:"NZD",symbol:"NZ$",label:"New Zealand Dollar"}];
function getSym(){var c=CURRENCIES.find(function(c){return c.code===S.currency});return c?c.symbol:"$"}

var S={
  page:1,currency:"USD",cur_open:false,  coc_open:false,coc_mode:"wacc",coc_kd:6,coc_ke:12,coc_wd:40,coc_rf:4.5,coc_beta:1.0,coc_mrp:5.5,
  res:null,show_dcf:false,show_coc_sens:false,show_ben_sens:false,missingFields:null,
  bw_open:false,bw_type:"cost_saving",bw_current:"",bw_improvement:"",
  benefits:"",life:"",svPct:"",method:"Double-declining",hyr:true,ddbRate:"",
  taxRate:"",coc:""
};

function toggleCur(){S.cur_open=!S.cur_open;var dd=document.getElementById("cur-dropdown");dd.style.display=S.cur_open?"block":"none";if(S.cur_open){dd.innerHTML="";CURRENCIES.forEach(function(c){var b=document.createElement("button");b.style.cssText="display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;background:"+(c.code===S.currency?"var(--blue-soft)":"transparent")+";border:none;border-bottom:1px solid var(--border);cursor:pointer";b.innerHTML='<span style="font-family:monospace;font-size:13px;font-weight:700;color:var(--blue);width:36px">'+c.symbol+'</span><span>'+c.label+'</span>';b.onclick=function(){S.currency=c.code;S.cur_open=false;render()};dd.appendChild(b);});}}

// ── CALC — Analytical solver ──────────────────────────────────────────────────
// NPV = -P + pvBen + P*pvTSfactor(method,hyr,rate,life,r,tax) + P*svPct*(1-tax)/(1+r)^life = 0
// P = pvBen / (1 - pvTSfactor*tax - svPct*(1-tax)/(1+r)^life)

function calcDeprFactors(life,method,hyr,ddbRate){
  // Returns depr per $1 of purchase price for each year
  var d=[];
  if(method==="Double-declining"){var rate=ddbRate/100;d.push(rate*(hyr?0.5:1));for(var y=2;y<=life;y++)d.push((1-d.reduce(function(s,v){return s+v},0))*rate);}
  else if(method==="Straight-line"){var y1=1/life*(hyr?0.5:1);d.push(y1);for(var y=2;y<=life;y++)d.push(hyr?(1-y1)/(life-1):1/life);}
  return d;
}

function calcMaxPrice(benefits,life,svPct,method,hyr,ddbRate,taxRate,coc){
  var tx=taxRate/100, r=coc/100;
  var pvBen=benefits*(1-tx)*((1-Math.pow(1+r,-life))/r);
  var pvTSfactor=0;
  {
    var df=calcDeprFactors(life,method,hyr,ddbRate);
    pvTSfactor=df.reduce(function(s,d,i){return s+d*tx/Math.pow(1+r,i+1)},0);
  }
  var pvSalvFactor=(svPct/100)*(1-tx)/Math.pow(1+r,life);
  var denom=1-pvTSfactor-pvSalvFactor;
  var maxPrice=denom>0?pvBen/denom:0;

  // CoC sensitivity
  var cocSens=[-6,-4,-2,-1,0,1,2,4,6].map(function(delta){
    var r2=(coc+delta)/100;if(r2<=0)return{coc:coc+delta,price:0};
    var pvB2=benefits*(1-tx)*((1-Math.pow(1+r2,-life))/r2);
    var pvTS2=0;
    var df2=calcDeprFactors(life,method,hyr,ddbRate);pvTS2=df2.reduce(function(s,d,i){return s+d*tx/Math.pow(1+r2,i+1)},0);
    var pvS2=(svPct/100)*(1-tx)/Math.pow(1+r2,life);
    var d2=1-pvTS2-pvS2;
    return{coc:coc+delta,price:d2>0?pvB2/d2:0};
  });

  // Benefits sensitivity (±40% in 10% steps)
  var benSens=[-0.40,-0.30,-0.20,-0.10,0,0.10,0.20,0.30,0.40].map(function(delta){
    var b2=benefits*(1+delta);
    var pvB2=b2*(1-tx)*((1-Math.pow(1+r,-life))/r);
    var d2=1-pvTSfactor-pvSalvFactor;
    return{benefits:b2,price:d2>0?pvB2/d2:0,delta:delta*100};
  });

  // Negotiation range: max price at required return vs at 0%
  var pvBen0=benefits*(1-tx)*life; // at r=0
  var ceiling0=denom>0?pvBen0/(1-pvSalvFactor):0;

  return{maxPrice:maxPrice,pvBen:pvBen,pvTSfactor:pvTSfactor,pvSalvFactor:pvSalvFactor,
    cocSens:cocSens,benSens:benSens,negotiationCeiling:ceiling0,denom:denom};
}

function calcAll(){
  return calcMaxPrice(+S.benefits||0,+S.life||1,+S.svPct||0,S.method,S.hyr,+S.ddbRate,+S.taxRate||0,+S.coc||0);
}

function fmt(n,d){if(n==null||isNaN(n))return"--";d=d||0;return n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d})}
function fmtM(n){if(n==null||isNaN(n))return"--";var s=getSym();return n<0?"-"+s+fmt(Math.abs(n)):s+fmt(n)}

function updateStepper(){for(var i=1;i<=2;i++){var step=document.getElementById("step"+i),sn=document.getElementById("sn"+i);step.className="step";if(i<S.page){step.classList.add("done");sn.textContent="✓"}else if(i===S.page){step.classList.add("active");sn.textContent=String(i)}else sn.textContent=String(i);var n=i;(function(n,step){step.onclick=function(){if(n<S.page||(n===2&&S.res)){S.page=n;render()}}})(n,step);step.style.cursor=(i<S.page||(i===2&&S.res))?"pointer":"default";}}

var NOTES_BUS=[
  {q:"How do I estimate annual benefits?",a:"The annual after-tax value the asset will generate — cost savings, revenue, or efficiency gains. Be conservative and use an average where benefits vary year to year."},
  {q:"How is salvage value handled?",a:"Entered as a percentage of whatever you pay. Both salvage and depreciation tax shields scale with the unknown price, allowing the model to solve for the maximum price analytically."}
];
var NOTES_CON=[
  {q:"How do I use this result when bidding?",a:"This is your price ceiling. Any price below it earns more than your target return; any price above earns less. Use it as your walk-away limit in negotiations."},
  {q:"What is the negotiation range?",a:"The gap between the asking price and your maximum. If the asking price exceeds your maximum, either negotiate it down, accept a lower return, or walk away."}
];

function makeBNList(notes,id){var list=document.getElementById(id);if(!list)return;list.innerHTML="";notes.forEach(function(n,i){var item=document.createElement("div");item.className="bn-item";var head=document.createElement("div");head.className="bn-head";head.innerHTML='<div class="bn-qmark">?</div><div class="bn-q">'+n.q+'</div><div class="bn-arr" id="arr'+id+i+'">›</div>';var body=document.createElement("div");body.className="bn-body";body.textContent=n.a;if(n.v){var vb=document.createElement("button");vb.className="watch-btn";vb.textContent="▶ Learn More";vb.onclick=function(e){e.stopPropagation();openVideo(n.v)};body.appendChild(vb)}head.onclick=function(){var open=body.classList.contains("open");body.classList.toggle("open");document.getElementById("arr"+id+i).style.transform=open?"rotate(0deg)":"rotate(90deg)";head.style.background=open?"":"var(--surface)";};item.appendChild(head);item.appendChild(body);list.appendChild(item);})}
function openVideo(url){var id=url.split(/[/?=v]/).filter(function(s){return s.length>5}).pop()||"";var ov=document.createElement("div");ov.className="modal-overlay";ov.innerHTML='<div class="modal-box"><div class="modal-head"><span style="font-size:13px;font-weight:700;color:var(--t2)">Learn More</span><button class="modal-close">×</button></div><div class="video-wrap"><iframe src="https://www.youtube.com/embed/'+id+'" allowfullscreen frameborder="0"></iframe></div></div>';ov.querySelector(".modal-close").onclick=function(){ov.remove()};ov.onclick=function(e){if(e.target===ov)ov.remove()};document.body.appendChild(ov);}

function renderCoC(){
  var box=document.getElementById("coc-box");if(!box)return;box.innerHTML="";

function validateInputs(){
  var errs=[];
  if(S.benefits!==''&&+S.benefits<=0) errs.push("Annual benefit must be greater than zero");
  if(+S.life<=0) errs.push("Asset life must be greater than zero");
  if(+S.svPct<0) errs.push("Salvage percentage cannot be negative");
  if(+S.svPct>=100) errs.push("Salvage percentage cannot equal or exceed 100%");
  if(S.method==="Double-declining"&&!(+S.ddbRate>0)) errs.push("Depreciation rate must be greater than zero for double-declining method");
  if(+S.taxRate<0||+S.taxRate>=100) errs.push("Tax rate must be between 0 and 100");
  if(+S.coc<=0) errs.push("Required return must be greater than zero");
  return errs;
}
function goToResults(){
  var missing=[];  if(!S.benefits&&S.benefits!==0)missing.push("Annual Benefits");if(!S.life)missing.push("Economic Life");
  if(!S.svPct&&S.svPct!==0)missing.push("Salvage Value %");
  if(S.method==="Double-declining"&&!S.ddbRate)missing.push("Depreciation Rate");
  if(!S.taxRate)missing.push("Tax Rate");if(!S.coc)missing.push("Required Return");
  if(missing.length>0){S.missingFields=missing;render();return;}
  S.missingFields=null;

  try{S.res=calcAll();S.page=2;render();}catch(e){alert("Error: "+e.message)}
}

function drawChart(canvasId,data,current){
  var canvas=document.getElementById(canvasId);if(!canvas)return;
  var ctx=canvas.getContext("2d"),W=canvas.width,H=canvas.height;
  var pad={top:16,bottom:48,left:80,right:16};var cw=W-pad.left-pad.right,ch=H-pad.top-pad.bottom;
  ctx.clearRect(0,0,W,H);
  var vals=data.map(function(d){return d.price});var minV=Math.min.apply(null,vals),maxV=Math.max.apply(null,vals);var rng=maxV-minV||maxV*0.2;var lo=minV-rng*0.1,hi=maxV+rng*0.15;
  ctx.strokeStyle="#E2E6EC";ctx.lineWidth=1;
  for(var i=0;i<=4;i++){var y=pad.top+ch*(1-i/4);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cw,y);ctx.stroke();ctx.fillStyle="#8A96A6";ctx.font="10px system-ui";ctx.textAlign="right";ctx.fillText(getSym()+fmt((lo+(hi-lo)*(i/4))/1000,0)+"k",pad.left-3,y+3);}
  var bw=Math.floor(cw/data.length*0.6),gap=cw/data.length,midIdx=data.findIndex(function(d){return d.coc===current});if(midIdx<0)midIdx=Math.floor(data.length/2);
  data.forEach(function(d,i){var x=pad.left+gap*i+(gap-bw)/2,bh=(d.price-lo)/(hi-lo)*ch,y=pad.top+ch-bh;ctx.fillStyle=i===midIdx?"#1B3F6E":"#93B4D8";ctx.fillRect(x,y,bw,bh);ctx.fillStyle=i===midIdx?"var(--blue)":"#8A96A6";ctx.font=i===midIdx?"bold 10px system-ui":"10px system-ui";ctx.textAlign="center";ctx.fillText(d.coc+"%",x+bw/2,H-pad.bottom+13);});
  ctx.strokeStyle="#4A5568";ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(pad.left,pad.top+ch);ctx.lineTo(pad.left+cw,pad.top+ch);ctx.stroke();ctx.fillStyle="#4A5568";ctx.font="bold 12px system-ui";ctx.textAlign="center";ctx.fillText("Required Return (%)",pad.left+cw/2,H-3);
}

  html+='</div>';

  // DCF
  html+='<div class="collapsible"><div class="coll-head" onclick="S.show_dcf=!S.show_dcf;renderPage2()"><span class="coll-title">DCF Summary</span><span class="coll-arr" style="transform:'+(S.show_dcf?'rotate(90deg)':'rotate(0deg)')+'" >›</span></div>';
  if(S.show_dcf){
    html+='<div class="coll-body open"><div style="padding:12px 18px;font-size:12px;color:var(--t2)">At the maximum price of '+fmtM(res.maxPrice)+', NPV = 0. Every dollar less generates positive NPV.</div>';
    html+='<table><tbody>';
    html+='<tr class="total-row"><td class="left" colspan="2">Inflows at Maximum Price (P)</td><td>'+fmtM(res.pvBen+res.pvTSfactor*res.maxPrice+res.pvSalvFactor*res.maxPrice)+'</td></tr>';
    html+='<tr><td class="left">PV of benefits ('+("AT ")+'annuity)</td><td class="sub">Years 1–'+S.life+'</td><td>'+fmtM(res.pvBen)+'</td></tr>';
    html+='<tr><td class="left">PV of depreciation tax shields</td><td class="sub">Years 1–'+S.life+'</td><td>'+fmtM(res.pvTSfactor*res.maxPrice)+'</td></tr>';
    html+='<tr><td class="left">PV of '+("AT ")+'salvage value ('+S.svPct+'% of P)</td><td class="sub">Year '+S.life+'</td><td>'+fmtM(res.pvSalvFactor*res.maxPrice)+'</td></tr>';
    html+='<tr class="total-row" style="border-top:2px solid var(--blue)"><td class="left" colspan="2">Maximum Purchase Price (= Total PV Inflows)</td><td style="color:var(--green);font-size:15px;font-weight:800">'+fmtM(res.maxPrice)+'</td></tr>';
    html+='</tbody></table></div>';
  }
  html+='</div>';
  html+='</main></div></div>';
  document.getElementById("main-content").innerHTML=html;
  makeBNList(NOTES_BUS,"bn-list2");
  setTimeout(function(){drawChart("price-chart",res.cocSens,+S.coc)},50);
  document.getElementById("cur-label").textContent=getSym()+" "+S.currency;
}

function printSummary(){
  var res=S.res;if(!res)return;var pd=S.show_dcf,pd2=S.show_ben_sens;S.show_dcf=true;S.show_ben_sens=true;renderPage2();
  setTimeout(function(){document.querySelectorAll('canvas').forEach(function(c){var img=document.createElement('img');img.src=c.toDataURL('image/png');img.style.cssText='width:100%;height:auto;display:block';c.parentNode.replaceChild(img,c);});window.print();S.show_dcf=pd;S.show_ben_sens=pd2;renderPage2();},300);
}

function render(){updateStepper();if(S.page===1)renderPage1();else if(S.page===2&&S.res)renderPage2();var cl=document.getElementById("cur-label");if(cl)cl.textContent=getSym()+" "+S.currency;}
render();
</script>
</body>
</html>
