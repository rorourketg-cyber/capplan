<style>

tr:nth-child(even){background:var(--surface)}

<body>
<div id="masthead">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 18 18" width="18" height="18" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,10 7,14 15,4"/></svg></div>
    <div class="logo-text">Cap<span>Plan</span></div>
  </div>
  <div class="module-name">Setting a Rental Rate with Operator</div>
  <div style="position:relative">
    <button style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:5px;padding:6px 12px;color:white;font-size:12px;font-weight:600" id="cur-btn" onclick="toggleCur()"><span id="cur-label">$ USD</span> ▾</button>
    <div id="cur-dropdown" style="display:none;position:absolute;right:0;top:110%;background:white;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(15,29,46,.16);min-width:200px;z-index:300;overflow:hidden"></div>
  </div>
</div>
<div id="model-banner">What is the minimum we should quote on this contract?</div>
<div id="stepper">
  <div class="step active" id="step1"><div class="step-num" id="sn1">1</div><div class="step-label">Asset &amp; Operator Details</div></div>
  <div class="step-sep">›</div>
  <div class="step" id="step2"><div class="step-num" id="sn2">2</div><div class="step-label">Results</div></div>
</div>
<div id="main-content"></div>
<script>
var CURRENCIES=[
  {code:"USD",symbol:"$",label:"US Dollar"},{code:"EUR",symbol:"€",label:"Euro"},
  {code:"JPY",symbol:"¥",label:"Japanese Yen"},{code:"GBP",symbol:"£",label:"British Pound"},
  {code:"INR",symbol:"₹",label:"Indian Rupee"},{code:"CHF",symbol:"CHF",label:"Swiss Franc"},
  {code:"CAD",symbol:"CA$",label:"Canadian Dollar"},{code:"AUD",symbol:"AU$",label:"Australian Dollar"},
  {code:"NZD",symbol:"NZ$",label:"New Zealand Dollar"}
];
function getSym(){var c=CURRENCIES.find(function(c){return c.code===S.currency});return c?c.symbol:"$"}

var S={
  page:1,currency:"USD",cur_open:false,
  coc_open:false,coc_mode:"wacc",coc_kd:6,coc_ke:12,coc_wd:40,
  coc_rf:4.5,coc_beta:1.0,coc_mrp:5.5,
  res:null,show_dcf:false,show_depr:false,show_markup_sens:false,show_hrs_sens:false,
  missingFields:null,hrs_open:false,op_open:false,
  hrs_wdays:250,hrs_hpday:8,hrs_util:70,
  op_wage:"",op_payroll:15,op_benefits:10,op_overhead:8,
  // inputs — blank by default
  cost:"",itcPct:"",life:"",salvage:"",
  method:"Double-declining",hyr:true,ddbRate:"",
  om1:"",omType:"Constant amount",omInc:"",yearlyOM:[],
  hours:"",operatorCost:"",markup:"",taxRate:"",coc:""
};

function toggleCur(){
  S.cur_open=!S.cur_open;
  var dd=document.getElementById("cur-dropdown");
  dd.style.display=S.cur_open?"block":"none";
  if(S.cur_open){
    dd.innerHTML="";
    CURRENCIES.forEach(function(c){
      var b=document.createElement("button");
      b.style.cssText="display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;background:"+(c.code===S.currency?"var(--blue-soft)":"transparent")+";border:none;border-bottom:1px solid var(--border);cursor:pointer";
      b.innerHTML='<span style="font-family:monospace;font-size:13px;font-weight:700;color:var(--blue);width:36px">'+c.symbol+'</span><span>'+c.label+'</span>';
      b.onclick=function(){S.currency=c.code;S.cur_open=false;render()};
      dd.appendChild(b);
    });
  }
}

// ── CALC ──────────────────────────────────────────────────────────────────────
function calcDepr(cost,itcPct,life,method,hyr,ddbRate){
  var base=cost-cost*itcPct/100,d=[];
  if(method==="Double-declining"){
    var rate=ddbRate/100;d.push(base*rate*(hyr?0.5:1));
    for(var y=2;y<=life;y++)d.push((base-d.reduce(function(s,v){return s+v},0))*rate);
  }else if(method==="Straight-line"){
    var y1=base/life*(hyr?0.5:1);d.push(y1);
    for(var y=2;y<=life;y++)d.push(hyr?(base-y1)/(life-1):base/life);
  }else{
    var y1=hyr?base/(life+1):2*base/(life+1);d.push(y1);
    if(hyr)for(var y=2;y<=life;y++)d.push(2*base*(life-y+1)/((life+1)*(life-1)));
    else    for(var y=2;y<=life;y++)d.push(base*(life-y+1)*2/(life*(life+1)));
  }
  return d;
}

function buildOM(life){
  var om=[];
  for(var i=0;i<life;i++){
    if(S.omType==="Variable amount"){om.push(+(S.yearlyOM[i]||0));}
    else if(i===0){om.push(+S.om1||0);}
    else if(S.omType==="Constant amount"){om.push(om[i-1]+(+S.omInc||0));}
    else{om.push(om[i-1]*(1+(+S.omInc||0)/100));}
  }
  return om;
}

function calcCapRate(cost,itcPct,life,method,hyr,ddbRate,om,hours,taxRate,coc,salvage){
  var tx=taxRate/100,r=coc/100;
  var itc=cost*itcPct/100;
  var depr=calcDepr(cost,itcPct,life,method,hyr,ddbRate);
  var pvITC=itc/(1+r);
  var pvTS=depr.reduce(function(s,d,i){return s+d*tx/Math.pow(1+r,i+1)},0);
  var pvSalv=salvage/Math.pow(1+r,life);
  var pvLoss=salvage*tx/Math.pow(1+r,life);
  var pvOM=om.reduce(function(s,v,i){return s+v*(1-tx)/Math.pow(1+r,i+1)},0);
  var n60=cost-pvITC-pvTS-pvSalv+pvLoss+pvOM;
  var af=r>0?(1-Math.pow(1+r,-life))/r:life;
  return{capRate:hours>0?n60/((1-tx)*hours*af):0,n60:n60,af:af,
         pvITC:pvITC,pvTS:pvTS,pvSalv:pvSalv,pvLoss:pvLoss,pvOM:pvOM,depr:depr};
}

function calcAll(){
  var cost=+S.cost,itcPct=+S.itcPct,life=+S.life||1,salvage=+S.salvage;
  var ddbRate=+S.ddbRate,tx=+S.taxRate/100,r=+S.coc/100,hours=+S.hours;
  var opCost=+S.operatorCost,markup=+S.markup;
  var om=buildOM(life);
  var cap=calcCapRate(cost,itcPct,life,S.method,S.hyr,ddbRate,om,hours,+S.taxRate,+S.coc,salvage);
  var opRate=opCost*(1+markup/100);
  var totalRate=cap.capRate+opRate;

  // CoC sensitivity
  var cocSens=[-4,-3,-2,-1,0,1,2,3,4].map(function(delta){
    var rc=(+S.coc+delta)/100;if(rc<=0)return{label:(+S.coc+delta)+"%",rate:0};
    var c2=calcCapRate(cost,itcPct,life,S.method,S.hyr,ddbRate,om,hours,+S.taxRate,rc*100,salvage);
    return{label:(+S.coc+delta)+"%",rate:c2.capRate+opRate};
  });

  // Markup sensitivity
  var markupSens=[0,25,50,75,100,125,150,175,200,250,300].map(function(mu){
    return{markup:mu,opRate:opCost*(1+mu/100),total:cap.capRate+opCost*(1+mu/100)};
  });

  return{totalRate:totalRate,capRate:cap.capRate,opRate:opRate,
    n60:cap.n60,af:cap.af,pvITC:cap.pvITC,pvTS:cap.pvTS,
    pvSalv:cap.pvSalv,pvLoss:cap.pvLoss,pvOM:cap.pvOM,
    depr:cap.depr,om:om,cocSens:cocSens,markupSens:markupSens,
    cost:cost,itc:cost*itcPct/100,opCost:opCost,markup:markup};
}

// ── FORMAT ────────────────────────────────────────────────────────────────────
function fmt(n,d){if(n==null||isNaN(n))return"--";d=d||0;return n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d})}
function fmtM(n){if(n==null||isNaN(n))return"--";var s=getSym();return n<0?"-"+s+fmt(Math.abs(n)):s+fmt(n)}
function fmtR(n){if(n==null||isNaN(n))return"--";return getSym()+fmt(n,2)}

// ── STEPPER ───────────────────────────────────────────────────────────────────
function updateStepper(){
  for(var i=1;i<=2;i++){
    var step=document.getElementById("step"+i),sn=document.getElementById("sn"+i);
    step.className="step";
    if(i<S.page){step.classList.add("done");sn.textContent="✓"}
    else if(i===S.page){step.classList.add("active");sn.textContent=String(i)}
    else sn.textContent=String(i);
    var n=i;
    (function(n,step){step.onclick=function(){if(n<S.page||(n===2&&S.res)){S.page=n;render()}}})(n,step);
    step.style.cursor=(i<S.page||(i===2&&S.res))?"pointer":"default";
  }
}

// ── BRIEFING NOTES ────────────────────────────────────────────────────────────
var NOTES1=[
  {q:"What does this model provide beyond the rental rate?",
   a:"This model calculates a two-part rental rate: the capital recovery component (recovering your investment in the asset, operating expenses, and cost of capital) plus the operator component (the operator's loaded cost marked up for profit). On the inputs page, two helpers are provided: a rental hours estimator to build annual hours from utilisation data, and an operator cost builder to calculate the all-in hourly cost from wage rate and overhead. On the results page, a rate decomposition visual shows exactly what each dollar of your rental rate covers, and a markup sensitivity table shows how the total rate changes as markup varies.",
   v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"What is included in the cost of the asset?",
   a:"The cost includes the purchase price plus transportation, installation, training, and all other costs required to put the asset in service. Tax authorities in most jurisdictions require that installation costs be added to the purchase price to determine the depreciable value.",
   v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"How do I estimate economic life and salvage value?",
   a:"Economic life is how long the asset will be productive as a rental asset. Use your experience with similar assets or industry replacement data. Salvage value depends on obsolescence, market conditions, and physical condition.",
   v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"What depreciation method should I use and what is the half-year rule?",
   a:"The applicable method is set by your tax jurisdiction. Double-declining gives the largest early deductions; straight-line spreads them evenly; sum-of-years-digits falls in between. The half-year rule assumes the asset is placed in service at mid-year, halving the first year's deduction.",
   v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"What are operating expenses and how do I estimate them?",
   a:"Operating expenses include fuel, electricity, lubrication, parts, repairs, and scheduled maintenance. Enter year-1 expenses from your own records or industry data. Subsequent years can be modelled as a constant dollar increase, constant percentage increase, or entered year by year.",
   v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"How do I estimate rental hours per year?",
   a:"Use your own records for similar assets, or industry trade data for new asset types. The rental hours estimator on this page can help you build an estimate from working days, hours per day, and utilisation rate. Test sensitivity by running the analysis at 2-3 different hour levels.",
   v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"Why include an operator cost and markup?",
   a:"If you use an existing employee as operator, you incur an opportunity cost — you lose their services while they are on the rental contract, even though you continue paying them. If you hire externally, you pay that person directly. Either way, you are out the cost. Without a markup you earn nothing on this investment of labour. Most businesses mark up employee cost by 100% or more. The markup covers profit, administrative overhead, and compensation for bench time between contracts.",
   v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"How do I calculate a required rate of return?",
   a:"Your required rate of return reflects the cost of the funds invested in the asset — a blend of your borrowing rate and your opportunity cost. Use the Cost of Capital Calculator to estimate it using WACC or CAPM.",
   v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"}
];
var NOTES2=[
  {q:"What does this analysis tell me?",
   a:"The analysis calculates the minimum rental rate that: (1) recovers your full investment in the asset including operating expenses and cost of capital, and (2) recovers the operator cost at your chosen markup. Any rate above this figure earns more than your required return on both the asset and the operator investment.",
   v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"How do I use this to make a pricing decision?",

  else{html+=cR("Risk-Free Rate","coc_rf",S.coc_rf,"%");html+=cR("Beta","coc_beta",S.coc_beta,"");html+=cR("Market Risk Premium","coc_mrp",S.coc_mrp,"%");html+='<div style="background:var(--surface);border-radius:5px;padding:8px 10px;font-size:11px">Ke = '+S.coc_rf+'% + '+S.coc_beta+' × '+S.coc_mrp+'% = <strong style="color:var(--green)">'+capm+'%</strong></div>';}

function validateInputs(){
  var errs=[];
  if(+S.cost<=0) errs.push("Asset cost must be greater than zero");
  if(+S.life<=0) errs.push("Asset life must be greater than zero");
  if(S.salvage!==''&&+S.salvage<0) errs.push("Salvage value cannot be negative");
  if(S.salvage!==''&&+S.salvage>=+S.cost) errs.push("Salvage cannot equal or exceed the asset cost");
  if(+S.hours<=0) errs.push("Annual hours must be greater than zero");
  if(+S.om1<0) errs.push("Year 1 O&M cannot be negative");
  if(+S.markup<0) errs.push("Markup cannot be negative");
  if(+S.taxRate<0||+S.taxRate>=100) errs.push("Tax rate must be between 0 and 100");
  if(+S.coc<=0) errs.push("Required return must be greater than zero");
  return errs;
}

  if(S.method==="Double-declining"&&!S.ddbRate)missing.push("Depreciation Rate");
  if(!S.om1)missing.push("Year 1 Operating Expenses");
  if(S.omType!=="Variable amount"&&!S.omInc&&S.omInc!==0)missing.push("Annual O&M Increase");
  if(!S.hours)missing.push("Rental Hours per Year");

// ── CHART ─────────────────────────────────────────────────────────────────────
function drawChart(canvasId,data){
  var canvas=document.getElementById(canvasId);if(!canvas)return;
  var ctx=canvas.getContext("2d"),W=canvas.width,H=canvas.height;
  var pad={top:12,bottom:48,left:72,right:12};
  var cw=W-pad.left-pad.right,ch=H-pad.top-pad.bottom;
  ctx.clearRect(0,0,W,H);
  var vals=data.map(function(d){return d.rate}).filter(function(v){return v>0});
  if(!vals.length)return;
  var minV=Math.min.apply(null,vals),maxV=Math.max.apply(null,vals);
  var rng=maxV-minV||maxV*0.2;var lo=minV-rng*0.15,hi=maxV+rng*0.15;
  ctx.strokeStyle="#E2E6EC";ctx.lineWidth=1;
  for(var i=0;i<=4;i++){
    var y=pad.top+ch*(1-i/4);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cw,y);ctx.stroke();
    ctx.fillStyle="#8A96A6";ctx.font="10px system-ui";ctx.textAlign="right";
    ctx.fillText(getSym()+fmt(lo+(hi-lo)*(i/4),2),pad.left-3,y+3);
  }
  var bw=Math.floor(cw/data.length*0.55),gap=cw/data.length;
  var midIdx=Math.floor(data.length/2);
  data.forEach(function(d,i){
    if(d.rate<=0)return;
    var x=pad.left+gap*i+(gap-bw)/2,bh=(d.rate-lo)/(hi-lo)*ch,y=pad.top+ch-bh;
    ctx.fillStyle=i===midIdx?"#1B3F6E":"#93B4D8";ctx.fillRect(x,y,bw,bh);
    ctx.fillStyle=i===midIdx?"var(--blue)":"#8A96A6";
    ctx.font=i===midIdx?"bold 10px system-ui":"10px system-ui";
    ctx.textAlign="center";ctx.fillText(d.label,x+bw/2,H-pad.bottom+13);
  });
  ctx.strokeStyle="#4A5568";ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(pad.left,pad.top+ch);ctx.lineTo(pad.left+cw,pad.top+ch);ctx.stroke();
  ctx.fillStyle="#4A5568";ctx.font="bold 12px system-ui";ctx.textAlign="center";
  ctx.fillText("Required Rate of Return (%)",pad.left+cw/2,H-3);
}

      html+='<div style="font-size:13px;color:var(--t2)">All-in operator cost: <strong style="color:var(--green)">'+fmtR(loaded)+'/hr</strong></div>';

      html+='</div><button class="helper-use" onclick="S.operatorCost=Math.round('+loaded*100+')/100;S.op_open=false;render()">Use this estimate ›</button>';
      html+='</div>';
    }
    html+='</div>';
  }
  html+='</div>';

  // Asset Data
  html+='<div class="panel"><div class="panel-head"><div class="panel-dot"></div><div class="panel-title">Asset Data</div></div><div class="field-grid">';
  html+=field("Cost of Asset",uInput(sym,S.cost,"inp-cost","S.cost=+this.value||0","",false));
  html+=field("Investment Tax Credit",uInput("",S.itcPct,"inp-itc","S.itcPct=+this.value||0","%",false));
  html+=field("Economic Life",uInput("",S.life,"inp-life","S.life=+this.value||0","years",false));
  html+=field("Salvage Value",uInput(sym,S.salvage,"inp-salv","S.salvage=+this.value||0","",false),false,true);
  html+='</div></div>';

  // Depreciation
  html+='<div class="panel"><div class="panel-head"><div class="panel-dot" style="background:var(--green)"></div><div class="panel-title">Depreciation</div></div><div class="field-grid">';
  html+=field("Method",'<div class="ui"><select onchange="S.method=this.value;render()">'+["Double-declining","Straight-line","Sum-of-years-digits"].map(function(m){return'<option'+(m===S.method?" selected":"")+'>'+m+'</option>'}).join("")+'</select></div>');
  html+=field(isDDB?"Depreciation Rate":"Depreciation Rate — N/A",uInput("",isDDB?S.ddbRate:"N/A","inp-rate","if(S.method===\'Double-declining\')S.ddbRate=+this.value||0","%",!isDDB)+(!isDDB?'<div class="field-note">Not applicable — defined by method formula</div>':""));
  html+=field("Half-Year Rule",'<div class="pills"><div class="pill'+(S.hyr?" active":"")+'" onclick="S.hyr=true;render()"><div class="pill-dot"></div>Yes</div><div class="pill'+(!S.hyr?" active":"")+'" onclick="S.hyr=false;render()"><div class="pill-dot"></div>No</div></div>',true,true);
  html+='</div></div>';

  // Operating Expenses
  html+='<div class="panel"><div class="panel-head"><div class="panel-dot" style="background:#9F7AEA"></div><div class="panel-title">Operating Expenses</div></div><div class="field-grid">';
  html+=field("Year 1 Operating Expenses",uInput(sym,S.om1,"inp-om1","S.om1=+this.value||0","",false));
  html+=field("Annual Increase Method",'<div class="ui"><select id="om-type-sel" onchange="S.omType=this.value;render()">'+["Constant amount","Constant percentage","Variable amount"].map(function(t){return'<option value="'+t+'"'+(t===S.omType?" selected":"")+'>'+t+'</option>'}).join("")+'</select></div>');
  if(S.omType!=="Variable amount"){
    var lbl=S.omType==="Constant amount"?"Annual Increase Amount":"Annual Increase Rate";
    html+=field(lbl,uInput(S.omType==="Constant amount"?sym:"",S.omInc,"inp-ominc","S.omInc=+this.value||0",S.omType==="Constant percentage"?"%":"",false),false,true);
  }else{
    html+=field("Variable amount — enter each year on next page",'<div style="font-size:11px;color:var(--t3);padding-top:4px">O&M costs will be entered year by year</div>',false,true);
  }
  html+='</div></div>';

  // Operator & Firm Data
  html+='<div class="panel"><div class="panel-head"><div class="panel-dot" style="background:#E53E3E"></div><div class="panel-title">Operator &amp; Rental Data</div></div><div class="field-grid">';
  html+=field("Hourly Operator Cost",uInput(sym,S.operatorCost,"inp-op","S.operatorCost=+this.value||0","/hr",false),false,false,"All-in loaded cost per hour including payroll taxes and benefits");
  html+=field("Markup on Operator Cost",uInput("",S.markup,"inp-mu","S.markup=+this.value||0","%",false),false,false,"Profit on operator labour. Typically 100–200% or more");
  html+=field("Annual Rental Hours",uInput("",S.hours,"inp-hrs","S.hours=+this.value||0","hrs/yr",false));
  html+=field("Tax Rate",uInput("",S.taxRate,"inp-tax","S.taxRate=+this.value||0","%",false));
  html+=field("Required Rate of Return",uInput("",S.coc,"inp-coc","S.coc=+this.value||0","%",false),false,true);
  html+='</div></div>';

  if(S.missingFields&&S.missingFields.length>0){
    html+='<div style="background:rgba(200,75,49,.07);border:1.5px solid var(--warn);border-radius:8px;padding:12px 16px;margin-bottom:14px;font-size:13px;color:var(--warn)"><strong>Please complete the following before continuing:</strong> '+S.missingFields.join(", ")+'.</div>';
  }
  html+='<div class="action-row" style="justify-content:space-between;align-items:center">';
  html+='<span style="font-size:11.5px;color:var(--t3)">New here? Try <strong style="color:var(--t2)">Load Example</strong> to see how it works.</span>';
  html+='<div style="display:flex;gap:10px"><button class="btn-ghost" onclick="loadExample()">Load Example</button><button class="btn-ghost" onclick="resetInputs()">Reset</button>';
  if(S.omType==="Variable amount"&&S.life){
    html+='<button class="btn-primary" onclick="goToVariableOM()">Next: Enter O&M ›</button>';
  }else{
    html+='<button class="btn-primary" onclick="goToResults()">Calculate ›</button>';
  }
  html+='</div></div>';
  html+='</main></div></div>';
  document.getElementById("main-content").innerHTML=html;
  makeBNList(NOTES1,"bn-list1");
  renderCoC();
  var omSel=document.getElementById("om-type-sel");
  if(omSel)omSel.value=S.omType;
  document.getElementById("cur-label").textContent=getSym()+" "+S.currency;
}

// ── PAGE 1.5: Variable O&M ────────────────────────────────────────────────────
function goToVariableOM(){
  var missing=[];
  if(!S.cost)missing.push("Cost");if(!S.life)missing.push("Economic Life");
  if(!S.om1)missing.push("Year 1 O&M");if(!S.hours)missing.push("Rental Hours");
  if(!S.operatorCost)missing.push("Operator Cost");if(!S.markup&&S.markup!==0)missing.push("Markup");
  if(!S.taxRate)missing.push("Tax Rate");if(!S.coc)missing.push("Cost of Capital");
  if(missing.length>0){S.missingFields=missing;render();return;}
  S.missingFields=null;S.page=1.5;render();
}
function renderVariableOM(){
  var sym=getSym(),life=+S.life||1;
  while(S.yearlyOM.length<life)S.yearlyOM.push(S.yearlyOM.length===0?(+S.om1||0):0);
  var html='<div class="page" style="max-width:700px"><div class="panel"><div class="panel-head"><div class="panel-dot"></div><div class="panel-title">Operating Expenses by Year</div></div>';
  html+='<div style="padding:10px 18px 8px;display:grid;grid-template-columns:72px 1fr;gap:0 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);border-bottom:1px solid var(--border)"><span>Year</span><span>O&M Cost</span></div>';
  html+='<div style="max-height:420px;overflow-y:auto">';
  for(var i=0;i<life;i++){
    html+='<div style="padding:9px 18px;display:grid;grid-template-columns:72px 1fr;gap:0 14px;align-items:center;border-bottom:1px solid var(--border);background:'+(i%2===0?"var(--surface)":"transparent")+'">';
    html+='<span style="font-size:12px;font-weight:600;color:var(--t2)">Year '+(i+1)+'</span>';
    html+='<div class="ui"><span class="pfx">'+sym+'</span><input type="text" value="'+(S.yearlyOM[i]||"")+'" placeholder="0" data-idx="'+i+'" onblur="S.yearlyOM[+this.dataset.idx]=+this.value||0" onfocus="this.style.borderBottomColor=\'var(--blue)\'"></div>';
    html+='</div>';
  }
  html+='</div></div>';
  html+='<div style="display:flex;justify-content:space-between;gap:10px"><button class="btn-ghost" onclick="S.page=1;render()">‹ Back</button><button class="btn-primary" onclick="goToResults()">Calculate ›</button></div></div>';
  document.getElementById("main-content").innerHTML=html;
}

// ── PAGE 2: Results ────────────────────────────────────────────────────────────
function renderPage2(){
  var res=S.res,sym=getSym();
  var capPct=res.totalRate>0?res.capRate/res.totalRate*100:50;
  var opPct=100-capPct;

  var html='<div class="page"><div class="p2-grid"><aside>';
  html+='<div class="section-label">Understanding Results</div>';
  html+='<div class="panel" style="margin-bottom:14px"><div id="bn-list2"></div></div>';
  html+='<div style="display:flex;flex-direction:column;gap:10px"><button class="btn-ghost" onclick="S.page=1;render()">‹ Edit Inputs</button><button class="print-btn" onclick="printSummary()">🖶 Print Summary</button></div>';
  html+='</aside><main>';

  // Banner
  html+='<div class="result-banner">';
  html+='<div><div class="banner-headline">Set your rental rate at <strong>'+fmtR(res.totalRate)+'</strong> per hour.</div>';
  html+='<div style="font-size:13px;color:var(--t2);margin-top:6px;line-height:1.6">';
  html+=fmtR(res.capRate)+'/hr recovers the asset investment · '+fmtR(res.opRate)+'/hr covers the operator at '+fmt(+S.markup)+'% markup.</div></div>';
  html+='<div class="rate-box"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.75)">Minimum Rental Rate</div>';
  html+='<div style="font-family:monospace;font-size:28px;font-weight:800;color:white;margin-top:4px">'+fmtR(res.totalRate)+'</div>';
  html+='<div style="font-size:11px;color:rgba(255,255,255,.7);margin-top:2px">per hour</div></div></div>';

  // Orientation strip
  html+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 18px;margin-bottom:18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">';
  html+='<span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);flex-shrink:0">This page also provides:</span>';
  html+='<div style="display:flex;gap:8px;flex-wrap:wrap">';
  html+='<span style="font-size:12px;color:var(--t2);background:white;border:1px solid var(--border);border-radius:5px;padding:3px 10px">📊 Rate decomposition</span>';
  html+='<span style="font-size:12px;color:var(--t2);background:white;border:1px solid var(--border);border-radius:5px;padding:3px 10px">💰 Rate by markup level</span>';
  html+='<span style="font-size:12px;color:var(--t2);background:white;border:1px solid var(--border);border-radius:5px;padding:3px 10px">⏱️ Rate by rental hours</span>';
  html+='<span style="font-size:12px;color:var(--t2);background:white;border:1px solid var(--border);border-radius:5px;padding:3px 10px">👷 Operator cost builder (inputs page)</span>';
  html+='</div></div>';

  // ── Rate decomposition visual ─────────────────────────────────────────────────
  html+='<div class="rate-breakdown">';
  html+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:12px">Rate Decomposition — Where each dollar of your rental rate goes</div>';
  // Stacked bar
  html+='<div style="display:flex;height:36px;border-radius:6px;overflow:hidden;margin-bottom:10px">';
  html+='<div style="width:'+capPct.toFixed(1)+'%;background:#1B3F6E;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;white-space:nowrap;padding:0 8px;min-width:60px">'+fmtR(res.capRate)+'/hr</div>';
  html+='<div style="flex:1;background:#E53E3E;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;white-space:nowrap;padding:0 8px">'+fmtR(res.opRate)+'/hr</div>';
  html+='</div>';
  // Legend
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
  html+='<div style="display:flex;align-items:flex-start;gap:10px"><div style="width:12px;height:12px;border-radius:3px;background:#1B3F6E;flex-shrink:0;margin-top:2px"></div><div><div style="font-size:12px;font-weight:600;color:var(--t1)">Capital Recovery — '+fmtR(res.capRate)+'/hr ('+fmt(capPct,1)+'%)</div><div style="font-size:11px;color:var(--t3);margin-top:2px">Recovers asset cost, O&M, tax benefits, and '+S.coc+'% return on investment</div></div></div>';
  html+='<div style="display:flex;align-items:flex-start;gap:10px"><div style="width:12px;height:12px;border-radius:3px;background:#E53E3E;flex-shrink:0;margin-top:2px"></div><div><div style="font-size:12px;font-weight:600;color:var(--t1)">Operator — '+fmtR(res.opRate)+'/hr ('+fmt(opPct,1)+'%)</div><div style="font-size:11px;color:var(--t3);margin-top:2px">'+fmtR(res.opCost)+'/hr loaded cost × (1 + '+fmt(res.markup)+'% markup)</div></div></div>';
  html+='</div></div>';

  // Metrics
  html+='<div class="metrics">';
  html+='<div class="metric"><div class="metric-label">Capital Recovery Rate</div><div class="metric-val ok">'+fmtR(res.capRate)+'</div><div class="metric-sub">per hour — asset &amp; O&M recovery</div></div>';
  html+='<div class="metric"><div class="metric-label">Operator Rate</div><div class="metric-val ok">'+fmtR(res.opRate)+'</div><div class="metric-sub">'+fmtR(res.opCost)+'/hr × (1+'+fmt(res.markup)+'%)</div></div>';
  html+='<div class="metric"><div class="metric-label">Annual Revenue</div><div class="metric-val">'+fmtM(res.totalRate*+S.hours)+'</div><div class="metric-sub">'+fmt(+S.hours)+' hrs × '+fmtR(res.totalRate)+'/hr</div></div>';
  html+='</div>';

  // CoC sensitivity chart
  html+='<div class="chart-box"><div class="chart-title">Total Rental Rate by Required Return on Investment</div>';
  html+='<canvas id="sens-chart" width="700" height="240" style="width:100%;height:auto;display:block"></canvas></div>';

  // ── Markup sensitivity table ──────────────────────────────────────────────────
  html+='<div class="collapsible"><div class="coll-head" onclick="S.show_markup_sens=!S.show_markup_sens;renderPage2()"><span class="coll-title">Total Rate by Operator Markup</span><span class="coll-arr" style="transform:'+(S.show_markup_sens?'rotate(90deg)':'rotate(0deg)')+'" >›</span></div>';
  if(S.show_markup_sens){
    html+='<div class="coll-body open" style="padding:4px 0"><div style="padding:10px 18px 6px;font-size:12px;color:var(--t2);line-height:1.6">How the total rental rate changes at different markup levels. Use this to understand your pricing flexibility and to identify the minimum markup at which you are satisfied with the return on your labour investment.</div>';
    html+='<table><thead><tr><th class="left">Markup</th><th>Operator Rate</th><th>Total Rate</th><th>vs Current ('+fmt(+S.markup)+'%)</th></tr></thead><tbody>';
    res.markupSens.forEach(function(row){
      var isCurrent=Math.abs(row.markup-+S.markup)<0.5;
      var diff=row.total-res.totalRate;
      html+='<tr'+(isCurrent?' class="highlight"':'')+'>';
      html+='<td class="left">'+(isCurrent?'★ ':'')+fmt(row.markup)+'%</td>';
      html+='<td>'+fmtR(row.opRate)+'</td>';
      html+='<td>'+fmtR(row.total)+'</td>';
      html+='<td style="color:'+(isCurrent?"var(--t3)":diff>0?"var(--warn)":"var(--green)")+'\">'+(isCurrent?"current":(diff>0?"+":"")+fmtR(diff))+'</td>';
      html+='</tr>';
    });
    html+='</tbody></table></div></div>';
  }
  html+='</div>';

  // ── Rate by rental hours ──────────────────────────────────────────────────────
  html+='<div class="collapsible"><div class="coll-head" onclick="S.show_hrs_sens=!S.show_hrs_sens;renderPage2()"><span class="coll-title">Total Rate by Annual Rental Hours</span><span class="coll-arr" style="transform:'+(S.show_hrs_sens?'rotate(90deg)':'rotate(0deg)')+'" >›</span></div>';
  if(S.show_hrs_sens){
    var baseHrs=+S.hours;
    html+='<div class="coll-body open" style="padding:4px 0"><div style="padding:10px 18px 6px;font-size:12px;color:var(--t2);line-height:1.6">The capital recovery component changes with hours, but the operator rate is fixed per hour regardless of utilisation. The table shows the total rate at different utilisation levels.</div>';
    html+='<table><thead><tr><th class="left">Annual Hours</th><th>Capital Rate</th><th>Operator Rate</th><th>Total Rate</th><th>vs Current</th></tr></thead><tbody>';
    [0.60,0.70,0.80,0.90,1.00,1.10,1.20,1.30,1.40].forEach(function(mult){
      var hrs=Math.round(baseHrs*mult);
      var cap2=hrs>0?res.n60/((1-+S.taxRate/100)*hrs*res.af):0;
      var total2=cap2+res.opRate;
      var diff=total2-res.totalRate;
      var isCurrent=Math.abs(mult-1.0)<0.001;
      html+='<tr'+(isCurrent?' class="highlight"':'')+'>';
      html+='<td class="left">'+(isCurrent?'★ ':'')+fmt(hrs)+' hrs ('+(Math.round(mult*100))+'%)</td>';
      html+='<td>'+fmtR(cap2)+'</td>';
      html+='<td>'+fmtR(res.opRate)+'</td>';
      html+='<td>'+fmtR(total2)+'</td>';
      html+='<td style="color:'+(isCurrent?"var(--t3)":diff>0?"var(--warn)":"var(--green)")+'\">'+(isCurrent?"current":(diff>0?"+":"")+fmtR(diff))+'</td>';
      html+='</tr>';
    });
    html+='</tbody></table></div></div>';
  }
  html+='</div>';

  // DCF Summary
  html+='<div class="collapsible"><div class="coll-head" onclick="S.show_dcf=!S.show_dcf;renderPage2()"><span class="coll-title">DCF Summary — Capital Recovery Component</span><span class="coll-arr" style="transform:'+(S.show_dcf?'rotate(90deg)':'rotate(0deg)')+'" >›</span></div>';
  if(S.show_dcf){
    html+='<div class="coll-body open"><table><tbody>';
    html+='<tr class="total-row"><td class="left" colspan="2">Present Value of Net Costs to Recover</td><td>'+fmtM(res.n60)+'</td></tr>';
    [["Cost of Asset","Year 0",res.cost,false],
     ["Less: Investment Tax Credit","Year 1",-res.pvITC,true],
     ["Less: Tax Shields (all years)","Years 1–"+S.life,-res.pvTS,true],
     ["Less: Salvage Value","Year "+S.life,-res.pvSalv,true],
     ["Plus: Loss of Tax Shield on Salvage","Year "+S.life,res.pvLoss,false],
     ["Plus: Operating Expenses (AT, all years)","Years 1–"+S.life,res.pvOM,false]
    ].forEach(function(r){
      html+='<tr><td class="left">'+r[0]+'</td><td class="sub">'+r[1]+'</td><td class="'+(r[2]<0?"neg":"")+'">'+fmtM(r[2])+'</td></tr>';
    });
    html+='<tr class="total-row"><td class="left" colspan="2">Total PV of Net Costs (N60)</td><td>'+fmtM(res.n60)+'</td></tr>';
    html+='<tr><td class="left">÷ After-Tax annuity factor × hours</td><td class="sub">'+fmt(res.af,4)+' × (1−'+S.taxRate+'%) × '+fmt(+S.hours)+' hrs</td><td>'+fmt(res.af*(1-S.taxRate/100)*(+S.hours),2)+'</td></tr>';
    html+='<tr><td class="left">= Capital recovery rate</td><td class="sub"></td><td style="color:var(--blue);font-weight:700">'+fmtR(res.capRate)+'/hr</td></tr>';
    html+='<tr><td class="left">+ Operator rate ('+fmtR(res.opCost)+' × (1+'+fmt(res.markup)+'%))</td><td class="sub"></td><td>'+fmtR(res.opRate)+'/hr</td></tr>';
    html+='<tr class="total-row" style="border-top:2px solid var(--blue)"><td class="left" colspan="2">Total Rental Rate</td><td style="color:var(--blue);font-size:15px;font-weight:800">'+fmtR(res.totalRate)+'/hr</td></tr>';
    html+='</tbody></table></div>';
  }
  html+='</div>';

  // Depreciation schedule
  html+='<div class="collapsible"><div class="coll-head" onclick="S.show_depr=!S.show_depr;renderPage2()"><span class="coll-title">Depreciation &amp; O&amp;M Schedule</span><span class="coll-arr" style="transform:'+(S.show_depr?'rotate(90deg)':'rotate(0deg)')+'" >›</span></div>';
  if(S.show_depr){
    html+='<div class="coll-body open"><table><thead><tr><th class="left">Year</th><th>Depreciation</th><th>AT Tax Shield</th><th>O&M Cost</th><th>AT O&M</th><th>PV AT O&M</th></tr></thead><tbody>';
    var r3=+S.coc/100,tx3=+S.taxRate/100;
    res.depr.forEach(function(d,i){
      var yr=i+1,ts=d*tx3,om_v=res.om[i],atOM=om_v*(1-tx3),pvOM=atOM/Math.pow(1+r3,yr);
      html+='<tr><td class="left">'+yr+'</td><td>'+fmtM(d)+'</td><td>'+fmtM(ts)+'</td><td>'+fmtM(om_v)+'</td><td>'+fmtM(atOM)+'</td><td>'+fmtM(pvOM)+'</td></tr>';
    });
    html+='</tbody></table></div>';
  }
  html+='</div>';
  html+='</main></div></div>';

  document.getElementById("main-content").innerHTML=html;
  makeBNList(NOTES2,"bn-list2");
  setTimeout(function(){drawChart("sens-chart",res.cocSens)},50);
  document.getElementById("cur-label").textContent=getSym()+" "+S.currency;
}

// ── PRINT ─────────────────────────────────────────────────────────────────────
function printSummary(){
  var res=S.res;if(!res)return;
  var pd=S.show_dcf,pd2=S.show_depr,pd3=S.show_markup_sens,pd4=S.show_hrs_sens;
  S.show_dcf=true;S.show_depr=true;S.show_markup_sens=true;S.show_hrs_sens=true;
  renderPage2();
  setTimeout(function(){
    document.querySelectorAll('canvas').forEach(function(c){
      var img=document.createElement('img');img.src=c.toDataURL('image/png');
      img.style.cssText='width:100%;height:auto;display:block';c.parentNode.replaceChild(img,c);
    });
    window.print();
    S.show_dcf=pd;S.show_depr=pd2;S.show_markup_sens=pd3;S.show_hrs_sens=pd4;
    renderPage2();
  },300);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  updateStepper();
  if(S.page===1)renderPage1();
  else if(S.page===1.5)renderVariableOM();
  else if(S.page===2&&S.res)renderPage2();
  var cl=document.getElementById("cur-label");
  if(cl)cl.textContent=getSym()+" "+S.currency;
}
render();
</script>
</body>
</html>
