  background: var(--blue);
  color: white;
  text-align: center;
  padding: 10px 28px;

  font-weight: 600;

<body>
<div id="masthead">
  <div class="logo"><div class="logo-mark"><svg viewBox="0 0 18 18" width="14" height="14" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,10 7,14 15,4"/></svg></div><div class="logo-text">Cap<span>Plan</span></div><div class="logo-sub">Personal</div></div>
  <div class="module-name">What Is This Lease Costing Me?</div>
  <div style="position:relative"><button style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:5px;padding:6px 12px;color:white;font-size:12px;font-weight:600" id="cur-btn" onclick="toggleCur()"><span id="cur-label">$ USD</span> ▾</button><div id="cur-dropdown" style="display:none;position:absolute;right:0;top:110%;background:white;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(15,29,46,.16);min-width:200px;z-index:300;overflow:hidden"></div></div>
</div>
<div id="model-banner">What interest rate is embedded in this lease?</div>
<div id="stepper">
  <div class="step active" id="step1"><div class="step-num" id="sn1">1</div><div class="step-label">Lease details</div></div>
  <div class="step-sep">›</div>
  <div class="step" id="step2"><div class="step-num" id="sn2">2</div><div class="step-label">Results</div></div>
</div>
<div id="main-content"></div>
<script>
var CURRENCIES=[{code:"USD",symbol:"$",label:"US Dollar"},{code:"EUR",symbol:"€",label:"Euro"},{code:"GBP",symbol:"£",label:"British Pound"},{code:"CAD",symbol:"CA$",label:"Canadian Dollar"},{code:"AUD",symbol:"AU$",label:"Australian Dollar"},{code:"NZD",symbol:"NZ$",label:"New Zealand Dollar"},{code:"JPY",symbol:"¥",label:"Japanese Yen"}];
function getSym(){var c=CURRENCIES.find(function(c){return c.code===S.currency});return c?c.symbol:"$"}
function toggleCur(){S.cur_open=!S.cur_open;var dd=document.getElementById("cur-dropdown");dd.style.display=S.cur_open?"block":"none";if(S.cur_open){dd.innerHTML="";CURRENCIES.forEach(function(c){var b=document.createElement("button");b.style.cssText="display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;background:"+(c.code===S.currency?"var(--green-soft)":"transparent")+";border:none;border-bottom:1px solid var(--border);cursor:pointer";b.innerHTML='<span style="font-family:monospace;font-size:13px;font-weight:700;color:var(--green);width:36px">'+c.symbol+'</span><span>'+c.label+'</span>';b.onclick=function(){S.currency=c.code;S.cur_open=false;render()};dd.appendChild(b);});}}

var S={page:1,currency:"USD",cur_open:false,res:null,missingFields:null,show_pmt_sens:false,
  price:"",salvage:"",term:"",deposit:true,depositAmt:"",freq:1,leasePmt:"",borrowRate:""};

function solveImpliedRate(price,salvage,depAmt,pmt,freq,term,hasDep){
  var totalN=term*freq;var n=hasDep?(totalN-1):totalN;var dep=hasDep?depAmt:0;var salv=salvage||0;
  var lo=0.00001,hi=1.0/freq,mid;
  for(var i=0;i<100;i++){mid=(lo+hi)/2;var af=mid>0?(1-Math.pow(1+mid,-n))/mid:n;var annR=Math.pow(1+mid,freq)-1;var pvL=dep+pmt*af+(salv>0?salv/Math.pow(1+annR,term):0);if(pvL>price)lo=mid;else hi=mid;}
  return(Math.pow(1+mid,freq)-1)*100;
}
function calcAll(){
  var price=+S.price,salvage=+S.salvage||0,term=+S.term||1,pmt=+S.leasePmt,freq=+S.freq,borrow=+S.borrowRate;
  var depAmt=S.deposit?(+S.depositAmt||0):0;var hasDep=S.deposit&&depAmt>0;
  var ir=solveImpliedRate(price,salvage,depAmt,pmt,freq,term,hasDep);
  var diff=ir-borrow;
  var pmtSens=[-0.40,-0.30,-0.20,-0.10,0,0.10,0.20,0.30,0.40].map(function(delta){
    var p2=pmt*(1+delta);var ir2=solveImpliedRate(price,salvage,depAmt,p2,freq,term,hasDep);
    return{pmt:p2,rate:ir2,diff:ir2-borrow};
  });
  return{ir:ir,borrow:borrow,diff:diff,pmtSens:pmtSens};
}

function fmt(n,d){if(n==null||isNaN(n))return"--";d=d||0;return n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d})}
function fmtM(n){if(n==null||isNaN(n))return"--";var s=getSym();return n<0?"-"+s+fmt(Math.abs(n)):s+fmt(n)}
function updateStepper(){for(var i=1;i<=2;i++){var step=document.getElementById("step"+i),sn=document.getElementById("sn"+i);step.className="step";if(i<S.page){step.classList.add("done");sn.textContent="✓"}else if(i===S.page){step.classList.add("active");sn.textContent=String(i)}else sn.textContent=String(i);var n=i;(function(n,step){step.onclick=function(){if(n<S.page||(n===2&&S.res)){S.page=n;render()}}})(n,step);step.style.cursor=(i<S.page||(i===2&&S.res))?"pointer":"default";}}

var NOTES1=[
  {q:"What does this model calculate?",a:"It works out the true interest rate the lessor is charging you through the lease payments — not an advertised rate, but the actual rate calculated from the numbers. Comparing this to what you'd pay on a personal loan tells you whether the lease is good value or expensive financing."},
  {q:"Why does the residual value matter?",a:"The lessor owns the asset at the end of the lease and will recover its residual value. That means you're only really financing the depreciation during your lease — the smaller the residual, the more you're financing and the higher the effective rate tends to be."},
  {q:"How do I find my borrowing rate?",a:"Check your bank, credit union, or an online loan comparison site for the rate on a personal loan of similar size and term. This is the benchmark to compare the implied lease rate against."},
];
var NOTES2=[
  {q:"What if the implied rate is lower than my loan rate?",a:"The lease is cheaper than borrowing to buy — it's good value financing. Take it. The leasing company has access to cheaper funds than you do and is passing some of that on."},
  {q:"Why is the residual value discounted at the implied rate, not my borrowing rate?",a:"Because the implied rate is the unknown being solved for, it must be held constant on both sides of the equation — both the lease payments and the residual value are discounted at the same implied rate. This is a mathematical requirement of the calculation, not a judgment about what rate applies to the asset. Your borrowing rate appears only as a benchmark for comparison after the implied rate has been found, not as an input to the calculation itself."},
  {q:"What does the implied rate mean?",a:"It's the annual interest rate built into your lease. If a car costs $35,000 and the lease payments add up to more than $35,000 over the term, the excess is effectively interest. This model calculates that rate precisely."},
  {q:"How do I use this to negotiate?",a:"Ask the dealer to lower the monthly payment. The payment sensitivity table shows exactly how the implied rate drops as payments fall. You now know the target rate you're aiming for — your own borrowing rate — and can calculate the payment that gets you there."},
  {q:"What does the payment sensitivity table show?",a:"How the implied interest rate changes at different payment levels. A lower payment means a lower implied rate. The row where the implied rate equals your borrowing rate is the payment at which leasing becomes as good as borrowing to buy."}
];
function makeBNList(notes,id){var list=document.getElementById(id);if(!list)return;list.innerHTML="";notes.forEach(function(n,i){var item=document.createElement("div");item.className="bn-item";var head=document.createElement("div");head.className="bn-head";head.innerHTML='<div class="bn-qmark">?</div><div class="bn-q">'+n.q+'</div><div class="bn-arr" id="arr'+id+i+'">›</div>';var body=document.createElement("div");body.className="bn-body";body.textContent=n.a;head.onclick=function(){var open=body.classList.contains("open");body.classList.toggle("open");document.getElementById("arr"+id+i).style.transform=open?"rotate(0deg)":"rotate(90deg)";head.style.background=open?"":"var(--surface)";};item.appendChild(head);item.appendChild(body);list.appendChild(item);});}
function field(l,h,fw,last,note){return'<div class="field'+(fw?" full":"")+(last?" last":"")+'"><div class="field-label">'+l+'</div>'+h+(note?'<div class="field-note">'+note+'</div>':'')+'</div>';}
function uIn(pfx,val,id,ob,sfx,dis){return'<div class="ui">'+(pfx?'<span class="pfx">'+pfx+'</span>':'')+'<input type="text" id="'+id+'" value="'+(val==null?"":val)+'" '+(dis?'disabled ':'')+' onblur="'+ob+'" onfocus="this.style.borderBottomColor=\'var(--green)\'">'+(sfx?'<span class="sfx">'+sfx+'</span>':'')+'</div>';}

function validateInputs(){
  var errs=[];
  if(+S.price<=0) errs.push("Purchase price must be greater than zero");
  if(S.life!==''&&+S.life<=0) errs.push("Asset life must be greater than zero");
  if(S.salvage!==''&&+S.salvage<0) errs.push("Resale value cannot be negative");
  if(S.salvage!==''&&S.price!==''&&+S.salvage>=+S.price) errs.push("Resale value cannot equal or exceed the purchase price");
  if(+S.term<=0) errs.push("Lease term must be greater than zero");
  if(S.life!==''&&+S.term>+S.life) errs.push("Lease term cannot exceed asset life");
  if(S.deposit&&+S.depositAmt<0) errs.push("Deposit amount cannot be negative");
  if(+S.leasePmt<=0) errs.push("Lease payment must be greater than zero");
  if(+S.borrowRate<=0) errs.push("Borrowing rate must be greater than zero");
  if(+S.borrowRate>=100) errs.push("Borrowing rate cannot equal or exceed 100%");
  return errs;
}
function goToResults(){
  var missing=[];
  if(!S.price)missing.push("Purchase price of the asset");if(!S.term)missing.push("Lease term");
  if(S.deposit&&(!S.depositAmt&&S.depositAmt!==0))missing.push("Deposit amount");
  if(!S.leasePmt)missing.push("Lease payment");if(!S.borrowRate)missing.push("Your borrowing rate");
  if(missing.length>0){S.missingFields=missing;render();return;}
  S.missingFields=null;
  var valErrs=validateInputs();if(valErrs.length>0){S.missingFields=valErrs;render();return;}
  try{S.res=calcAll();S.page=2;render();}catch(e){alert("Error: "+e.message)}
}
function resetInputs(){S.price="";S.salvage="";S.term="";S.deposit=true;S.depositAmt="";S.freq=1;S.leasePmt="";S.borrowRate="";S.missingFields=null;render();}

function drawChart(canvasId,data,borrow){
  var canvas=document.getElementById(canvasId);if(!canvas)return;
  var ctx=canvas.getContext("2d"),W=canvas.width,H=canvas.height;
  var pad={top:16,bottom:48,left:52,right:16};var cw=W-pad.left-pad.right,ch=H-pad.top-pad.bottom;
  ctx.clearRect(0,0,W,H);
  var vals=data.map(function(d){return d.rate});var minV=Math.min.apply(null,vals),maxV=Math.max.apply(null,vals);
  var rng=maxV-minV||maxV*0.2;var lo=Math.max(0,minV-rng*0.1),hi=maxV+rng*0.15;
  // Borrow rate line
  if(borrow>=lo&&borrow<=hi){var borrowY=pad.top+ch*(1-(borrow-lo)/(hi-lo));ctx.strokeStyle="#2E7D52";ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(pad.left,borrowY);ctx.lineTo(pad.left+cw,borrowY);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle="#2E7D52";ctx.font="bold 10px system-ui";ctx.textAlign="left";ctx.fillText("Your loan rate ("+borrow+"%)",pad.left+4,borrowY-4);}
  ctx.strokeStyle="#D8E8DC";ctx.lineWidth=1;
  for(var i=0;i<=4;i++){var y=pad.top+ch*(1-i/4);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cw,y);ctx.stroke();ctx.fillStyle="#8A96A6";ctx.font="10px system-ui";ctx.textAlign="right";ctx.fillText(fmt(lo+(hi-lo)*(i/4),1)+"%",pad.left-3,y+3);}
  var bw=Math.floor(cw/data.length*0.6),gap=cw/data.length,midIdx=Math.floor(data.length/2);
  data.forEach(function(d,i){var x=pad.left+gap*i+(gap-bw)/2,bh=(d.rate-lo)/(hi-lo)*ch,y=pad.top+ch-bh;ctx.fillStyle=d.rate>borrow?"#E88A8A":(i===midIdx?"#2E7D52":"#6DBF8A");ctx.fillRect(x,y,bw,bh);ctx.fillStyle="#8A96A6";ctx.font=i===midIdx?"bold 10px system-ui":"10px system-ui";ctx.textAlign="center";ctx.fillText(getSym()+fmt(d.pmt/1000,1)+"k",x+bw/2,H-pad.bottom+13);});
  ctx.strokeStyle="#4A5568";ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(pad.left,pad.top+ch);ctx.lineTo(pad.left+cw,pad.top+ch);ctx.stroke();ctx.fillStyle="#4A5568";ctx.font="bold 11px system-ui";ctx.textAlign="center";ctx.fillText("Lease payment — green bars = below your loan rate",pad.left+cw/2,H-3);
}

  ['📊 Payment sensitivity','💡 Break-even payment'].forEach(function(item){html+='<span style="font-size:12px;color:var(--t2);padding:4px 10px;background:var(--surface);border:1px solid var(--border);border-radius:20px">'+item+'</span>';}); html+='</div>';

  html+='<div class="metrics"><div class="metric"><div class="metric-label">Implied lease rate</div><div class="metric-val '+(expensive?"warn":"good")+'">'+fmt(res.ir,2)+'%</div><div class="metric-sub">The true annual interest rate in this lease</div></div><div class="metric"><div class="metric-label">Your loan rate</div><div class="metric-val">'+fmt(res.borrow,2)+'%</div><div class="metric-sub">Your benchmark — borrow to buy at this rate</div></div><div class="metric"><div class="metric-label">Difference</div><div class="metric-val '+(expensive?"warn":"good")+'">'+(expensive?"+":"")+fmt(res.diff,2)+'%</div><div class="metric-sub">'+(expensive?fmt(res.diff,2)+" percentage points above your loan rate of "+fmt(res.borrow,2)+"%":fmt(Math.abs(res.diff),2)+" percentage points below your loan rate of "+fmt(res.borrow,2)+"%")+'</div></div></div>';

  // Sensitivity
  html+='<div class="collapsible"><div class="coll-head" onclick="S.show_pmt_sens=!S.show_pmt_sens;renderPage2()"><span class="coll-title">What payment would make the lease competitive?</span><span class="coll-arr" style="transform:'+(S.show_pmt_sens?'rotate(90deg)':'rotate(0deg)')+'" >›</span></div>';

    html+='<div class="coll-body open" style="padding:4px 0"><div style="padding:10px 18px 6px;font-size:12px;color:var(--t2)">The payment at which the implied rate equals your borrowing rate of '+fmt(res.borrow,2)+'% is where leasing becomes as good as a loan. Use this as your negotiating target.</div>';

function printSummary(){var pd=S.show_pmt_sens;S.show_pmt_sens=true;renderPage2();setTimeout(function(){document.querySelectorAll('canvas').forEach(function(c){var img=document.createElement('img');img.src=c.toDataURL('image/png');img.style.cssText='width:100%;height:auto;display:block';c.parentNode.replaceChild(img,c);});window.print();S.show_pmt_sens=pd;renderPage2();},300);}
function initChartTooltip(canvasId,data,labelFn){
  setTimeout(function(){
    var canvas=document.getElementById(canvasId);if(!canvas)return;
    var par=canvas.parentNode;par.style.position='relative';
    var old=par.querySelector('.ctip');if(old)old.remove();
    var tip=document.createElement('div');tip.className='ctip';
    tip.style.cssText='position:absolute;pointer-events:none;background:rgba(15,29,46,.88);color:white;font-size:11px;font-weight:600;padding:5px 10px;border-radius:5px;white-space:nowrap;display:none;z-index:99;transform:translateX(-50%);top:6px';
    par.appendChild(tip);
    canvas.style.cursor='crosshair';
    canvas.onmousemove=function(e){
      var r=canvas.getBoundingClientRect();
      var scaleX=canvas.width/r.width;
      var mx=(e.clientX-r.left)*scaleX;
      var W=canvas.width,padL=80,cw=W-96;
      var n=data.length,gap=cw/n,bw=Math.floor(gap*0.6);
      var hit=null,hitPct=0;
      for(var i=0;i<n;i++){
        var bx=padL+gap*i+(gap-bw)/2;
        if(mx>=bx&&mx<=bx+bw){hit=data[i];hitPct=((bx+bw/2)/W*100);break;}
      }
      if(hit){tip.textContent=labelFn(hit);tip.style.left=hitPct.toFixed(1)+'%';tip.style.display='block';}
      else tip.style.display='none';
    };
    canvas.onmouseleave=function(){tip.style.display='none';};
  },90);
}

function render(){updateStepper();if(S.page===1)renderPage1();else if(S.page===2&&S.res)renderPage2();var cl=document.getElementById("cur-label");if(cl)cl.textContent=getSym()+" "+S.currency;}
render();
