<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CapPlan — Business Solution Finder</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#F7F8FA;color:#0F1D2E;font-size:15px;line-height:1.6;min-height:100vh}
:root{
  --blue:#1B3F6E;--blue-warm:#1E4880;--blue-soft:rgba(27,63,110,0.09);--blue-mid:#E8EFF8;
  --green:#2E7D52;--green-soft:rgba(46,125,82,0.09);
  --amber:#F59E0B;--amber-soft:#FFFBEB;--amber-dark:#92400E;
  --surface:#F7F8FA;--panel:#ffffff;--border:#E2E6EC;
  --t1:#0F1D2E;--t2:#4A5568;--t3:#8A96A6;--warn:#C84B31;
}

/* ── HEADER ── */
#header{
  background:var(--blue);
  padding:16px 28px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(15,29,46,.18);
}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:30px;height:30px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center}
.logo-text{font-family:Georgia,serif;font-size:20px;color:white}
.logo-text span{color:#A8C5E8}
.logo-sub{font-size:12px;font-weight:700;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.06em;margin-left:4px;padding-left:10px;border-left:1px solid rgba(255,255,255,.25)}
.header-back{font-size:12px;color:rgba(255,255,255,.7);cursor:pointer;padding:6px 12px;border-radius:5px;border:1px solid rgba(255,255,255,.2);transition:all .15s}
.header-back:hover{background:rgba(255,255,255,.1);color:white}

/* ── TRACK ── */
#finder{max-width:780px;margin:0 auto;padding:32px 20px 60px}
#breadcrumb{font-size:12px;color:var(--t3);margin-bottom:20px;min-height:18px}
#breadcrumb span{color:var(--t2)}
#start-over{display:none;font-size:12px;color:var(--blue);cursor:pointer;text-decoration:underline;margin-left:10px}

/* ── REGION TOGGLE ── */
.region-toggle{display:flex;gap:0;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:28px;max-width:360px}
.region-btn{flex:1;padding:10px 16px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:#fff;color:var(--t2);transition:all .15s}
.region-btn.active{background:var(--blue);color:white}
.region-btn:not(.active):hover{background:var(--blue-soft)}

/* ── QUESTION CARD ── */
.q-card{background:var(--panel);border:1.5px solid var(--border);border-radius:12px;padding:28px;margin-bottom:20px;box-shadow:0 2px 8px rgba(15,29,46,.06)}
.q-step-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--blue);margin-bottom:8px}
.q-title{font-family:Georgia,serif;font-size:21px;font-weight:700;color:var(--t1);margin-bottom:6px;line-height:1.35}
.q-sub{font-size:13px;color:var(--t2);margin-bottom:22px}

/* ── CHOICE BUTTONS ── */
.choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{
  display:flex;align-items:flex-start;gap:14px;
  padding:14px 18px;
  background:#fff;border:1.5px solid var(--border);border-radius:10px;
  cursor:pointer;text-align:left;transition:all .15s;width:100%
}
.choice-btn:hover{border-color:var(--blue);background:var(--blue-soft)}
.choice-icon{font-size:22px;flex-shrink:0;margin-top:2px}
.choice-text{}
.choice-title{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:2px}
.choice-desc{font-size:12px;color:var(--t2);line-height:1.45}

/* ── RESULT CARD ── */
.result-card{background:var(--panel);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(15,29,46,.10)}
.result-head{background:var(--blue);padding:22px 28px;display:flex;align-items:flex-start;gap:16px}
.result-badge{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--blue);background:white;border-radius:4px;padding:3px 8px;flex-shrink:0;margin-top:3px}
.result-head-text{}
.result-model-label{font-size:11px;color:rgba(255,255,255,.65);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.result-title{font-family:Georgia,serif;font-size:22px;color:white;font-weight:700;line-height:1.3}
.result-region{font-size:11px;color:rgba(255,255,255,.6);margin-top:4px}
.result-body{padding:24px 28px}
.result-question{font-size:15px;font-style:italic;color:var(--t1);margin-bottom:14px;font-family:Georgia,serif}
.result-desc{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:20px}

/* HTW card in result */
.htw-card{background:var(--amber-soft);border:1.5px solid var(--amber);border-radius:10px;padding:14px 18px;margin-bottom:20px}
.htw-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--amber-dark);margin-bottom:10px}
.htw-steps{display:flex;flex-direction:column;gap:10px}
.htw-step{display:flex;gap:10px;align-items:flex-start}
.htw-num{width:22px;height:22px;border-radius:50%;background:var(--amber);color:white;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.htw-step-text{font-size:12px;color:var(--t2);line-height:1.5}
.htw-step-text strong{color:var(--amber-dark)}

.result-actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.open-btn{
  background:var(--blue);color:white;border:none;border-radius:8px;
  padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;
  transition:background .15s;text-decoration:none;display:inline-block
}
.open-btn:hover{background:var(--blue-warm)}
.also-label{font-size:12px;color:var(--t3);margin-top:16px;margin-bottom:8px}
.also-chips{display:flex;gap:8px;flex-wrap:wrap}
.also-chip{
  font-size:12px;font-weight:600;color:var(--blue);
  background:var(--blue-soft);border:1px solid rgba(27,63,110,.18);
  border-radius:6px;padding:4px 10px;cursor:pointer;transition:all .15s
}
.also-chip:hover{background:var(--blue);color:white}

/* ── BACK BUTTON ── */
#back-btn{display:none;margin-bottom:16px}
.back-link{font-size:13px;color:var(--blue);cursor:pointer;background:none;border:none;padding:0;text-decoration:underline}
</style>
</head>

    desc:'Calculates the minimum acceptable sale price for a MACRS asset you own, accounting for shields already claimed and your target return.',
    steps:[
      ['What it does.','Calculates the minimum price you should accept for a MACRS asset you own, given original cost, shields claimed, and your target return.'],
      ['What you need.','Original cost, MACRS property class, asset life, current age, annual benefit, tax rate, and target return.'],

  UM13:{id:'UM13',region:'us',file:'capplan_us_model13.html',

    steps:[
      ['What it does.','Calculates the maximum price you should pay for a MACRS asset and still earn your target return — accounting for MACRS tax shields and salvage value, both of which scale with the price paid.'],

    ],
    also:['UM12','UM1']},

// ── DECISION TREE ─────────────────────────────────────────────────────────────
var TREE = {

  root:{id:'root',step:1,label:'What kind of decision are you facing?',
    question:'What kind of decision are you facing?',
    sub:'Tell us what you are trying to work out and we will point you to the right model.',
    choices:[
      {icon:'🛒',title:'Buying or acquiring an asset',
       desc:'Evaluating a purchase, comparing options, or working out the maximum you should pay',
       next:'buying'},
      {icon:'🔄',title:'Replacing an asset we own',
       desc:'Deciding whether to replace, comparing replacements, or finding the optimal timing',
       next:'replacing'},
      {icon:'📋',title:'Leasing — as lessee or lessor',
       desc:'Comparing lease vs buy, setting a lease rate, or finding out what a lease is costing us',
       next:'leasing'},
      {icon:'💰',title:'Pricing our equipment or services',
       desc:'Setting a minimum hourly rate, tender price, or lease payment to recover our costs',

      {icon:'🏷️',title:'Valuing an asset we own',

  buying:{id:'buying',step:2,label:'Buying or acquiring',
    question:'What best describes your situation?',
    sub:'',
    choices:[
      {icon:'✅',title:'Evaluating a single asset purchase',
       desc:'I want to know whether buying this specific asset makes financial sense',
       next:'M'},
      {icon:'⚖️',title:'Comparing two or more options',
       desc:'I have several candidates and want to pick the one with the best financial return',
       next:'M_compare'},
      {icon:'💲',title:'Working out the maximum I should pay',

  replacing:{id:'replacing',step:2,label:'Replacing an asset',
    question:'What best describes your situation?',
    sub:'',
    choices:[
      {icon:'🔁',title:'Should I replace now?',
       desc:'I want to know whether replacing my current asset with a new one is financially justified',
       next:'M_replace_now'},
      {icon:'🏆',title:'Which replacement is best?',
       desc:'I have multiple replacement options and want to pick the one with the highest NPV',
       next:'M_replace_which'},
      {icon:'📅',title:'When is the right time to replace?',
       desc:'I want to find the year that minimises my total annual cost of ownership',
       next:'M_replace_when'},
    ]},

  leasing:{id:'leasing',step:2,label:'Leasing',
    question:'What best describes your situation?',
    sub:'',
    choices:[
      {icon:'⚖️',title:'Lease vs buy — which is cheaper?',
       desc:'I am deciding whether to lease or purchase an asset and want to compare the total cost',
       next:'M_lease_vs_buy'},
      {icon:'🏦',title:'I own an asset — should I sell and lease it back?',
       desc:'I am considering releasing capital by selling and leasing back an asset I currently own',
       next:'M_leaseback'},
      {icon:'📊',title:'I am already leasing — what is it costing me?',

    question:'What type of pricing are you setting?',

    choices:[
      {icon:'📝',title:'Minimum lease payment',
       desc:'I own an asset and want to lease it out — what is the minimum payment I need to charge?',
       next:'M_pricing_lease'},

       desc:'I rent out equipment by the hour — what is the minimum rate to recover my costs?',
       next:'M_pricing_hourly'},

    question:'What do you need to know?',

      {icon:'🔻',title:'Minimum selling price',
       desc:'I want to sell an asset I own — what is the lowest price I should accept?',
       next:'M_minprice'},

// ── STATE ─────────────────────────────────────────────────────────────────────
var REGION = 'non-us';  // 'non-us' or 'us'
var CURRENT = 'root';
var PATH = [];

// ── HELPERS ──────────────────────────────────────────────────────────────────
function modelId(base){
  // Map base model IDs to region-specific IDs
  if(REGION==='us') return 'U'+base;  // M1 → UM1
  return base;
}

function getModel(base){
  return MODELS[modelId(base)];
}

function goBack(){
  if(PATH.length===0) return;
  CURRENT = PATH.pop();
  render();
}

function startOver(){
  CURRENT='root';
  PATH=[];
  render();
}

function choose(next){
  // next is either a tree node id or a model base id starting with 'M_' or 'M'
  PATH.push(CURRENT);
  CURRENT = next;
  render();
}

function openModel(file){
  window.location.href = file;
}

// ── RESULT NODES (map tree leaf IDs to model base IDs) ───────────────────────
var RESULTS = {
  'M':           'M1',   // single asset evaluation
  'M_compare':   'M2',
  'M_maxprice':  'M13',
  'M_replace_now':   'M3',
  'M_replace_which': 'M4',
  'M_replace_when':  'M5',
  'M_lease_vs_buy':  'M9',
  'M_leaseback':     'M10',
  'M_lease_cost':    'M11',
  'M_pricing_lease':   'M6',
  'M_pricing_hourly':  'M7',
  'M_pricing_tender':  'M8',
  'M_minprice':  'M12',
};

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  renderBreadcrumb();
  document.getElementById('back-btn').style.display = PATH.length>0?'block':'none';
  document.getElementById('start-over').style.display = PATH.length>0?'block':'none';

  // Check if current node is a result
  if(RESULTS[CURRENT]){
    renderResult(getModel(RESULTS[CURRENT]));
  } else {
    renderQuestion(TREE[CURRENT]);
  }
}

function renderBreadcrumb(){
  var crumbs = [];
  for(var i=0;i<PATH.length;i++){
    var node = TREE[PATH[i]];
    if(node && node.label) crumbs.push(node.label);
  }
  if(RESULTS[CURRENT]){
    crumbs.push('Recommendation');
  } else if(TREE[CURRENT]){
    crumbs.push(TREE[CURRENT].label);
  }
  var bc = document.getElementById('breadcrumb');
  bc.innerHTML = crumbs.map(function(c,i){
    return i===crumbs.length-1 ?
      '<span>'+c+'</span>' :
      c+' <span style="color:var(--t3)">›</span> ';
  }).join('');
}

function renderQuestion(node){
  var html = '';

  // Region toggle only on root
  if(node.id==='root'){
    html += '<div style="margin-bottom:24px">';
    html += '<div style="font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Jurisdiction</div>';
    html += '<div class="region-toggle">';
    html += '<button class="region-btn'+(REGION==='non-us'?' active':'')+'" onclick="setRegion(\'non-us\')">🌍 Non-US</button>';
    html += '<button class="region-btn'+(REGION==='us'?' active':'')+'" onclick="setRegion(\'us\')">🇺🇸 United States (MACRS)</button>';
    html += '</div>';
    if(REGION==='us'){
      html += '<div style="font-size:12px;color:var(--t2);background:var(--blue-soft);border:1px solid rgba(27,63,110,.15);border-radius:6px;padding:8px 12px;margin-top:6px">';
      html += '🏛️ <strong>US Edition</strong> — MACRS depreciation applies. Bonus depreciation (100%, permanent under OBBBA) and Section 179 expensing are available where applicable.';
      html += '</div>';
    }
    html += '</div>';
  }

  html += '<div class="q-card">';
  if(node.step) html += '<div class="q-step-label">Step '+node.step+' of 2</div>';
  html += '<div class="q-title">'+node.question+'</div>';
  if(node.sub) html += '<div class="q-sub">'+node.sub+'</div>';
  html += '<div class="choices">';
  node.choices.forEach(function(c){
    html += '<button class="choice-btn" onclick="choose(\''+c.next+'\')">'+
      '<div class="choice-icon">'+c.icon+'</div>'+
      '<div class="choice-text">'+
        '<div class="choice-title">'+c.title+'</div>'+
        '<div class="choice-desc">'+c.desc+'</div>'+
      '</div>'+
    '</button>';
  });
  html += '</div></div>';
  document.getElementById('main-content').innerHTML = html;
}

function renderResult(model){
  var alsoModels = (model.also||[]).map(function(id){
    // id may be like 'M2' or 'UM2' — look up directly
    return MODELS[id] || MODELS['U'+id] || MODELS[id.replace('U','')];
  }).filter(Boolean);

  var regionLabel = model.region==='us' ? '🇺🇸 US Edition — MACRS' : '🌍 Non-US Edition';

  var html = '<div class="result-card">';

  // Head
  html += '<div class="result-head">';
  html += '<div class="result-badge">Recommended</div>';
  html += '<div class="result-head-text">';
  html += '<div class="result-model-label">Your model</div>';
  html += '<div class="result-title">'+model.title+'</div>';
  html += '<div class="result-region">'+regionLabel+'</div>';
  html += '</div></div>';

  // Body
  html += '<div class="result-body">';
  html += '<div class="result-question">'+model.question+'</div>';
  html += '<div class="result-desc">'+model.desc+'</div>';

  // HTW card
  html += '<div class="htw-card">';
  html += '<div class="htw-title">How this works</div>';
  html += '<div class="htw-steps">';
  model.steps.forEach(function(step,i){
    html += '<div class="htw-step">';
    html += '<div class="htw-num">'+(i+1)+'</div>';
    html += '<div class="htw-step-text"><strong>'+step[0]+'</strong> '+step[1]+'</div>';
    html += '</div>';
  });
  html += '</div></div>';

  // Action button
  html += '<div class="result-actions">';
  html += '<button class="open-btn" onclick="openModel(\''+model.file+'\')">Open '+model.title+' →</button>';
  html += '</div>';

  // Also consider
  if(alsoModels.length>0){
    html += '<div class="also-label">Also worth considering</div>';
    html += '<div class="also-chips">';
    alsoModels.forEach(function(m){
      html += '<span class="also-chip" onclick="showModel(\''+m.id+'\')">'+m.title+'</span>';
    });
    html += '</div>';
  }

  html += '</div></div>';
  document.getElementById('main-content').innerHTML = html;
  window.scrollTo(0,0);
}

function showModel(id){
  var model = MODELS[id];
  if(!model) return;
  PATH.push(CURRENT);
  CURRENT = '_model_'+id;
  // Temporarily store result
  RESULTS['_model_'+id] = id.startsWith('U') ? id.replace('U','M') : id;
  // Find the right model
  renderResult(model);
  renderBreadcrumb();
  document.getElementById('back-btn').style.display='block';
  document.getElementById('start-over').style.display='block';
}

function setRegion(r){
  REGION = r;
  render();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
