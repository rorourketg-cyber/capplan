<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapPlan — Sale and Leaseback</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#F7F8FA;color:#0F1D2E;font-size:14px}
input,select,button{font-family:inherit;font-size:14px}
button{cursor:pointer;background:none;border:none}
select{-webkit-appearance:none;appearance:none}
:root{--blue:#1B3F6E;--green:#2E7D52;--surface:#F7F8FA;--panel:#fff;--border:#E2E6EC;--t1:#0F1D2E;--t2:#4A5568;--t3:#8A96A6;--warn:#C84B31;--blue-soft:rgba(27,63,110,0.08);--green-soft:rgba(46,125,82,0.09);--amber:#F59E0B;--amber-soft:#FFFBEB;--amber-dark:#92400E;--amber-mid:#FEF3C7}
#masthead{background:var(--blue);height:72px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:34px;height:34px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center}
.logo-text{font-family:Georgia,serif;font-size:22px;color:white}.logo-text span{color:#A8C5E8}
.module-name{font-size:13px;font-weight:700;color:rgba(255,255,255,0.85)}
#stepper{background:white;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px}
.step{display:flex;align-items:center;gap:8px;padding:13px 4px;border-bottom:2px solid transparent}
.step.active{border-bottom-color:var(--blue)}.step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--border);color:var(--t3)}
.step.active .step-num{background:var(--blue);color:white}.step.done .step-num{background:var(--green);color:white}
.step-label{font-size:13px;font-weight:500;color:var(--t3)}.step.active .step-label{color:var(--blue)}.step.done .step-label{color:var(--green)}
.step-sep{color:var(--border);margin:0 8px;font-size:16px}
.page{max-width:1100px;margin:0 auto;padding:24px 22px}
.page-grid{display:grid;grid-template-columns:310px 1fr;gap:22px}
.p2-grid{display:grid;grid-template-columns:280px 1fr;gap:22px}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;margin-bottom:18px}

.field.full{grid-column:1/-1;border-right:none}.field.last{border-bottom:none}

.coll-head:hover{background:var(--surface)}

table{width:100%;border-collapse:collapse;font-size:12.5px}
th{padding:8px 14px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);border-bottom:1px solid var(--border);white-space:nowrap;background:var(--surface)}
th.left{text-align:left}
td{padding:8px 14px;text-align:right;font-family:monospace;border-bottom:1px solid var(--border)}
td.left{text-align:left;font-family:inherit;color:var(--t1)}
td.sub{text-align:left;font-family:inherit;color:var(--t3);font-size:11px}
td.neg{color:var(--warn)}
tr.total-row td{font-weight:700;background:var(--surface)}
tr:nth-child(even){background:var(--surface)}
tr.highlight td{background:var(--blue-soft)!important;font-weight:700;color:var(--blue)}
.modal-overlay{position:fixed;inset:0;background:rgba(15,29,46,.82);z-index:9999;display:flex;align-items:center;justify-content:center}
.modal-box{background:white;border-radius:10px;overflow:hidden;width:min(820px,95vw)}

.video-wrap{position:relative;padding-bottom:56.25%;height:0}

@media print{
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}

}

<body>
<div id="masthead">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 18 18" width="18" height="18" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,10 7,14 15,4"/></svg></div>
    <div class="logo-text">Cap<span>Plan</span></div>
  </div>
  <div class="module-name">Sale and Leaseback</div>
  <div style="position:relative">
    <button style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:5px;padding:6px 12px;color:white;font-size:12px;font-weight:600" id="cur-btn" onclick="toggleCur()"><span id="cur-label">$ USD</span> ▾</button>
    <div id="cur-dropdown" style="display:none;position:absolute;right:0;top:110%;background:white;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(15,29,46,.16);min-width:200px;z-index:300;overflow:hidden"></div>
  </div>
</div>
<div id="model-banner">Does selling and leasing back this asset make financial sense?</div>
<div id="stepper">
  <div class="step active" id="step1"><div class="step-num" id="sn1">1</div><div class="step-label">Asset &amp; Lease Details</div></div>
  <div class="step-sep">›</div>
  <div class="step" id="step2"><div class="step-num" id="sn2">2</div><div class="step-label">Results</div></div>
</div>
<div id="main-content"></div>
<script>
var CURRENCIES=[
  {code:"USD",symbol:"$",label:"US Dollar"},{code:"EUR",symbol:"€",label:"Euro"},
  {code:"JPY",symbol:"¥",label:"Japanese Yen"},{code:"GBP",symbol:"£",label:"British Pound"},
  {code:"INR",symbol:"₹",label:"Indian Rupee"},{code:"CHF",symbol:"CHF",label:"Swiss Franc"},
  {code:"CAD",symbol:"CA$",label:"Canadian Dollar"},{code:"AUD",symbol:"AU$",label:"Australian Dollar"},
  {code:"NZD",symbol:"NZ$",label:"New Zealand Dollar"}
];
function getSym(){var c=CURRENCIES.find(function(c){return c.code===S.currency});return c?c.symbol:"$"}

var S={
  page:1,currency:"USD",cur_open:false,
  coc_open:false,coc_mode:"wacc",coc_kd:6,coc_ke:12,coc_wd:40,
  coc_rf:4.5,coc_beta:1.0,coc_mrp:5.5,
  res:null,show_dcf:false,show_depr:false,show_borrow_sens:false,
  missingFields:null,
  price:"",life:"",salvage:"",method:"Double-declining",hyr:true,ddbRate:"",
  term:"",deposit:true,depositAmt:"",freq:1,leasePmt:"",endPrice:"",
  taxRate:"",borrowRate:"",roi:""
};

function toggleCur(){
  S.cur_open=!S.cur_open;
  var dd=document.getElementById("cur-dropdown");
  dd.style.display=S.cur_open?"block":"none";
  if(S.cur_open){
    dd.innerHTML="";
    CURRENCIES.forEach(function(c){
      var b=document.createElement("button");
      b.style.cssText="display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;background:"+(c.code===S.currency?"var(--blue-soft)":"transparent")+";border:none;border-bottom:1px solid var(--border);cursor:pointer";
      b.innerHTML='<span style="font-family:monospace;font-size:13px;font-weight:700;color:var(--blue);width:36px">'+c.symbol+'</span><span>'+c.label+'</span>';
      b.onclick=function(){S.currency=c.code;S.cur_open=false;render()};
      dd.appendChild(b);
    });
  }
}

// ── CALC ──────────────────────────────────────────────────────────────────────
function calcDepr(price,life,method,hyr,ddbRate){
  var d=[];
  if(method==="Double-declining"){
    var rate=ddbRate/100;d.push(price*rate*(hyr?0.5:1));
    for(var y=2;y<=life;y++)d.push((price-d.reduce(function(s,v){return s+v},0))*rate);
  }else if(method==="Straight-line"){
    var y1=price/life*(hyr?0.5:1);d.push(y1);
    for(var y=2;y<=life;y++)d.push(hyr?(price-y1)/(life-1):price/life);
  }else{
    var y1=hyr?price/(life+1):2*price/(life+1);d.push(y1);
    if(hyr)for(var y=2;y<=life;y++)d.push(2*price*(life-y+1)/((life+1)*(life-1)));
    else    for(var y=2;y<=life;y++)d.push(price*(life-y+1)*2/(life*(life+1)));
  }
  return d;
}

function calcNPV(price,life,salvage,method,hyr,ddbRate,term,deposit,depositAmt,freq,leasePmt,taxRate,borrowRate,roi){
  var tx=taxRate/100;
  var atb=borrowRate*(1-tx)/100;   // after-tax borrowing rate as decimal
  var r2=roi/100;                   // required return as decimal
  // Periodic rate for lease payments
  var rp=Math.pow(1+atb,1/freq)-1;
  var totalN=term*freq;
  var hasDep=deposit&&depositAmt>0;
  var n=hasDep?(totalN-1):totalN;

  // ── OUTFLOWS ──────────────────────────────────────────────────────────────
  // 1. Deposit
  var pvDep=hasDep?depositAmt:0;
  // 2. Tax shield on deposit (year 1)
  var pvDepTS=hasDep?-depositAmt*tx/(1+atb):0;
  // 3. Lease payments (n periods at periodic rate)
  var afPmt=rp>0&&n>0?(1-Math.pow(1+rp,-n))/rp:n;
  var pvPmts=leasePmt*afPmt;
  // 4. Tax shield on lease payments (one annual period later)
  var pvPmtTS=-leasePmt*tx*afPmt/(1+atb);
  // 5. Lost depreciation tax shields (discounted at AT borrow rate)
  var depr=calcDepr(price,life,method,hyr,ddbRate);
  var pvLostTS=depr.reduce(function(s,d,i){return s+d*tx/Math.pow(1+atb,i+1)},0);
  // 6. Lost salvage value (discounted at ROI — uncertain)
  var pvLostSalv=salvage/Math.pow(1+r2,life);
  // 7. Loss of tax shield on salvage (discounted at ROI)
  var pvLostSalvTS=-salvage*tx/Math.pow(1+r2,life);

  var pvOut=pvDep+pvDepTS+pvPmts+pvPmtTS+pvLostTS+pvLostSalv+pvLostSalvTS;

  // ── INFLOW ────────────────────────────────────────────────────────────────
  var pvIn=price;  // selling price received at year 0

  var npv=pvIn-pvOut;
  var afROI=r2>0?(1-Math.pow(1+r2,-life))/r2:life;
  var annNPV=npv/afROI;
  var bc=pvOut>0?pvIn/pvOut:0;

  return{npv:npv,pvOut:pvOut,pvIn:pvIn,annNPV:annNPV,bc:bc,
    pvDep:pvDep,pvDepTS:pvDepTS,pvPmts:pvPmts,pvPmtTS:pvPmtTS,
    pvLostTS:pvLostTS,pvLostSalv:pvLostSalv,pvLostSalvTS:pvLostSalvTS,
    depr:depr,atb:atb*100,afROI:afROI};
}

function calcAll(){
  var res=calcNPV(+S.price,+S.life||1,+S.salvage,S.method,S.hyr,+S.ddbRate,
                  +S.term||+S.life||1,S.deposit,+S.depositAmt||0,+S.freq,
                  +S.leasePmt,+S.taxRate,+S.borrowRate,+S.roi);
  // Borrowing rate sensitivity
  var borrowSens=[-4,-3,-2,-1,0,1,2,3,4].map(function(delta){
    var b2=+S.borrowRate+delta;if(b2<=0)return{label:b2+"%",npv:0};
    var r2=calcNPV(+S.price,+S.life||1,+S.salvage,S.method,S.hyr,+S.ddbRate,
                   +S.term||+S.life||1,S.deposit,+S.depositAmt||0,+S.freq,
                   +S.leasePmt,+S.taxRate,b2,+S.roi);
    return{label:b2+"%",npv:r2.npv};
  });
  res.borrowSens=borrowSens;
  return res;
}

// ── FORMAT ────────────────────────────────────────────────────────────────────
function fmt(n,d){if(n==null||isNaN(n))return"--";d=d||0;return n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d})}
function fmtM(n){if(n==null||isNaN(n))return"--";var s=getSym();return n<0?"-"+s+fmt(Math.abs(n)):s+fmt(n)}

// ── STEPPER ───────────────────────────────────────────────────────────────────
function updateStepper(){
  for(var i=1;i<=2;i++){
    var step=document.getElementById("step"+i),sn=document.getElementById("sn"+i);
    step.className="step";
    if(i<S.page){step.classList.add("done");sn.textContent="✓"}
    else if(i===S.page){step.classList.add("active");sn.textContent=String(i)}
    else sn.textContent=String(i);
    var n=i;
    (function(n,step){step.onclick=function(){if(n<S.page||(n===2&&S.res)){S.page=n;render()}}})(n,step);
    step.style.cursor=(i<S.page||(i===2&&S.res))?"pointer":"default";
  }
}

// ── BRIEFING NOTES ────────────────────────────────────────────────────────────
var NOTES1=[
  {q:"What is a sale and leaseback?",
   a:"A sale and leaseback is an arrangement where you sell an asset you currently own to a buyer, and then immediately lease the same asset back from that buyer. You receive cash from the sale and continue using the asset. This model helps you decide whether this arrangement is financially worthwhile.",
   v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"Why would I consider a sale and leaseback?",
   a:"The main reason is to raise cash from an asset you already own without losing the use of it. Common motivations include: freeing up capital for other investments, improving your balance sheet by removing a fixed asset and its associated debt, or taking advantage of a favourable selling price for the asset. The cost is that you take on lease payments and lose the tax shields from depreciation.",
   v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"Why are two different discount rates used in this analysis?",
   a:"This is an important distinction. The after-tax borrowing rate is used to discount cash flows that are contractual and relatively certain — specifically, the lease payments, the tax shields on those payments, and the depreciation tax shields you give up. These cash flows are similar in nature to debt obligations and carry low risk, so the after-tax cost of borrowing is the appropriate rate.\n\nThe required return on investment (your cost of capital) is used only for the salvage value and the associated tax shield on salvage. Salvage value is inherently uncertain — it depends on market conditions, the physical condition of the asset, and obsolescence years in the future. Because it is risky, it deserves to be discounted at a higher rate that reflects that risk. Using your full cost of capital for this component, and the lower after-tax borrowing rate for the certain cash flows, produces a more accurate valuation than using a single rate throughout.",
   v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"What is the selling price of the asset?",
   a:"This is the price you receive from the buyer/lessor for the asset. It is also used as the depreciable base for the depreciation tax shields you give up, on the assumption that the selling price reflects the current book value of the asset. If the selling price differs materially from the book value, the depreciation schedule may need adjustment.",
   v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"What are the outflows in this analysis?",

// ── VALIDATION ────────────────────────────────────────────────────────────────
function validateInputs(){
  var errs=[];
  if(+S.price<=0) errs.push("Asset sale price must be greater than zero");
  if(+S.life<=0) errs.push("Remaining asset life must be greater than zero");
  if(S.salvage!==''&&+S.salvage<0) errs.push("Salvage value cannot be negative");
  if(+S.term<=0) errs.push("Lease term must be greater than zero");
  if(+S.term>+S.life) errs.push("Lease term cannot exceed asset life");
  if(S.deposit&&+S.depositAmt<0) errs.push("Deposit amount cannot be negative");
  if(+S.leasePmt<=0) errs.push("Lease payment must be greater than zero");
  if(S.method==="Double-declining"&&!(+S.ddbRate>0)) errs.push("Depreciation rate must be greater than zero for double-declining method");
  if(+S.taxRate<0||+S.taxRate>=100) errs.push("Tax rate must be between 0 and 100");
  if(+S.borrowRate<=0) errs.push("Borrowing rate must be greater than zero");
  if(+S.roi<=0) errs.push("Required return must be greater than zero");
  return errs;
}

  if(!S.term)missing.push("Lease Term");

// ── CHART ─────────────────────────────────────────────────────────────────────
function drawChart(canvasId,data){
  var canvas=document.getElementById(canvasId);if(!canvas)return;
  var ctx=canvas.getContext("2d"),W=canvas.width,H=canvas.height;
  var pad={top:16,bottom:48,left:80,right:16};
  var cw=W-pad.left-pad.right,ch=H-pad.top-pad.bottom;
  ctx.clearRect(0,0,W,H);
  var vals=data.map(function(d){return d.npv});
  var minV=Math.min.apply(null,vals),maxV=Math.max.apply(null,vals);
  var rng=maxV-minV||Math.abs(maxV)*0.4;var lo=minV-rng*0.15,hi=maxV+rng*0.15;
  var zeroY=(hi-lo)!==0?pad.top+ch*(hi/(hi-lo)):pad.top+ch*0.5;
  // Zero line
  ctx.strokeStyle="#E2E6EC";ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(pad.left,zeroY);ctx.lineTo(pad.left+cw,zeroY);ctx.stroke();
  ctx.setLineDash([]);
  // Grid
  ctx.strokeStyle="#E2E6EC";ctx.lineWidth=1;
  for(var i=0;i<=4;i++){
    var y=pad.top+ch*(1-i/4);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cw,y);ctx.stroke();
    ctx.fillStyle="#8A96A6";ctx.font="10px system-ui";ctx.textAlign="right";
    var v=lo+(hi-lo)*(i/4);ctx.fillText((v>=0?"":"-")+"$"+fmt(Math.abs(v/1000),0)+"k",pad.left-3,y+3);
  }
  var bw=Math.floor(cw/data.length*0.6),gap=cw/data.length,midIdx=Math.floor(data.length/2);
  data.forEach(function(d,i){
    var x=pad.left+gap*i+(gap-bw)/2,bh=Math.abs(d.npv)/(hi-lo)*ch;
    var y=d.npv>=0?zeroY-bh:zeroY;
    ctx.fillStyle=d.npv>=0?(i===midIdx?"#2E7D52":"#6DBF8A"):"#E53E3E";ctx.fillRect(x,y,bw,bh);
    ctx.fillStyle="#8A96A6";ctx.font=i===midIdx?"bold 10px system-ui":"10px system-ui";
    ctx.textAlign="center";ctx.fillText(d.label,x+bw/2,H-pad.bottom+13);
  });
  ctx.strokeStyle="#4A5568";ctx.lineWidth=1.5;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(pad.left,pad.top+ch);ctx.lineTo(pad.left+cw,pad.top+ch);ctx.stroke();
  ctx.fillStyle="#4A5568";ctx.font="bold 12px system-ui";ctx.textAlign="center";
  ctx.fillText("Borrowing Rate (%)",pad.left+cw/2,H-3);
}

  html+=field("Tax Rate",uInput("",S.taxRate,"inp-tax","S.taxRate=+this.value||0","%",false));
  html+=field("Borrowing Rate",uInput("",S.borrowRate,"inp-borrow","S.borrowRate=+this.value||0","%",false),false,false,"Pre-tax");
  html+=field("After-Tax Borrowing Rate",'<div class="ui"><input type="text" value="'+(S.borrowRate&&S.taxRate?fmt(+S.borrowRate*(1-+S.taxRate/100),2):"—")+'" disabled style="font-family:monospace;font-size:15px;font-weight:600;color:var(--t3);border:none;border-bottom:2px solid var(--border);background:transparent;width:100%;padding:2px 0"><span class="sfx">%</span></div>',false,false,"Computed automatically · used for lease &amp; depreciation cash flows");
  html+=field("Required Return on Investment",uInput("",S.roi,"inp-roi","S.roi=+this.value||0","%",false),false,true,"Used for salvage value · reflects its higher uncertainty");
  html+='</div></div>';

  if(S.missingFields&&S.missingFields.length>0){
    html+='<div style="background:rgba(200,75,49,.07);border:1.5px solid var(--warn);border-radius:8px;padding:12px 16px;margin-bottom:14px;font-size:13px;color:var(--warn)"><strong>Please complete:</strong> '+S.missingFields.join(", ")+'.</div>';
  }
  html+='<div class="action-row" style="justify-content:space-between;align-items:center">';
  html+='<span style="font-size:11.5px;color:var(--t3)">New here? Try <strong style="color:var(--t2)">Load Example</strong> to see how it works.</span>';
  html+='<div style="display:flex;gap:10px"><button class="btn-ghost" onclick="loadExample()">Load Example</button><button class="btn-ghost" onclick="resetInputs()">Reset</button><button class="btn-primary" onclick="goToResults()">Calculate ›</button></div></div>';
  html+='</main></div></div>';
  document.getElementById("main-content").innerHTML=html;
  makeBNList(NOTES1,"bn-list1");
  renderCoC();
  var freqSel=document.getElementById("freq-sel");if(freqSel)freqSel.value=String(S.freq);
  document.getElementById("cur-label").textContent=getSym()+" "+S.currency;
}

// ── PAGE 2: Results ────────────────────────────────────────────────────────────
function renderPage2(){
  var res=S.res,sym=getSym(),ok=res.npv>=0;
  var atbLabel=fmt(res.atb,2)+"%";

  var html='<div class="page"><div class="p2-grid"><aside>';
  html+='<div class="section-label">Understanding Results</div>';
  html+='<div class="panel" style="margin-bottom:14px"><div id="bn-list2"></div></div>';
  html+='<div style="display:flex;flex-direction:column;gap:10px"><button class="btn-ghost" onclick="S.page=1;render()">‹ Edit Inputs</button><button class="print-btn" onclick="printSummary()">🖶 Print Summary</button></div>';
  html+='</aside><main>';

  // Decision banner
  html+='<div class="result-banner '+(ok?"accept":"reject")+'">';
  html+='<div><div style="font-family:Georgia,serif;font-size:22px;color:'+(ok?"var(--green)":"var(--warn)")+';line-height:1.3"><strong>'+(ok?"Accept":"Reject")+'</strong> the sale and leaseback arrangement.</div>';
  html+='<div style="font-size:13px;color:var(--t2);margin-top:8px;line-height:1.6">The NPV is <strong>'+fmtM(res.npv)+'</strong>. '+(ok?"Selling and leasing back generates more value than retaining the asset.":"The cost of leasing back exceeds the benefit of the sale proceeds.")+'</div></div>';
  html+='<div style="background:'+(ok?"var(--green)":"var(--warn)")+';border-radius:10px;padding:14px 20px;text-align:center;flex-shrink:0">';
  html+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.75)">Net Present Value</div>';
  html+='<div style="font-family:monospace;font-size:26px;font-weight:800;color:white;margin-top:4px">'+fmtM(res.npv)+'</div></div></div>';

  // Orientation strip
  html+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 18px;margin-bottom:18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">';
  html+='<span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);flex-shrink:0">This page also provides:</span>';
  html+='<div style="display:flex;gap:8px;flex-wrap:wrap">';
  html+='<span style="font-size:12px;color:var(--t2);background:white;border:1px solid var(--border);border-radius:5px;padding:3px 10px">📊 NPV by borrowing rate</span>';
  html+='<span style="font-size:12px;color:var(--t2);background:white;border:1px solid var(--border);border-radius:5px;padding:3px 10px">📋 Full DCF summary</span>';
  html+='<span style="font-size:12px;color:var(--t2);background:white;border:1px solid var(--border);border-radius:5px;padding:3px 10px">📉 Depreciation schedule</span>';
  html+='</div></div>';

  // Metrics
  html+='<div class="metrics">';
  html+='<div class="metric"><div class="metric-label">NPV</div><div class="metric-val '+(ok?"ok":"bad")+'">'+fmtM(res.npv)+'</div><div class="metric-sub">'+(ok?"Arrange is worthwhile":"Arrangement is not worthwhile")+'</div></div>';
  html+='<div class="metric"><div class="metric-label">Annualised NPV</div><div class="metric-val '+(ok?"ok":"bad")+'">'+fmtM(res.annNPV)+'</div><div class="metric-sub">Per year over '+S.life+' years at '+S.roi+'% return</div></div>';
  html+='<div class="metric"><div class="metric-label">Benefit / Cost Ratio</div><div class="metric-val '+(res.bc>=1?"ok":"bad")+'">'+fmt(res.bc,3)+'</div><div class="metric-sub">'+(res.bc>=1?"Inflows exceed outflows":"Outflows exceed inflows")+' · break-even = 1.000</div></div>';
  html+='</div>';

  // PV summary cards
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px">';
  html+='<div style="background:var(--green-soft);border:1.5px solid var(--green);border-radius:8px;padding:14px">';
  html+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--green);margin-bottom:6px">Inflow — Selling Price</div>';
  html+='<div style="font-family:monospace;font-size:22px;font-weight:800;color:var(--green)">'+fmtM(res.pvIn)+'</div>';
  html+='<div style="font-size:11px;color:var(--t3);margin-top:4px">Received at year 0</div></div>';
  html+='<div style="background:rgba(200,75,49,.06);border:1.5px solid var(--warn);border-radius:8px;padding:14px">';
  html+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--warn);margin-bottom:6px">PV of All Outflows</div>';
  html+='<div style="font-family:monospace;font-size:22px;font-weight:800;color:var(--warn)">'+fmtM(res.pvOut)+'</div>';
  html+='<div style="font-size:11px;color:var(--t3);margin-top:4px">Net lease cost + lost tax benefits + lost salvage</div></div>';
  html+='</div>';

  // Chart
  html+='<div class="chart-box"><div class="chart-title">NPV by Borrowing Rate</div>';
  html+='<div class="chart-sub">Bars above zero = worthwhile · Bars below zero = not worthwhile · Discounted at after-tax rate</div>';
  html+='<canvas id="npv-chart" width="700" height="240" style="width:100%;height:auto;display:block"></canvas></div>';

  // DCF Summary
  html+='<div class="collapsible"><div class="coll-head" onclick="S.show_dcf=!S.show_dcf;renderPage2()"><span class="coll-title">DCF Summary</span><span class="coll-arr" style="transform:'+(S.show_dcf?'rotate(90deg)':'rotate(0deg)')+'" >›</span></div>';
  if(S.show_dcf){
    html+='<div class="coll-body open"><table><tbody>';
    html+='<tr class="total-row"><td class="left" colspan="2">Present Value of Inflows</td><td></td></tr>';
    html+='<tr><td class="left">Selling price of asset</td><td class="sub">Year 0</td><td>'+fmtM(res.pvIn)+'</td></tr>';
    html+='<tr class="total-row"><td class="left" colspan="2">Present Value of Outflows</td><td></td></tr>';
    var rows=[
      ["Initial deposit","Year 0",res.pvDep,"—"],
      ["Less: Tax shield on deposit","Year 1",res.pvDepTS,atbLabel],
      ["Lease payments","Years 1–"+(S.deposit?+S.term-1:S.term),res.pvPmts,atbLabel],
      ["Less: Tax shield on payments","Years 2–"+S.term,res.pvPmtTS,atbLabel],
      ["Lost depreciation tax shields","Years 1–"+S.life,res.pvLostTS,atbLabel],
      ["Lost salvage value","Year "+S.life,res.pvLostSalv,S.roi+"%"],
      ["Less: Lost tax shield on salvage","Year "+S.life,res.pvLostSalvTS,S.roi+"%"]
    ];
    rows.forEach(function(r){
      if(!S.deposit&&(r[0].includes("deposit")||r[0].includes("Deposit")))return;
      html+='<tr><td class="left">'+r[0]+'</td><td class="sub">'+r[1]+'  <span style="background:var(--blue-soft);color:var(--blue);font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;font-family:inherit">'+r[3]+'</span></td><td class="'+(r[2]<0?"neg":"")+'">'+fmtM(r[2])+'</td></tr>';
    });
    html+='<tr class="total-row"><td class="left" colspan="2">Total PV of Outflows</td><td>'+fmtM(res.pvOut)+'</td></tr>';
    html+='<tr style="border-top:2px solid var(--blue)" class="total-row"><td class="left" colspan="2">Net Present Value (Inflows − Outflows)</td><td style="color:'+(ok?"var(--green)":"var(--warn)")+';font-size:15px">'+fmtM(res.npv)+'</td></tr>';
    html+='</tbody></table></div>';
  }
  html+='</div>';

  // Depreciation schedule
  html+='<div class="collapsible"><div class="coll-head" onclick="S.show_depr=!S.show_depr;renderPage2()"><span class="coll-title">Lost Depreciation Schedule</span><span class="coll-arr" style="transform:'+(S.show_depr?'rotate(90deg)':'rotate(0deg)')+'" >›</span></div>';
  if(S.show_depr){
    var atbDec=res.atb/100;
    html+='<div class="coll-body open"><table><thead><tr><th class="left">Year</th><th>Depreciation</th><th>Lost Tax Shield</th><th>PV of Lost Shield</th></tr></thead><tbody>';
    res.depr.forEach(function(d,i){
      var yr=i+1,ts=d*(+S.taxRate/100),pvts=ts/Math.pow(1+atbDec,yr);
      html+='<tr><td class="left">'+yr+'</td><td>'+fmtM(d)+'</td><td>'+fmtM(ts)+'</td><td>'+fmtM(pvts)+'</td></tr>';
    });
    html+='<tr class="total-row"><td class="left">Total</td><td>'+fmtM(res.depr.reduce(function(s,d){return s+d},0))+'</td><td>'+fmtM(res.depr.reduce(function(s,d){return s+d*(+S.taxRate/100)},0))+'</td><td>'+fmtM(res.pvLostTS)+'</td></tr>';
    html+='</tbody></table></div>';
  }
  html+='</div>';
  html+='</main></div></div>';

  document.getElementById("main-content").innerHTML=html;
  makeBNList(NOTES2,"bn-list2");
  setTimeout(function(){drawChart("npv-chart",res.borrowSens)},50);
  document.getElementById("cur-label").textContent=getSym()+" "+S.currency;
}

// ── PRINT ─────────────────────────────────────────────────────────────────────
function printSummary(){
  var res=S.res;if(!res)return;
  var pd=S.show_dcf,pd2=S.show_depr,pd3=S.show_borrow_sens;
  S.show_dcf=true;S.show_depr=true;
  renderPage2();
  setTimeout(function(){
    document.querySelectorAll('canvas').forEach(function(c){
      var img=document.createElement('img');img.src=c.toDataURL('image/png');
      img.style.cssText='width:100%;height:auto;display:block';c.parentNode.replaceChild(img,c);
    });
    window.print();
    S.show_dcf=pd;S.show_depr=pd2;renderPage2();
  },300);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  updateStepper();
  if(S.page===1)renderPage1();
  else if(S.page===2&&S.res)renderPage2();
  var cl=document.getElementById("cur-label");
  if(cl)cl.textContent=getSym()+" "+S.currency;
}
render();
</script>
</body>
</html>
