<style>

body{font-family:system-ui,sans-serif;background:#F7F8FA;color:#0F1D2E;font-size:14px}

.sens-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:10px}

<body>
<div id="masthead">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 18 18" width="18" height="18" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,10 7,14 15,4"/></svg></div>
    <div class="logo-text">Cap<span>Plan</span></div>
  </div>
  <div class="module-name">Setting a Lease Rate</div>
  <div style="position:relative">
    <button style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:5px;padding:6px 12px;color:white;font-size:12px;font-weight:600" id="cur-btn" onclick="toggleCur()"><span id="cur-label">$ USD</span> ▾</button>
    <div id="cur-dropdown" style="display:none;position:absolute;right:0;top:110%;background:white;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(15,29,46,.16);min-width:200px;z-index:300;overflow:hidden"></div>
  </div>
</div>
<div id="model-banner">What is the minimum lease payment that covers our costs?</div>
<div id="stepper">
  <div class="step active" id="step1"><div class="step-num" id="sn1">1</div><div class="step-label">Asset &amp; Lease Details</div></div>
  <div class="step-sep">›</div>
  <div class="step" id="step2"><div class="step-num" id="sn2">2</div><div class="step-label">Results</div></div>
</div>
<div id="main-content"></div>
<script>
var CURRENCIES=[
  {code:"USD",symbol:"$",label:"US Dollar"},{code:"EUR",symbol:"€",label:"Euro"},
  {code:"JPY",symbol:"¥",label:"Japanese Yen"},{code:"GBP",symbol:"£",label:"British Pound"},
  {code:"INR",symbol:"₹",label:"Indian Rupee"},{code:"CHF",symbol:"CHF",label:"Swiss Franc"},
  {code:"CAD",symbol:"CA$",label:"Canadian Dollar"},{code:"AUD",symbol:"AU$",label:"Australian Dollar"},
  {code:"NZD",symbol:"NZ$",label:"New Zealand Dollar"}
];
function getSym(){var c=CURRENCIES.find(function(c){return c.code===S.currency});return c?c.symbol:"$"}

var S={
  page:1,currency:"USD",cur_open:false,
  coc_open:false,coc_mode:"wacc",coc_kd:6,coc_ke:12,coc_wd:40,
  coc_rf:4.5,coc_beta:1.0,coc_mrp:5.5,
  res:null,show_table:false,show_depr:false,show_term_sens:false,show_dep_sens:false,ep_open:false,ep_rate:"",missingFields:null,
  // inputs — blank by default
  price:"",itcPct:"",life:"",salvage:"",
  method:"Double-declining",hyr:true,ddbRate:"",
  term:"",deposit:true,depositAmt:"",freq:1,endPrice:"",
  taxRate:"",coc:""
};

function toggleCur(){
  S.cur_open=!S.cur_open;
  var dd=document.getElementById("cur-dropdown");
  dd.style.display=S.cur_open?"block":"none";
  if(S.cur_open){
    dd.innerHTML="";
    CURRENCIES.forEach(function(c){
      var b=document.createElement("button");
      b.style.cssText="display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;background:"+(c.code===S.currency?"var(--blue-soft)":"transparent")+";border:none;border-bottom:1px solid var(--border);cursor:pointer";
      b.innerHTML='<span style="font-family:monospace;font-size:13px;font-weight:700;color:var(--blue);width:36px">'+c.symbol+'</span><span>'+c.label+'</span>';
      b.onclick=function(){S.currency=c.code;S.cur_open=false;render()};
      dd.appendChild(b);
    });
  }
}

// ── CALC ──────────────────────────────────────────────────────────────────────
function calcDepr(price,itcPct,life,method,hyr,ddbRate){
  var itc=price*itcPct/100;
  var base=price-itc;
  var d=[];
  if(method==="Double-declining"){
    var rate=ddbRate/100;
    d.push(base*rate*(hyr?0.5:1));
    for(var y=2;y<=life;y++)d.push((base-d.reduce(function(s,v){return s+v},0))*rate);
  } else if(method==="Straight-line"){
    var y1=base/life*(hyr?0.5:1);d.push(y1);
    for(var y=2;y<=life;y++)d.push(hyr?(base-y1)/(life-1):base/life);
  } else {
    var y1=hyr?base/(life+1):2*base/(life+1);d.push(y1);
    if(hyr)for(var y=2;y<=life;y++)d.push(2*base*(life-y+1)/((life+1)*(life-1)));
    else    for(var y=2;y<=life;y++)d.push(base*(life-y+1)*2/(life*(life+1)));
  }
  return d;
}

function calcAll(){
  var price=+S.price,itcPct=+S.itcPct,life=+S.life,salvage=+S.salvage;
  var ddbRate=+S.ddbRate,tx=+S.taxRate/100,r=+S.coc/100;
  var term=+S.term,dep=S.deposit,depAmt=+S.depositAmt,freq=+S.freq;
  var endPx=+S.endPrice;
  var itc=price*itcPct/100;
  var depr=calcDepr(price,itcPct,life,S.method,S.hyr,ddbRate);

  // PV of outflows
  var pvOut=price;  // year 0

  // PV of known inflows
  var pvDeposit=dep?depAmt:0;                         // year 0
  var pvTaxDep=dep?-(depAmt*tx)/(1+r):0;             // year 1
  var pvITC=itc/(1+r);                                // year 1
  var pvTS=depr.reduce(function(s,d,i){return s+d*tx/Math.pow(1+r,i+1)},0);
  var pvSalv=endPx/Math.pow(1+r,term);               // end of lease
  var pvLoss=-(endPx*tx)/Math.pow(1+r,term);         // end of lease

  var pvKnownIn=pvDeposit+pvTaxDep+pvITC+pvTS+pvSalv+pvLoss;

  // After-tax annuity factor — use effective periodic rate for sub-annual frequencies
  var rp=Math.pow(1+r,1/freq)-1;  // effective periodic rate
  var n=term*freq;                 // total number of payments
  var af=(1-Math.pow(1+rp,-n))/rp*(1-tx);
  var leasePmt=(pvOut-pvKnownIn)/af;

  // Sensitivity: lease rate vs CoC
  var cocSens=[-4,-3,-2,-1,0,1,2,3,4].map(function(delta){
    var rc=(+S.coc+delta)/100;
    if(rc<=0)return{label:(+S.coc+delta)+"%",lease:0};
    var pvKI2=(dep?depAmt:0)-(dep?depAmt*tx/(1+rc):0)+itc/(1+rc)+
      depr.reduce(function(s,d,i){return s+d*tx/Math.pow(1+rc,i+1)},0)+
      endPx/Math.pow(1+rc,term)-endPx*tx/Math.pow(1+rc,term);
    var rp2=Math.pow(1+rc,1/freq)-1;
    var af2=(1-Math.pow(1+rp2,-(term*freq)))/rp2*(1-tx);
    return{label:(+S.coc+delta)+"%",lease:af2>0?(pvOut-pvKI2)/af2:0};
  });

  return{leasePmt:leasePmt,pvOut:pvOut,pvKnownIn:pvKnownIn,
    pvDeposit:pvDeposit,pvTaxDep:pvTaxDep,pvITC:pvITC,
    pvTS:pvTS,pvSalv:pvSalv,pvLoss:pvLoss,
    af:af,depr:depr,itc:itc,cocSens:cocSens};
}


// ── HELPER: calculate lease payment for arbitrary inputs ─────────────────────
function calcLease(price,itcPct,life,method,hyr,ddbRate,term,dep,depAmt,freq,endPx,taxRate,coc){
  var tx=taxRate/100,r=coc/100;
  var itc=price*itcPct/100;
  var depr=calcDepr(price,itcPct,life,method,hyr,ddbRate);
  var pvDeposit=dep?depAmt:0;
  var pvTaxDep=dep?-(depAmt*tx)/(1+r):0;
  var pvITC=itc/(1+r);
  var pvTS=depr.reduce(function(s,d,i){return s+d*tx/Math.pow(1+r,i+1)},0);
  var pvSalv=endPx/Math.pow(1+r,term);
  var pvLoss=-(endPx*tx)/Math.pow(1+r,term);
  var pvKnownIn=pvDeposit+pvTaxDep+pvITC+pvTS+pvSalv+pvLoss;
  var rp=Math.pow(1+r,1/freq)-1;
  var af=(1-Math.pow(1+rp,-(term*freq)))/rp*(1-tx);
  return af>0?(price-pvKnownIn)/af:0;
}

// ── HELPER: iterative deposit solver ─────────────────────────────────────────
function solveDepositEqualToPayment(){
  // Solve: deposit = lease_payment, where lease_payment depends on deposit
  // Iterate to convergence: start with no deposit, use result as next deposit
  var dep=0, lease=0;
  for(var i=0;i<50;i++){
    lease=calcLease(+S.price,+S.itcPct,+S.life,S.method,S.hyr,+S.ddbRate,
                    +S.term,true,dep,+S.freq,+S.endPrice,+S.taxRate,+S.coc);
    if(Math.abs(dep-lease)<0.01)break;
    dep=lease;
  }
  return{deposit:Math.round(lease),lease:Math.round(lease)};
}

// ── HELPER: suggested end-of-lease purchase price ────────────────────────────
function suggestEndPrice(price,term,svDeclineRate){
  // Estimate purchase option as salvage value at end of lease term
  // using a constant % decline model (same as Model 5)
  return Math.round(price*Math.pow(1-svDeclineRate/100,term));
}

// ── FORMAT ────────────────────────────────────────────────────────────────────
function fmt(n,d){if(n==null||isNaN(n))return"--";d=d||0;return n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d})}
function fmtM(n){if(n==null||isNaN(n))return"--";var s=getSym();return n<0?"-"+s+fmt(Math.abs(n)):s+fmt(n)}

// ── STEPPER ───────────────────────────────────────────────────────────────────
function updateStepper(){
  for(var i=1;i<=2;i++){
    var step=document.getElementById("step"+i),sn=document.getElementById("sn"+i);
    step.className="step";
    if(i<S.page){step.classList.add("done");sn.textContent="✓"}
    else if(i===S.page){step.classList.add("active");sn.textContent=String(i)}
    else sn.textContent=String(i);
    var n=i;
    (function(n,step){step.onclick=function(){if(n<S.page||(n===2&&S.res)){S.page=n;render()}}})(n,step);
    step.style.cursor=(i<S.page||(i===2&&S.res))?"pointer":"default";
  }
}

// ── BRIEFING NOTES ────────────────────────────────────────────────────────────
var NOTES1=[
  {q:"Does the lease term have to equal the economic life?",a:"No — but the longer the lease term relative to the asset's life, the lower the required payment, since more of the asset's value is recovered through use rather than resale."},
  {q:"What is the initial deposit?",a:"A security deposit held by the lessor during the lease. It is returned at the end and is not a cost — but it reduces the effective lease payment the lessee needs to make."},
  {q:"Why does the depreciation method affect the lease rate?",a:"Depreciation generates tax shields that reduce the after-tax cost of owning the asset. Methods that front-load depreciation produce larger early shields, allowing a lower lease rate."}

// ── VALIDATION ────────────────────────────────────────────────────────────────
function validateInputs(){
  var errs=[];
  if(+S.price<=0) errs.push("Asset price must be greater than zero");
  if(+S.life<=0) errs.push("Asset life must be greater than zero");
  if(S.salvage!==''&&+S.salvage<0) errs.push("Salvage value cannot be negative");
  if(S.salvage!==''&&+S.salvage>=+S.price) errs.push("Salvage cannot equal or exceed the asset price");
  if(+S.term<=0) errs.push("Lease term must be greater than zero");
  if(+S.term>+S.life) errs.push("Lease term cannot exceed asset life");
  if(S.endPrice!==''&&+S.endPrice<0) errs.push("End-of-lease purchase price cannot be negative");
  if(S.method==="Double-declining"&&!(+S.ddbRate>0)) errs.push("Depreciation rate must be greater than zero for double-declining method");
  if(+S.taxRate<0||+S.taxRate>=100) errs.push("Tax rate must be between 0 and 100");
  if(+S.coc<=0) errs.push("Required return must be greater than zero");
  return errs;
}
function goToResults(){
  var missing=[];
  if(!S.price)missing.push("Selling Price");
  if(S.itcPct===""||S.itcPct==null)missing.push("ITC");
  if(!S.life)missing.push("Economic Life");
  if(!S.salvage&&S.salvage!==0)missing.push("Salvage Value");
  if(S.method==="Double-declining"&&!S.ddbRate)missing.push("Depreciation Rate");
  if(!S.term)missing.push("Lease Term");

// ── CHART ─────────────────────────────────────────────────────────────────────
function drawChart(canvasId,data){
  var canvas=document.getElementById(canvasId);if(!canvas)return;
  var ctx=canvas.getContext("2d"),W=canvas.width,H=canvas.height;
  var pad={top:12,bottom:48,left:72,right:12};
  var cw=W-pad.left-pad.right,ch=H-pad.top-pad.bottom;
  ctx.clearRect(0,0,W,H);
  var vals=data.map(function(d){return d.lease}).filter(function(v){return v>0});
  if(!vals.length)return;
  var minV=Math.min.apply(null,vals),maxV=Math.max.apply(null,vals);
  var rng=maxV-minV||maxV*0.2; var lo=minV-rng*0.15,hi=maxV+rng*0.15;
  // Grid
  ctx.strokeStyle="#E2E6EC";ctx.lineWidth=1;
  for(var i=0;i<=4;i++){
    var y=pad.top+ch*(1-i/4);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cw,y);ctx.stroke();
    ctx.fillStyle="#8A96A6";ctx.font="10px system-ui";ctx.textAlign="right";
    ctx.fillText("$"+Math.round((lo+(hi-lo)*(i/4))/1000)+"k",pad.left-3,y+3);
  }
  // Bars
  var bw=Math.floor(cw/data.length*0.55),gap=cw/data.length;
  var midIdx=Math.floor(data.length/2);
  data.forEach(function(d,i){
    if(d.lease<=0)return;
    var x=pad.left+gap*i+(gap-bw)/2;
    var bh=(d.lease-lo)/(hi-lo)*ch;
    var y=pad.top+ch-bh;
    ctx.fillStyle=i===midIdx?"#1B3F6E":"#93B4D8";
    ctx.fillRect(x,y,bw,bh);
    ctx.fillStyle=i===midIdx?"var(--blue)":"#8A96A6";
    ctx.font=i===midIdx?"bold 10px system-ui":"10px system-ui";
    ctx.textAlign="center";ctx.fillText(d.label,x+bw/2,H-pad.bottom+13);
  });
  // Axis
  ctx.strokeStyle="#4A5568";ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(pad.left,pad.top+ch);ctx.lineTo(pad.left+cw,pad.top+ch);ctx.stroke();
  ctx.fillStyle="#4A5568";ctx.font="bold 12px system-ui";ctx.textAlign="center";
  ctx.fillText("Required Rate of Return (%)",pad.left+cw/2,H-3);
}

  // Orientation strip
  html+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 18px;margin-bottom:18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">';
  html+='<span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);flex-shrink:0">This page also provides:</span>';
  html+='<div style="display:flex;gap:8px;flex-wrap:wrap">';
  html+='<span style="font-size:12px;color:var(--t2);background:white;border:1px solid var(--border);border-radius:5px;padding:3px 10px">🔄 Deposit solver</span>';
  html+='<span style="font-size:12px;color:var(--t2);background:white;border:1px solid var(--border);border-radius:5px;padding:3px 10px">📅 Rate by term length</span>';
  html+='<span style="font-size:12px;color:var(--t2);background:white;border:1px solid var(--border);border-radius:5px;padding:3px 10px">💰 Rate by deposit amount</span>';
  html+='<span style="font-size:12px;color:var(--t2);background:white;border:1px solid var(--border);border-radius:5px;padding:3px 10px">📊 End-price estimator (on inputs page)</span>';
  html+='</div></div>';


  // Metrics
  html+='<div class="metrics">';
  html+='<div class="metric"><div class="metric-label">PV of Outflows</div><div class="metric-val">'+fmtM(res.pvOut)+'</div><div class="metric-sub">Initial asset investment</div></div>';
  html+='<div class="metric"><div class="metric-label">PV of Known Inflows</div><div class="metric-val ok">'+fmtM(res.pvKnownIn)+'</div><div class="metric-sub">Deposit + ITC + tax shields + salvage</div></div>';
  html+='<div class="metric"><div class="metric-label">Gap to Recover</div><div class="metric-val">'+fmtM(res.pvOut-res.pvKnownIn)+'</div><div class="metric-sub">Recovered through lease payments</div></div>';
  html+='</div>';

  // Chart
  html+='<div class="chart-box"><div class="chart-title">Lease Rate by Required Return on Investment</div>';
  html+='<canvas id="sens-chart" width="700" height="240" style="width:100%;height:auto;display:block"></canvas></div>';


  // ── Feature 1: Iterative deposit solver ─────────────────────────────────────
  var noDepLease=calcLease(+S.price,+S.itcPct,+S.life,S.method,S.hyr,+S.ddbRate,
                           +S.term,false,0,+S.freq,+S.endPrice,+S.taxRate,+S.coc);
  var depSolved=solveDepositEqualToPayment();
  html+='<div class="helper-card">';
  html+='<div class="helper-head">';
  html+='<span class="helper-icon">🔄</span>';
  html+='<span class="helper-title">Deposit equal to first payment</span>';
  html+='</div>';
  html+='<div class="helper-body" style="flex-direction:row;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px">';
  html+='<div style="font-size:13px;color:var(--t2);line-height:1.6;flex:1;min-width:220px">A common convention is to set the deposit equal to the first lease payment. Since the lease rate depends on the deposit amount this requires iteration — the tool solves it automatically.</div>';
  html+='<div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">';
  html+='<div style="text-align:center"><div class="helper-label">No deposit</div><div style="font-family:monospace;font-size:18px;font-weight:800;color:var(--t1);margin-top:4px">'+fmtM(noDepLease)+'</div><div style="font-size:10px;color:var(--t3)">per payment</div></div>';
  html+='<div style="font-size:20px;color:var(--t3)">→</div>';
  html+='<div style="text-align:center"><div class="helper-label">Deposit = payment</div><div style="font-family:monospace;font-size:18px;font-weight:800;color:var(--green);margin-top:4px">'+fmtM(depSolved.lease)+'</div><div style="font-size:10px;color:var(--t3)">per payment</div></div>';
  html+='<button class="helper-use" onclick="S.deposit=true;S.depositAmt='+depSolved.deposit+';S.res=calcAll();renderPage2()">Apply &amp; recalculate ›</button>';
  html+='</div></div></div>';

  // ── Feature 2: Lease rate vs term sensitivity table ──────────────────────────
  html+='<div class="collapsible">';
  html+='<div class="coll-head" onclick="S.show_term_sens=!S.show_term_sens;renderPage2()"><span class="coll-title">Lease Rate by Term Length</span><span class="coll-arr" style="transform:'+(S.show_term_sens?'rotate(90deg)':'rotate(0deg)')+'">›</span></div>';
  if(S.show_term_sens){
    var currentTerm=+S.term;
    var termMin=Math.max(1,currentTerm-3);
    var termMax=currentTerm+3;
    html+='<div class="coll-body open" style="padding:4px 0">';
    html+='<div style="padding:10px 18px 6px;font-size:12px;color:var(--t2);line-height:1.6">How the required lease payment changes as the lease term varies. Shorter terms mean higher payments; longer terms spread the cost but increase uncertainty about O&M and residual value.</div>';
    html+='<table class="sens-table"><thead><tr><th class="left">Term</th><th>Required Payment</th><th>Total Payments</th><th>vs Current Term</th></tr></thead><tbody>';
    for(var t=termMin;t<=termMax;t++){
      var lp=calcLease(+S.price,+S.itcPct,+S.life,S.method,S.hyr,+S.ddbRate,
                       t,S.deposit,+S.depositAmt,+S.freq,+S.endPrice,+S.taxRate,+S.coc);
      var total=lp*t*(+S.freq);
      var diff=lp-res.leasePmt;
      var isCurrent=(t===currentTerm);
      html+='<tr'+(isCurrent?' class="highlight"':'')+'>';
      html+='<td class="left"><strong>'+(isCurrent?'★ ':'')+t+' year'+(t>1?'s':'')+'</strong></td>';
      html+='<td>'+fmtM(lp)+'</td>';
      html+='<td>'+fmtM(total)+'</td>';
      html+='<td style="color:'+(diff>0.5?'var(--warn)':diff<-0.5?'var(--green)':'var(--t3)')+'">'+(isCurrent?'current':(diff>0?'+':'')+fmtM(diff))+'</td>';
      html+='</tr>';
    }
    html+='</tbody></table></div>';
  }
  html+='</div>';

  // ── Feature 3: Lease rate vs deposit sensitivity table ───────────────────────
  html+='<div class="collapsible">';
  html+='<div class="coll-head" onclick="S.show_dep_sens=!S.show_dep_sens;renderPage2()"><span class="coll-title">Lease Rate by Deposit Amount</span><span class="coll-arr" style="transform:'+(S.show_dep_sens?'rotate(90deg)':'rotate(0deg)')+'">›</span></div>';
  if(S.show_dep_sens){
    html+='<div class="coll-body open" style="padding:4px 0">';
    html+='<div style="padding:10px 18px 6px;font-size:12px;color:var(--t2);line-height:1.6">A larger upfront deposit reduces the gap to recover through lease payments. Use this table to structure the trade-off between deposit and ongoing payment when negotiating with your lessee.</div>';
    html+='<table class="sens-table"><thead><tr><th class="left">Deposit</th><th>Required Payment</th><th>Reduction vs No Deposit</th></tr></thead><tbody>';
    var baseNoDeposit=calcLease(+S.price,+S.itcPct,+S.life,S.method,S.hyr,+S.ddbRate,
                                +S.term,false,0,+S.freq,+S.endPrice,+S.taxRate,+S.coc);
    var currentDep=S.deposit?(+S.depositAmt):0;
    var depSteps=[0,0.25,0.5,0.75,1.0,1.5,2.0,3.0];
    depSteps.forEach(function(mult){
      var dAmt=Math.round(res.leasePmt*mult);
      var lp=calcLease(+S.price,+S.itcPct,+S.life,S.method,S.hyr,+S.ddbRate,
                       +S.term,dAmt>0,dAmt,+S.freq,+S.endPrice,+S.taxRate,+S.coc);
      var reduction=baseNoDeposit-lp;
      var isCurrent=(Math.abs(dAmt-currentDep)<1);
      var label=mult===0?'No deposit':mult===1?'1× payment ('+fmtM(dAmt)+')':fmt(mult,2)+'× payment ('+fmtM(dAmt)+')';
      html+='<tr'+(isCurrent?' class="highlight"':'')+'>';
      html+='<td class="left">'+(isCurrent?'★ ':'')+label+'</td>';
      html+='<td>'+fmtM(lp)+'</td>';
      html+='<td style="color:'+(reduction>0?'var(--green)':'var(--t3)')+'">'+(reduction>0?'−'+fmtM(reduction):'—')+'</td>';
      html+='</tr>';
    });
    html+='</tbody></table></div>';
  }
  html+='</div>';


  // DCF Summary
  html+='<div class="collapsible" id="dcf-block">';
  html+='<div class="coll-head" onclick="S.show_table=!S.show_table;renderPage2()"><span class="coll-title">DCF Summary</span><span class="coll-arr" style="transform:'+(S.show_table?"rotate(90deg)":"rotate(0deg)")+'">›</span></div>';
  if(S.show_table){
    html+='<div class="coll-body open"><table><tbody>';
    html+='<tr class="total-row"><td class="left" colspan="2">Present Value of Outflows</td><td>'+fmtM(res.pvOut)+'</td></tr>';
    html+='<tr><td class="left">Selling Price of Asset</td><td class="sub">Year 0</td><td>'+fmtM(+S.price)+'</td></tr>';
    html+='<tr class="total-row"><td class="left" colspan="2">Present Value of Known Inflows</td><td></td></tr>';
    var rows=[
      ["Initial Deposit","Year 0",res.pvDeposit,false],
      ["Less: Tax on Deposit","Year 1",res.pvTaxDep,true],
      ["Investment Tax Credit","Year 1",res.pvITC,false],
      ["Tax Shields (depreciation × tax rate)","Years 1–"+S.life,res.pvTS,false],
      ["Purchase Price at End of Lease","Year "+S.term,res.pvSalv,false],
      ["Less: Loss of Tax Shield on Salvage","Year "+S.term,res.pvLoss,true]
    ];
    rows.forEach(function(r){
      if(!S.deposit&&(r[0]==="Initial Deposit"||r[0].indexOf("Tax on Deposit")>=0))return;
      html+='<tr><td class="left">'+r[0]+'</td><td class="sub">'+r[1]+'</td><td class="'+(r[3]?"neg":"")+'">'+fmtM(r[2])+'</td></tr>';
    });
    html+='<tr class="total-row"><td class="left" colspan="2">Total PV of Known Inflows</td><td>'+fmtM(res.pvKnownIn)+'</td></tr>';
    html+='<tr><td class="left">Gap to Recover via Lease Payments</td><td class="sub"></td><td>'+fmtM(res.pvOut-res.pvKnownIn)+'</td></tr>';
    html+='<tr><td class="left">After-Tax Annuity Factor</td><td class="sub">('+S.term+' yrs × '+S.freq+' pmts × (1−'+S.taxRate+'%))</td><td>'+fmt(res.af,4)+'</td></tr>';
    html+='<tr class="total-row" style="border-top:2px solid var(--blue)"><td class="left" colspan="2">Required Lease Payment</td><td style="color:var(--blue);font-size:15px;font-weight:800">'+fmtM(res.leasePmt)+'</td></tr>';
    html+='</tbody></table></div>';
  }
  html+='</div>';

  // Depreciation schedule
  html+='<div class="collapsible">';
  html+='<div class="coll-head" onclick="S.show_depr=!S.show_depr;renderPage2()"><span class="coll-title">Depreciation Schedule</span><span class="coll-arr" style="transform:'+(S.show_depr?"rotate(90deg)":"rotate(0deg)")+'">›</span></div>';
  if(S.show_depr){
    html+='<div class="coll-body open"><table><thead><tr><th class="left">Year</th><th>Depreciation</th><th>After-Tax Shield</th><th>PV of Shield</th></tr></thead><tbody>';
    res.depr.forEach(function(d,i){
      var yr=i+1,ts=d*(+S.taxRate/100),pvts=ts/Math.pow(1+(+S.coc/100),yr);
      html+='<tr><td class="left">'+yr+'</td><td>'+fmtM(d)+'</td><td>'+fmtM(ts)+'</td><td>'+fmtM(pvts)+'</td></tr>';
    });
    html+='<tr class="total-row"><td class="left">Total</td><td>'+fmtM(res.depr.reduce(function(s,d){return s+d},0))+'</td><td>'+fmtM(res.depr.reduce(function(s,d){return s+d*(+S.taxRate/100)},0))+'</td><td>'+fmtM(res.pvTS)+'</td></tr>';
    html+='</tbody></table></div>';
  }
  html+='</div>';
  html+='</main></div></div>';

  document.getElementById("main-content").innerHTML=html;
  makeBNList(NOTES2,"bn-list2");
  setTimeout(function(){drawChart("sens-chart",res.cocSens)},50);
  document.getElementById("cur-label").textContent=getSym()+" "+S.currency;
}

// ── PRINT ─────────────────────────────────────────────────────────────────────
function printSummary(){
  var res=S.res;if(!res)return;
  var pd=S.show_table,pd2=S.show_depr;
  S.show_table=true;S.show_depr=true;renderPage2();
  setTimeout(function(){
    document.querySelectorAll('canvas').forEach(function(c){
      var img=document.createElement('img');
      img.src=c.toDataURL('image/png');
      img.style.cssText='width:100%;height:auto;display:block';
      c.parentNode.replaceChild(img,c);
    });
    var mainHTML=document.querySelector('main').innerHTML;
    S.show_table=pd;S.show_depr=pd2;renderPage2();
    var css=document.querySelector('style').textContent;
    var hdr='<div style="background:#1B3F6E;padding:8px 24px;display:flex;align-items:center;justify-content:space-between"><div style="font-family:Georgia,serif;font-size:17px;color:white">Cap<span style="color:#A8C5E8">Plan</span></div><div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.85)">Setting a Lease Rate</div><div style="font-size:11px;color:rgba(255,255,255,.6)">'+new Date().toLocaleDateString()+'</div></div>';
    var doc='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>CapPlan Model 6</title><style>'+css+'</style>'
      +'<style>*{box-sizing:border-box}html,body{margin:0;padding:0;background:white}'
      +'.pg{width:10.5in;padding:0.35in;display:flex;flex-direction:column;overflow:visible}'
      +'aside,.print-btn,.btn-ghost,.btn-primary,.coll-arr{display:none!important}'
      +'.p2-grid{display:block!important}.coll-body{display:block!important}'
      +'.result-banner,.metric,.chart-box,.collapsible{box-shadow:none!important;border:1px solid #ccc!important}'
      +'.metrics{grid-template-columns:repeat(3,1fr)}'
      +'table{width:100%;font-size:8.5px;table-layout:fixed;border-collapse:collapse}'
      +'th,td{padding:3px 4px;white-space:normal;word-break:break-word;border-bottom:1px solid #E2E6EC}'
      +'th{background:#F7F8FA;text-align:right;font-size:8px;font-weight:700;text-transform:uppercase}'
      +'th.left,td.left{text-align:left;font-family:inherit}'
      +'td.sub{font-size:9px;color:#8A96A6;font-family:inherit}'
      +'tr.total-row td{font-weight:700;background:#F7F8FA}'
      +'tr:nth-child(even){background:#F7F8FA}'
      +'thead{display:table-header-group}tr{break-inside:avoid}'
      +'@media print{.pg{page-break-after:always;break-after:page;width:100%;padding:0.3in}.pg:last-child{page-break-after:avoid!important}}'
      +'@page{margin:0;size:landscape}'
      +'</style></head><body>'
      +hdr+'<div class="pg"><div style="padding-top:10px">'+mainHTML+'</div></div>'
      +'<script>setTimeout(function(){window.print();},500);<\/script></body></html>';
    var win=window.open('','_print','width=1100,height=800');
    win.document.write(doc);win.document.close();
  },300);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  updateStepper();
  if(S.page===1)renderPage1();
  else if(S.page===2&&S.res)renderPage2();
  var cl=document.getElementById("cur-label");
  if(cl)cl.textContent=getSym()+" "+S.currency;
}

render();
</script>
</body>
</html>
