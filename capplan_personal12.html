<body>
<div id="masthead">
  <div class="logo"><div class="logo-mark"><svg viewBox="0 0 18 18" width="14" height="14" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,10 7,14 15,4"/></svg></div><div class="logo-text">Cap<span>Plan</span></div><div class="logo-sub">Personal</div></div>
  <div class="module-name">What's the Least I Should Accept?</div>
  <div style="position:relative"><button style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:5px;padding:6px 12px;color:white;font-size:12px;font-weight:600" id="cur-btn" onclick="toggleCur()"><span id="cur-label">$ USD</span> ▾</button><div id="cur-dropdown" style="display:none;position:absolute;right:0;top:110%;background:white;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(15,29,46,.16);min-width:200px;z-index:300;overflow:hidden"></div></div>
</div>
<div id="model-banner">What is the minimum price I should accept if I sell this asset?</div>
<div id="stepper">
  <div class="step active" id="step1"><div class="step-num" id="sn1">1</div><div class="step-label">Asset details</div></div>
  <div class="step-sep">›</div>
  <div class="step" id="step2"><div class="step-num" id="sn2">2</div><div class="step-label">Results</div></div>
</div>
<div id="main-content"></div>
<script>
var CURRENCIES=[{code:"USD",symbol:"$",label:"US Dollar"},{code:"EUR",symbol:"€",label:"Euro"},{code:"GBP",symbol:"£",label:"British Pound"},{code:"CAD",symbol:"CA$",label:"Canadian Dollar"},{code:"AUD",symbol:"AU$",label:"Australian Dollar"},{code:"NZD",symbol:"NZ$",label:"New Zealand Dollar"},{code:"JPY",symbol:"¥",label:"Japanese Yen"}];
function getSym(){var c=CURRENCIES.find(function(c){return c.code===S.currency});return c?c.symbol:"$"}
function toggleCur(){S.cur_open=!S.cur_open;var dd=document.getElementById("cur-dropdown");dd.style.display=S.cur_open?"block":"none";if(S.cur_open){dd.innerHTML="";CURRENCIES.forEach(function(c){var b=document.createElement("button");b.style.cssText="display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;background:"+(c.code===S.currency?"var(--green-soft)":"transparent")+";border:none;border-bottom:1px solid var(--border);cursor:pointer";b.innerHTML='<span style="font-family:monospace;font-size:13px;font-weight:700;color:var(--green);width:36px">'+c.symbol+'</span><span>'+c.label+'</span>';b.onclick=function(){S.currency=c.code;S.cur_open=false;render()};dd.appendChild(b);});}}

var S={page:1,currency:"USD",cur_open:false,res:null,missingFields:null,
  show_age_sens:false,show_return_sens:false,bw_open:false,bw_val:"",bw_pct:"",
  cost:"",age:"",benefits:"",coc:""};

function calcMinPrice(cost,age,benefits,coc){
  var r=coc/100;
  var pvBen=benefits*((1-Math.pow(1+r,-age))/r);
  var finPos=-cost+pvBen;
  var denom=1/Math.pow(1+r,age);
  return denom>0?-finPos/denom:0;
}
function calcAll(){
  var cost=+S.cost,age=+S.age||1,benefits=+S.benefits||0,coc=+S.coc||0;
  var minP=calcMinPrice(cost,age,benefits,coc);
  var finPos=-cost+benefits*((1-Math.pow(1+(coc/100),-age))/(coc/100));
  var cocSens=[-4,-3,-2,-1,0,1,2,3,4].map(function(delta){
    var c2=coc+delta;if(c2<=0)return{coc:c2,price:0};
    return{coc:c2,price:calcMinPrice(cost,age,benefits,c2)};
  });
  var ageSens=[];for(var a=Math.max(1,age-3);a<=age+3;a++){ageSens.push({age:a,price:calcMinPrice(cost,a,benefits,coc)});}
  return{minPrice:minP,finPos:finPos,pvBen:benefits*((1-Math.pow(1+(coc/100),-age))/(coc/100)),cocSens:cocSens,ageSens:ageSens};
}
function fmt(n,d){if(n==null||isNaN(n))return"--";d=d||0;return n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d})}
function fmtM(n){if(n==null||isNaN(n))return"--";var s=getSym();return n<0?"-"+s+fmt(Math.abs(n)):s+fmt(n)}
function updateStepper(){for(var i=1;i<=2;i++){var step=document.getElementById("step"+i),sn=document.getElementById("sn"+i);step.className="step";if(i<S.page){step.classList.add("done");sn.textContent="✓"}else if(i===S.page){step.classList.add("active");sn.textContent=String(i)}else sn.textContent=String(i);var n=i;(function(n,step){step.onclick=function(){if(n<S.page||(n===2&&S.res)){S.page=n;render()}}})(n,step);step.style.cursor=(i<S.page||(i===2&&S.res))?"pointer":"default";}}

var NOTES1=[
  {q:"What does this model calculate?",a:"The minimum price you should accept when selling an asset you've owned. It makes sure you recover your original investment plus a fair return on your money, after accounting for the value you've already received from using the asset."},
  {q:"What counts as annual value received?",a:"Everything you saved or earned by owning the asset. For a car: avoided public transport costs, avoided rental costs. For a solar system: electricity savings. For a boat: avoided marina rental. Put a realistic annual dollar figure on whatever the asset provided."},
  {q:"What target return should I use?",a:"The return you could have earned by investing the purchase money elsewhere. For most people, 5–8% is a reasonable range — roughly what a diversified investment portfolio earns long-term. If you borrowed to buy, use your loan rate."},
  {q:"Is this the price I should advertise?",a:"No — this is your private floor price. Never reveal it to buyers. List higher and negotiate down. If the market won't reach your floor, you need to decide whether to hold on longer or accept a lower return."}
];
var NOTES2=[
  {q:"What does the financial position mean?",a:"It's your investment minus the value you've already received from using the asset, in today's money. A negative figure means you haven't yet recovered what you paid — the asset still owes you money. The floor price is the sale proceeds needed to close this gap at your target return."},
  {q:"How is the floor price calculated?",a:"The floor price is the future value of the financial position deficit — that is, the financial gap grown forward at your target return to the date of sale. It tells you exactly what you need to receive in the sale to finish at your target return, given what the asset has already returned to you through use."},
  {q:"What does the age sensitivity table show?",a:"How your floor price changes if you sell earlier or later. Selling earlier means you've had less use, so you need a higher price to recover your investment. Selling later means more use value has been extracted and the floor price is lower."},
  {q:"What if the market price is below my floor?",a:"You have three choices: hold on and extract more value through use, accept the lower price and a lower return, or take the asset off the market. This model at least gives you a clear number to anchor that decision."}
];
function makeBNList(notes,id){var list=document.getElementById(id);if(!list)return;list.innerHTML="";notes.forEach(function(n,i){var item=document.createElement("div");item.className="bn-item";var head=document.createElement("div");head.className="bn-head";head.innerHTML='<div class="bn-qmark">?</div><div class="bn-q">'+n.q+'</div><div class="bn-arr" id="arr'+id+i+'">›</div>';var body=document.createElement("div");body.className="bn-body";body.textContent=n.a;head.onclick=function(){var open=body.classList.contains("open");body.classList.toggle("open");document.getElementById("arr"+id+i).style.transform=open?"rotate(0deg)":"rotate(90deg)";head.style.background=open?"":"var(--surface)";};item.appendChild(head);item.appendChild(body);list.appendChild(item);});}
function field(l,h,fw,last,note){return'<div class="field'+(fw?" full":"")+(last?" last":"")+'"><div class="field-label">'+l+'</div>'+h+(note?'<div class="field-note">'+note+'</div>':'')+'</div>';}
function uIn(pfx,val,id,ob,sfx,dis){return'<div class="ui">'+(pfx?'<span class="pfx">'+pfx+'</span>':'')+'<input type="text" id="'+id+'" value="'+(val==null?"":val)+'" '+(dis?'disabled ':'')+' onblur="'+ob+'" onfocus="this.style.borderBottomColor=\'var(--green)\'">'+(sfx?'<span class="sfx">'+sfx+'</span>':'')+'</div>';}

function validateInputs(){
  var errs=[];
  if(+S.cost<=0) errs.push("What you paid must be greater than zero");
  if(+S.age<=0) errs.push("Time owned must be greater than zero");
  if(S.life!==''&&+S.life<=0) errs.push("Asset life must be greater than zero");
  if(S.life!==''&&+S.age>+S.life) errs.push("Time owned cannot exceed asset life");
  if(S.benefits!==''&&+S.benefits<0) errs.push("Annual value received cannot be negative");
  if(+S.coc<=0) errs.push("Target return must be greater than zero");
  if(+S.coc>=100) errs.push("Target return cannot equal or exceed 100%");
  return errs;
}
function goToResults(){
  var missing=[];
  if(!S.cost)missing.push("What you paid for it");if(!S.age)missing.push("How long you've owned it");
  if(!S.benefits&&S.benefits!==0)missing.push("Annual value received");if(!S.coc)missing.push("Target return");
  if(missing.length>0){S.missingFields=missing;render();return;}
  S.missingFields=null;
  var valErrs=validateInputs();if(valErrs.length>0){S.missingFields=valErrs;render();return;}
  try{S.res=calcAll();S.page=2;render();}catch(e){alert("Error: "+e.message)}
}
function resetInputs(){S.cost="";S.age="";S.benefits="";S.coc="";S.missingFields=null;S.bw_open=false;S.bw_val="";S.bw_pct="";render();}
function loadExample(){S.cost=25000;S.age=3;S.benefits=4000;S.coc=6;S.missingFields=null;render();}

function drawChart(canvasId,data,current){
  var canvas=document.getElementById(canvasId);if(!canvas)return;
  var ctx=canvas.getContext("2d"),W=canvas.width,H=canvas.height;
  var pad={top:16,bottom:48,left:80,right:16};var cw=W-pad.left-pad.right,ch=H-pad.top-pad.bottom;
  ctx.clearRect(0,0,W,H);
  var vals=data.map(function(d){return d.price}).filter(function(v){return v>0});if(!vals.length)return;
  var minV=Math.min.apply(null,vals),maxV=Math.max.apply(null,vals);var rng=maxV-minV||maxV*0.2;var lo=minV-rng*0.1,hi=maxV+rng*0.15;
  ctx.strokeStyle="#D8E8DC";ctx.lineWidth=1;for(var i=0;i<=4;i++){var y=pad.top+ch*(1-i/4);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cw,y);ctx.stroke();ctx.fillStyle="#8A96A6";ctx.font="10px system-ui";ctx.textAlign="right";ctx.fillText(getSym()+fmt((lo+(hi-lo)*(i/4))/1000,0)+"k",pad.left-3,y+3);}
  var bw=Math.floor(cw/data.length*0.6),gap=cw/data.length;
  data.forEach(function(d,i){if(d.price<=0)return;var x=pad.left+gap*i+(gap-bw)/2,bh=(d.price-lo)/(hi-lo)*ch,y=pad.top+ch-bh;var isCur=d.coc===current;ctx.fillStyle=isCur?"#2E7D52":"#6DBF8A";ctx.fillRect(x,y,bw,bh);ctx.fillStyle=isCur?"var(--green)":"#8A96A6";ctx.font=isCur?"bold 10px system-ui":"10px system-ui";ctx.textAlign="center";ctx.fillText(d.coc+"%",x+bw/2,H-pad.bottom+13);});
  ctx.strokeStyle="#4A5568";ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(pad.left,pad.top+ch);ctx.lineTo(pad.left+cw,pad.top+ch);ctx.stroke();ctx.fillStyle="#4A5568";ctx.font="bold 11px system-ui";ctx.textAlign="center";ctx.fillText("Target return — higher return needs a higher price",pad.left+cw/2,H-3);
}

    html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
    html+='<div><div class="helper-label">Annual spend it replaced</div><div class="ui"><span class="pfx">'+sym+'</span><input type="text" value="'+(S.bw_val||"")+'" placeholder="e.g. 3000" onblur="S.bw_val=+this.value||0;render()" onfocus="this.style.borderBottomColor=\'var(--green)\'" style="font-family:monospace;font-size:15px;font-weight:600;color:var(--t1);border:none;border-bottom:2px solid var(--border);background:transparent;width:100%;padding:2px 0;outline:none"><span class="sfx">/ yr</span></div><div class="field-note">e.g. car rental, transit passes, service fees</div></div>';
    html+='<div><div class="helper-label">% of that spend you actually saved</div><div class="ui"><input type="text" value="'+(S.bw_pct||"")+'" placeholder="e.g. 80" onblur="S.bw_pct=+this.value||0;render()" onfocus="this.style.borderBottomColor=\'var(--green)\'" style="font-family:monospace;font-size:15px;font-weight:600;color:var(--t1);border:none;border-bottom:2px solid var(--border);background:transparent;width:100%;padding:2px 0;outline:none"><span class="sfx">%</span></div><div class="field-note">Be realistic — rarely 100%</div></div>';
    html+='</div>';
    if(S.bw_val&&S.bw_pct){var sug=Math.round(S.bw_val*S.bw_pct/100);html+='<div class="helper-result"><div style="font-size:13px;color:var(--t2)">Suggested annual value: <strong style="color:var(--green)">'+fmtM(sug)+'/year</strong></div><button class="helper-use" onclick="S.benefits='+sug+';S.bw_open=false;render()">Use this ›</button></div>';}

  html+='</main></div></div>';
  document.getElementById("main-content").innerHTML=html;

function renderPage2(){
  var res=S.res,sym=getSym();
  var html='<div class="page"><div class="p2-grid"><aside>';
  html+='<div class="section-label">Understanding your results</div><div class="panel" style="margin-bottom:14px"><div id="bn-list2"></div></div><div style="display:flex;flex-direction:column;gap:10px"><button class="btn-ghost" onclick="S.page=1;render()">‹ Change my numbers</button><button class="print-btn" onclick="printSummary()">🖶 Print</button></div></aside><main>';
  html+='<div class="result-banner good"><div><div style="font-family:Georgia,serif;font-size:22px;color:var(--green);line-height:1.3">Don\'t accept less than <strong>'+fmtM(res.minPrice)+'</strong>.</div><div style="font-size:13px;color:var(--t2);margin-top:8px;line-height:1.6">This is your private floor price — don\'t reveal it. List higher and negotiate down. Accepting less means earning less than your '+S.coc+'% target return.</div></div><div class="result-box" style="background:var(--green)"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.75)">Floor price</div><div style="font-family:monospace;font-size:26px;font-weight:800;color:white;margin-top:4px">'+fmtM(res.minPrice)+'</div></div></div>';
  html+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 18px;margin-bottom:18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap"><span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);flex-shrink:0">Also on this page:</span><div style="display:flex;gap:8px;flex-wrap:wrap"><span style="font-size:12px;color:var(--t2);background:white;border:1px solid var(--border);border-radius:5px;padding:3px 10px">📊 Floor by target return</span><span style="font-size:12px;color:var(--t2);background:white;border:1px solid var(--border);border-radius:5px;padding:3px 10px">📅 Floor by age at sale</span></div></div>';
  html+='<div style="display:flex;flex-wrap:wrap;gap:8px;padding:10px 0 16px 0;align-items:center"><span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-right:4px">Also on this page</span>';
  ['📊 Age sensitivity','💡 Below-floor guidance'].forEach(function(item){html+='<span style="font-size:12px;color:var(--t2);padding:4px 10px;background:var(--surface);border:1px solid var(--border);border-radius:20px">'+item+'</span>';}); html+='</div>';
  html+='<div class="metrics"><div class="metric"><div class="metric-label">Your floor price</div><div class="metric-val good">'+fmtM(res.minPrice)+'</div><div class="metric-sub">Minimum to earn '+S.coc+'% return</div></div><div class="metric"><div class="metric-label">Financial position now</div><div class="metric-val '+(res.finPos<0?"warn":"good")+'">'+fmtM(res.finPos)+'</div><div class="metric-sub">'+(res.finPos<0?"The asset still owes you this amount — your investment minus value received so far":"Your investment has been fully recovered through use")+'</div></div><div class="metric"><div class="metric-label">Value received so far</div><div class="metric-val">'+fmtM(res.pvBen)+'</div><div class="metric-sub">Over '+S.age+' year'+(+S.age>1?"s":"")+' in today\'s money</div></div></div>';
  html+='<div style="font-size:12px;color:var(--t2);line-height:1.6;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:16px">'+(res.finPos<0?'Your financial position is negative because the value received so far ('+fmtM(res.pvBen)+') is less than what you originally paid. The floor price is what you need from the sale to close that gap at your '+S.coc+'% target return.':'Your investment has been fully recovered through use. Any sale proceeds above zero add to your return.')+'</div>';
  html+='<div class="chart-box"><div class="chart-title">Floor price by target return</div><div class="chart-sub">Higher target = higher floor price needed</div><canvas id="coc-chart" width="700" height="200" style="width:100%;height:auto;display:block"></canvas></div>';
  html+='<div class="collapsible"><div class="coll-head" onclick="S.show_age_sens=!S.show_age_sens;renderPage2()"><span class="coll-title">How does timing affect my floor price?</span><span class="coll-arr" style="transform:'+(S.show_age_sens?'rotate(90deg)':'rotate(0deg)')+'" >›</span></div>';
  if(S.show_age_sens){
    html+='<div class="coll-body open" style="padding:4px 0"><div style="padding:10px 18px 6px;font-size:12px;color:var(--t2)">Selling earlier means less value extracted, so you need a higher price. Selling later means more value received and a lower floor.</div><table><thead><tr><th class="left">Age at sale</th><th>Floor price</th><th>vs now</th></tr></thead><tbody>';
    res.ageSens.forEach(function(row){var isCur=row.age===+S.age;var diff=row.price-res.minPrice;html+='<tr'+(isCur?' class="highlight"':'')+'><td class="left">'+(isCur?"★ ":"")+row.age+' year'+(row.age>1?"s":"")+'</td><td>'+fmtM(row.price)+'</td><td style="color:'+(isCur?"var(--t3)":diff>0?"var(--warn)":"var(--green)")+'\">'+(isCur?"current":(diff>0?"+":"")+fmtM(diff))+'</td></tr>';});

function printSummary(){var pd=S.show_age_sens;S.show_age_sens=true;renderPage2();setTimeout(function(){document.querySelectorAll('canvas').forEach(function(c){var img=document.createElement('img');img.src=c.toDataURL('image/png');img.style.cssText='width:100%;height:auto;display:block';c.parentNode.replaceChild(img,c);});window.print();S.show_age_sens=pd;renderPage2();},300);}
function initChartTooltip(canvasId,data,labelFn){
  setTimeout(function(){
    var canvas=document.getElementById(canvasId);if(!canvas)return;
    var par=canvas.parentNode;par.style.position='relative';
    var old=par.querySelector('.ctip');if(old)old.remove();
    var tip=document.createElement('div');tip.className='ctip';
    tip.style.cssText='position:absolute;pointer-events:none;background:rgba(15,29,46,.88);color:white;font-size:11px;font-weight:600;padding:5px 10px;border-radius:5px;white-space:nowrap;display:none;z-index:99;transform:translateX(-50%);top:6px';
    par.appendChild(tip);
    canvas.style.cursor='crosshair';
    canvas.onmousemove=function(e){
      var r=canvas.getBoundingClientRect();
      var scaleX=canvas.width/r.width;
      var mx=(e.clientX-r.left)*scaleX;
      var W=canvas.width,padL=80,cw=W-96;
      var n=data.length,gap=cw/n,bw=Math.floor(gap*0.6);
      var hit=null,hitPct=0;
      for(var i=0;i<n;i++){
        var bx=padL+gap*i+(gap-bw)/2;
        if(mx>=bx&&mx<=bx+bw){hit=data[i];hitPct=((bx+bw/2)/W*100);break;}
      }
      if(hit){tip.textContent=labelFn(hit);tip.style.left=hitPct.toFixed(1)+'%';tip.style.display='block';}
      else tip.style.display='none';
    };
    canvas.onmouseleave=function(){tip.style.display='none';};
  },90);
}

function render(){updateStepper();if(S.page===1)renderPage1();else if(S.page===2&&S.res)renderPage2();var cl=document.getElementById("cur-label");if(cl)cl.textContent=getSym()+" "+S.currency;}
render();
</script></body></html>
