<script>
var CURRENCIES=[{code:"USD",symbol:"$",label:"US Dollar"},{code:"EUR",symbol:"€",label:"Euro"},{code:"GBP",symbol:"£",label:"British Pound"},{code:"CAD",symbol:"CA$",label:"Canadian Dollar"},{code:"AUD",symbol:"AU$",label:"Australian Dollar"},{code:"NZD",symbol:"NZ$",label:"New Zealand Dollar"},{code:"JPY",symbol:"¥",label:"Japanese Yen"}];
function getSym(){var c=CURRENCIES.find(function(c){return c.code===S.currency});return c?c.symbol:"$"}
function toggleCur(){S.cur_open=!S.cur_open;var dd=document.getElementById("cur-dropdown");dd.style.display=S.cur_open?"block":"none";if(S.cur_open){dd.innerHTML="";CURRENCIES.forEach(function(c){var b=document.createElement("button");b.style.cssText="display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;background:"+(c.code===S.currency?"var(--green-soft)":"transparent")+";border:none;border-bottom:1px solid var(--border);cursor:pointer";b.innerHTML='<span style="font-family:monospace;font-size:13px;font-weight:700;color:var(--green);width:36px">'+c.symbol+'</span><span>'+c.label+'</span>';b.onclick=function(){S.currency=c.code;S.cur_open=false;render()};dd.appendChild(b);});}}

// ── ASSET CLASS LIBRARY ───────────────────────────────────────────────────────
var ASSET_LIBRARY={
  "":          {label:"-- Select an asset type --",group:""},
  // VEHICLES
  "eco-car":   {label:"Economy car",           group:"Vehicles",      life:8,  om1p:4.46,esc:20,svRate:55,note:"Year-1 maintenance ~$1,250 on a $28k car; costs rise ~20%/yr. Typical resale: 55% decline over life."},
  "mid-car":   {label:"Mid-size car",          group:"Vehicles",      life:8,  om1p:2.0,esc:18,svRate:60,note:"Similar pattern to economy car. AAA data used for cost benchmarks."},

  "outboard":  {label:"Outboard motorboat",    group:"Recreational",  life:12, om1p:3.5,esc:12,svRate:60,note:"Engine service, hull maintenance. Costs rise moderately."},

var S={page:1,currency:"USD",cur_open:false,res:null,missingFields:null,
  assetClass:"",assetCategory:"",price:"",life:"",currentAge:"",salvageRate:"",om1:"",omType:"pct",omInc:"",coc:""};

// ── CALC ──────────────────────────────────────────────────────────────────────
function buildOM(life,om1,omType,omInc){
  var om=[+om1];
  for(var i=1;i<life;i++){
    if(omType==="pct") om.push(om[i-1]*(1+(+omInc||0)/100));
    else om.push(om[i-1]+(+omInc||0));
  }
  return om;
}
function calcEAC(price,life,salvageRate,om1,omType,omInc,coc){
  var r=coc/100;var results=[];
  // salvageRate = % of value LOST by end of life; remaining at end of life = (1 - salvageRate/100)
  var sv0=price*(1-(salvageRate||50)/100);var svDecline=Math.pow(sv0/price,1/life);
  // Salvage at year n: price * (svDecline)^n
  function salvageAtYear(n){return price*Math.pow(sv0/price,n/life);}
  var om=buildOM(life,om1,omType,omInc);
  for(var n=1;n<=life;n++){
    var pvOM=0;for(var i=0;i<n;i++)pvOM+=om[i]/Math.pow(1+r,i+1);
    var sv=salvageAtYear(n);
    var pvSalv=sv/Math.pow(1+r,n);
    var pv=price-pvSalv+pvOM;
    var af=r>0?(1-Math.pow(1+r,-n))/r:n;
    var eac=af>0?pv/af:0;
    results.push({year:n,eac:eac,pv:pv,pvOM:pvOM,pvSalv:pvSalv,salv:sv,om:om[n-1]||0});
  }
  return results;
}
function calcAll(){
  var price=+S.price,life=+S.life||1,age=+S.currentAge||0;
  var svRate=+S.salvageRate||50,om1=+S.om1||0,coc=+S.coc||0;
  var results=calcEAC(price,life,svRate,om1,S.omType,S.omInc,coc);
  var optIdx=0;for(var i=1;i<results.length;i++)if(results[i].eac<results[optIdx].eac)optIdx=i;
  var optYear=results[optIdx].year;
  var optEAC=results[optIdx].eac;
  var currentEAC=age>0&&age<=results.length?results[age-1].eac:null;
  var status=age===0?"not yet owned":age<optYear?"before optimal — keep for now":age===optYear?"at optimal — good time to replace":"past optimal";

function drawEACChart(canvasId, results, optYear, currentAge) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var pad = {top:24, bottom:44, left:72, right:20};
  var cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;
  ctx.clearRect(0, 0, W, H);

  var eacs = results.map(function(r){return r.eac;});
  var minV = Math.min.apply(null, eacs), maxV = Math.max.apply(null, eacs);
  var rng = maxV - minV || maxV * 0.2;
  var lo = minV - rng * 0.1, hi = maxV + rng * 0.18;

  // Grid lines
  for (var i = 0; i <= 4; i++) {
    var y = pad.top + ch * (1 - i/4);
    var v = lo + (hi - lo) * (i/4);
    ctx.strokeStyle = '#E8EEF4'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cw, y); ctx.stroke();
    ctx.fillStyle = '#8A96A6'; ctx.font = '10px system-ui'; ctx.textAlign = 'right';
    ctx.fillText('$' + (Math.abs(v) >= 1000 ? (v/1000).toFixed(0)+'k' : v.toFixed(0)), pad.left - 4, y + 3);
  }

  var n = results.length;
  var gap = cw / n;
  var bw = Math.floor(gap * 0.55);

  // Bars
  results.forEach(function(r, i) {
    var isOpt = r.year === optYear;
    var isCur = r.year === currentAge;
    var color = isOpt ? '#2E7D52' : r.year > optYear ? (r.eac > eacs[optYear-1]*1.15 ? '#E88A8A' : '#F59E0B') : '#93C8A8';
    var bh = Math.max(2, (r.eac - lo) / (hi - lo) * ch);
    var bx = pad.left + gap * i + (gap - bw) / 2;
    var by = pad.top + ch - bh;
    ctx.fillStyle = color;
    ctx.fillRect(bx, by, bw, bh);
    // Year label
    ctx.fillStyle = isOpt ? '#2E7D52' : isCur ? '#1B3F6E' : '#8A96A6';
    ctx.font = (isOpt || isCur ? 'bold ' : '') + '10px system-ui';
    ctx.textAlign = 'center';
    var label = 'Yr' + r.year + (isOpt ? ' ★' : '') + (isCur ? ' ◀' : '');
    ctx.fillText(label, bx + bw/2, H - pad.bottom + 13);
  });

  // Line overlay
  ctx.beginPath();
  ctx.strokeStyle = '#1B3F6E';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  results.forEach(function(r, i) {
    var x = pad.left + gap * i + gap / 2;
    var y = pad.top + ch - (r.eac - lo) / (hi - lo) * ch;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Dots on line + store positions for tooltip
  var dotPositions = [];
  results.forEach(function(r, i) {
    var x = pad.left + gap * i + gap / 2;
    var y = pad.top + ch - (r.eac - lo) / (hi - lo) * ch;
    var isOpt = r.year === optYear;
    ctx.beginPath();
    ctx.arc(x, y, isOpt ? 5 : 3, 0, Math.PI * 2);
    ctx.fillStyle = isOpt ? '#2E7D52' : '#1B3F6E';
    ctx.fill();
    ctx.strokeStyle = 'white'; ctx.lineWidth = 1.5;
    ctx.stroke();
    dotPositions.push({x:x, y:y, year:r.year, eac:r.eac, isOpt:isOpt});
  });

  // Tooltip on mousemove near dots
  var par = canvas.parentNode;
  var oldTip = par.querySelector('.eac-tip');
  if (oldTip) oldTip.remove();
  var tip = document.createElement('div');
  tip.className = 'eac-tip';
  tip.style.cssText = 'position:absolute;pointer-events:none;background:rgba(15,29,46,.88);color:white;font-size:11px;font-weight:600;padding:5px 10px;border-radius:5px;white-space:nowrap;display:none;z-index:99;transform:translateX(-50%)';
  par.style.position = 'relative';
  par.appendChild(tip);
  canvas.style.cursor = 'crosshair';
  canvas.onmousemove = function(e) {
    var rect = canvas.getBoundingClientRect();
    var scaleX = canvas.width / rect.width;
    var scaleY = canvas.height / rect.height;
    var mx = (e.clientX - rect.left) * scaleX;
    var my = (e.clientY - rect.top) * scaleY;
    var hit = null;
    dotPositions.forEach(function(d) {
      var dist = Math.sqrt((mx-d.x)*(mx-d.x) + (my-d.y)*(my-d.y));
      if (dist < 18) hit = d;
    });
    if (hit) {
      tip.textContent = 'Year ' + hit.year + (hit.isOpt ? ' ★ Optimal' : '') + ': $' + Math.round(hit.eac).toLocaleString() + '/yr';
      tip.style.left = (hit.x / canvas.width * 100).toFixed(1) + '%';
      tip.style.top = Math.max(4, (hit.y / canvas.height * 100 - 8)).toFixed(1) + '%';
      tip.style.display = 'block';
    } else {
      tip.style.display = 'none';
    }
  };
  canvas.onmouseleave = function() { tip.style.display = 'none'; };
}

function render(){updateStepper();if(S.page===1)renderPage1();else if(S.page===2&&S.res)renderPage2();var cl=document.getElementById("cur-label");if(cl)cl.textContent=getSym()+" "+S.currency;}
render();
</script></body></html>
