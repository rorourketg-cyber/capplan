// ── CALC ─────────────────────────────────────────────────────────────────────
function calcDepr(cost,itcPct,life,method,hyr,ddbRate) {
  var base = cost - cost*itcPct/100;
  var d = [];
  if (method === "Double-declining") {
    var rate = ddbRate/100;
    d.push(base*rate*(hyr?0.5:1));
    for (var y=2;y<=life;y++) {
      var prev = d.reduce(function(s,v){return s+v},0);
      d.push((base-prev)*rate);
    }
  } else if (method === "Straight-line") {
    var y1 = base/life*(hyr?0.5:1);
    d.push(y1);
    for (var y=2;y<=life;y++) d.push(hyr?(base-y1)/(life-1):base/life);
  } else {
    var y1 = base/(life+1);
    d.push(y1);
    if (hyr) {
      for (var y=2;y<=life;y++) d.push(2*base*(life-y+1)/((life+1)*(life-1)));
    } else {
      for (var y=2;y<=life;y++) d.push(base*(life-y+1)*2/(life*(life+1)));
    }
  }
  return d;
}

function calcAll(p) {
  var tx=p.taxRate/100, r=p.coc/100, itc=p.cost*p.itcPct/100;
  var life = parseInt(p.life)||10;
  var ben = [];
  for (var i=0;i<life;i++) ben.push(p.annuity?(p.annuityAmount||0):(p.yearlyBenefits[i]||0));
  var depr = calcDepr(p.cost,p.itcPct,life,p.method,p.hyr,p.ddbRate);
  var rows = [];
  for (var i=0;i<life;i++) {
    var yr=i+1, btBen=ben[i], atBen=btBen*(1-tx),
        btDepr=depr[i], atShield=btDepr*tx,
        totalAT=atBen+atShield,
        pvAtBen=atBen/Math.pow(1+r,yr);
    rows.push({yr:yr,btBen:btBen,atBen:atBen,btDepr:btDepr,atShield:atShield,totalAT:totalAT,pvAtBen:pvAtBen});
  }
  var pvOut = p.cost+p.workingCapital;
  var pvBen = rows.reduce(function(s,row){return s+row.pvAtBen},0);
  var pvITC = itc/(1+r);
  var pvS1 = depr.length>0?depr[0]*tx/(1+r):0;
  var pvS2 = 0;
  for (var i=1;i<rows.length;i++) pvS2+=rows[i].atShield/Math.pow(1+r,i+1);
  var pvShield=pvS1+pvS2;
  var pvSalv=p.salvage/Math.pow(1+r,life);
  var pvLoss=-(p.salvage*tx)/Math.pow(1+r,life);
  var pvWC=p.workingCapital/Math.pow(1+r,life);
  var pvIn=pvBen+pvITC+pvShield+pvSalv+pvLoss+pvWC;
  var npv=pvIn-pvOut;
  var af=r>0?(1-Math.pow(1+r,-life))/r:life;
  var anpv=af>0?npv/af:0;
  var bc=pvOut>0?pvIn/pvOut:0;

  function npvR(rate) {
    var cfs = [-pvOut];
    for (var i=0;i<life;i++) {
      var yr=i+1, cf=ben[i]*(1-tx)+depr[i]*tx;
      if(yr===1) cf+=itc;
      if(yr===life) cf+=p.salvage*(1-tx)+p.workingCapital;
      cfs.push(cf);
    }
    return cfs.reduce(function(s,cf,i){return s+cf/Math.pow(1+rate,i)},0);
  }
  var irr=0.1;
  for (var i=0;i<100;i++) {
    var f=npvR(irr), df=(npvR(irr+0.0001)-f)/0.0001;
    if(Math.abs(df)<1e-10) break;
    var nx=irr-f/df;
    if(Math.abs(nx-irr)<1e-8){irr=nx;break;}
    irr=nx; if(irr<-0.99||irr>100){irr=NaN;break;}
  }
  var payback=null, cum=-pvOut;
  for (var i=0;i<rows.length;i++) {
    var prev=cum; cum+=rows[i].totalAT;
    if(cum>=0&&prev<0){payback=i+(Math.abs(prev)/(Math.abs(prev)+cum));break;}
  }

  var pcts=[-30,-20,-10,0,10,20,30];
  var cocSens=pcts.map(function(pct) {
    var tc=p.coc*(1+pct/100), tr=tc/100;
    var taf=tr>0?(1-Math.pow(1+tr,-life))/tr:life;
    var tpb=p.annuity?(p.annuityAmount*(1-tx)*taf):rows.reduce(function(s,row,i){return s+row.atBen/Math.pow(1+tr,i+1)},0);
    var tps=rows.reduce(function(s,row,i){return s+row.atShield/Math.pow(1+tr,i+1)},0);
    var tsv=p.salvage*(1-tx)/Math.pow(1+tr,life), twc=p.workingCapital/Math.pow(1+tr,life);
    return {label:tc.toFixed(1)+"%", npv:tpb+itc/(1+tr)+tps+tsv+twc-pvOut};
  });
  var base2=p.annuity?p.annuityAmount:(ben.reduce(function(s,b){return s+b},0)/Math.max(life,1));
  var benSens=pcts.map(function(pct) {
    var tb=base2*(1+pct/100);
    var tpb=p.annuity?tb*(1-tx)*af:rows.reduce(function(s,_,i){return s+(ben[i]*(1+pct/100)*(1-tx))/Math.pow(1+r,i+1)},0);
    return {label:"$"+Math.round(tb/1000)+"k", npv:tpb+pvITC+pvShield+pvSalv+pvLoss+pvWC-pvOut};
  });

  return {rows:rows,depr:depr,pvOut:pvOut,pvBen:pvBen,pvITC:pvITC,pvS1:pvS1,pvS2:pvS2,
    pvShield:pvShield,pvSalv:pvSalv,pvLoss:pvLoss,pvWC:pvWC,pvIn:pvIn,
    npv:npv,anpv:anpv,bc:bc,irr:irr,payback:payback,af:af,
    cocSens:cocSens,benSens:benSens,itc:itc,annAmt:p.annuity?p.annuityAmount:null};
}

// ── FORMAT ────────────────────────────────────────────────────────────────────
function fmt(n,d) {
  if(n==null||isNaN(n)) return "--";
  d=d||0;
  return n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
}
function fmtM(n,sym) {
  if(n==null||isNaN(n)) return "--";
  var s=sym||"$";
  return n<0?"-"+s+fmt(Math.abs(n)):s+fmt(n);
}
function fmtPct(n) { return isNaN(n)?"--":fmt(n*100,2)+"%"; }

// ── DOM HELPERS ───────────────────────────────────────────────────────────────
function el(tag,attrs,children) {
  var dom = document.createElement(tag);
  if (attrs) {
    Object.keys(attrs).forEach(function(k) {
      if (k==="class") dom.className=attrs[k];
      else if (k==="style" && typeof attrs[k]==="object") {
        Object.assign(dom.style, attrs[k]);
      } else if (k.startsWith("on")) {
        dom.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
      } else if (k==="disabled") {
        dom.disabled=!!attrs[k];
      } else {
        try { dom[k]=attrs[k]; } catch(e){}
      }
    });
  }
  if (children) {
    (Array.isArray(children)?children:[children]).forEach(function(c) {
      if(c==null||c===false||c===undefined) return;
      dom.appendChild(typeof c==="string"?document.createTextNode(c):c);
    });
  }
  return dom;
}
function div(attrs,children){return el("div",attrs,children)}
function span(attrs,children){return el("span",attrs,children)}
function btn(attrs,children){return el("button",attrs,children)}
function inp(attrs){return el("input",attrs)}
function txt(s){return document.createTextNode(s)}

// ── CHART ─────────────────────────────────────────────────────────────────────
function drawBarChart(canvas, data, xLabel) {
  var ctx = canvas.getContext("2d");
  var W=canvas.width, H=canvas.height;
  var pad={top:10,bottom:50,left:55,right:10};
  var cw=W-pad.left-pad.right, ch=H-pad.top-pad.bottom;
  ctx.clearRect(0,0,W,H);

  var vals=data.map(function(d){return d.npv});
  var maxV=Math.max.apply(null,vals.map(Math.abs))||1;
  var range=maxV*1.15;
  var hasNeg=vals.some(function(v){return v<0});
  var zeroY=hasNeg?pad.top+(ch/2):pad.top+ch;

  // Grid lines
  ctx.strokeStyle="#E2E6EC"; ctx.lineWidth=1;
  var steps=4;
  for(var i=0;i<=steps;i++) {
    var y=pad.top+(ch/steps)*i;
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(pad.left+cw,y); ctx.stroke();
    var v=hasNeg?(range-range*2*(i/steps)):(range*(1-i/steps));
    ctx.fillStyle="#8A96A6"; ctx.font="10px system-ui"; ctx.textAlign="right";
    ctx.fillText(Math.round(v/1000)+"k",pad.left-4,y+3);
  }

  // Zero line
  ctx.strokeStyle="#4A5568"; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(pad.left,zeroY); ctx.lineTo(pad.left+cw,zeroY); ctx.stroke();

  // Bars
  var bw=Math.floor(cw/data.length*0.65);
  var gap=cw/data.length;
  data.forEach(function(d,i) {
    var x=pad.left+gap*i+(gap-bw)/2;
    var barH=Math.abs(d.npv)/range*(hasNeg?ch/2:ch);
    var y=d.npv>=0?zeroY-barH:zeroY;
    ctx.fillStyle=d.npv>=0?"#2E7D52":"#C84B31";
    var r=Math.min(3,barH/2);
    ctx.beginPath();
    if(d.npv>=0){
      ctx.moveTo(x+r,y); ctx.lineTo(x+bw-r,y);
      ctx.arcTo(x+bw,y,x+bw,y+r,r); ctx.lineTo(x+bw,y+barH);
      ctx.lineTo(x,y+barH); ctx.arcTo(x,y,x+r,y,r);
    } else {
      ctx.moveTo(x,y); ctx.lineTo(x+bw,y);
      ctx.lineTo(x+bw,y+barH-r); ctx.arcTo(x+bw,y+barH,x+bw-r,y+barH,r);
      ctx.lineTo(x+r,y+barH); ctx.arcTo(x,y+barH,x,y+barH-r,r);
    }
    ctx.closePath(); ctx.fill();

    // X label
    ctx.fillStyle="#8A96A6"; ctx.font="10px system-ui"; ctx.textAlign="center";
    ctx.fillText(d.label,x+bw/2,H-pad.bottom+14);
  });

  // X axis label
  ctx.fillStyle="#8A96A6"; ctx.font="11px system-ui"; ctx.textAlign="center";
  ctx.fillText(xLabel,pad.left+cw/2,H-6);
}

// ── UI COMPONENTS ─────────────────────────────────────────────────────────────
function makeField(label,child,fullWidth,last) {
  var d=div({style:{
    padding:"14px 18px",
    borderBottom:last?"none":"1px solid "+C.border,
    borderRight:fullWidth?"none":"1px solid "+C.border,
    gridColumn:fullWidth?"1 / -1":""

  d.appendChild(div({style:{fontSize:10,fontWeight:600,textTransform:"uppercase",
    letterSpacing:"0.07em",color:C.t3,marginBottom:6}},label));
  d.appendChild(child);
  return d;
}

function makeInput(value,onChange,opts) {
  opts=opts||{};
  var wrap=div({style:{display:"flex",alignItems:"center",gap:6}});
  if(opts.prefix) wrap.appendChild(span({style:{fontSize:12,color:C.t3,fontFamily:"'Courier New',monospace",flexShrink:0}},opts.prefix));
  var field=inp({
    type:"text", value:String(value==null?"":value),
    disabled:!!opts.disabled,
    placeholder:opts.placeholder||"",
    style:{fontFamily:"'Courier New',monospace",fontSize:15,fontWeight:500,
      color:opts.disabled?C.t3:C.t1,border:"none",
      borderBottom:"2px solid "+(opts.error?C.warn:C.border),
      background:"transparent",width:"100%",padding:"2px 0",
      opacity:opts.disabled?0.5:1,outline:"none"}
  });
  field.addEventListener("focus",function(){if(!opts.disabled)this.style.borderBottomColor=opts.error?C.warn:C.blue});
  field.addEventListener("blur",function(e){
    this.style.borderBottomColor=opts.error?C.warn:C.border;
    if(!opts.disabled){onChange(this.value);}
    if(opts.onBlur)opts.onBlur(this.value);
  });
  wrap.appendChild(field);
  if(opts.suffix) wrap.appendChild(span({style:{fontSize:12,color:C.t3,flexShrink:0}},opts.suffix));
  return wrap;
}

function makePill(label,checked,onChange) {
  var lbl=el("label",{style:{display:"flex",alignItems:"center",gap:7,cursor:"pointer",
    fontSize:13,fontWeight:500,color:checked?C.blue:C.t2,padding:"6px 14px",
    border:"1.5px solid "+(checked?C.blue:C.border),borderRadius:20,
    background:checked?C.blueSoft:"transparent",userSelect:"none"}});
  var dot=span({style:{width:13,height:13,borderRadius:"50%",flexShrink:0,
    border:"2px solid "+(checked?C.blue:C.t3),
    display:"flex",alignItems:"center",justifyContent:"center"}});
  if(checked) dot.appendChild(span({style:{width:5,height:5,borderRadius:"50%",background:C.blue,display:"block"}}));
  lbl.appendChild(dot);
  lbl.appendChild(txt(label));
  lbl.addEventListener("click",onChange);
  return lbl;
}

  var wrap=div({style:{borderBottom:"1px solid "+C.border}});
  var open=false;

  var head=div({style:{display:"flex",alignItems:"flex-start",gap:10,
    padding:"12px 14px",cursor:"pointer",background:"transparent"}});

    marginRight:8,fontSize:11,fontWeight:700,color:C.blue}},"?");

    transition:"transform 0.2s",flexShrink:0,marginTop:1}},"›");

      fontSize:11,fontWeight:600,color:C.blue,background:"none",cursor:"pointer"}},"\u25B6 Watch video");
    vbtn.addEventListener("click",function(e){

      var modal=makeVideoModal(videoUrl);
      document.body.appendChild(modal);
    });

  });
  head.addEventListener("mouseenter",function(){if(!open)head.style.background=C.surface});
  head.addEventListener("mouseleave",function(){if(!open)head.style.background="transparent"});

function makeVideoModal(url) {
  var id=url.split(/[/?=v]/).filter(function(s){return s.length>5}).pop()||"";
  var src="https://www.youtube.com/embed/"+id;
  var overlay=div({style:{position:"fixed",inset:0,background:"rgba(15,29,46,0.82)",
    zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}});
  var box=div({style:{background:C.panel,borderRadius:10,overflow:"hidden",width:"min(800px,95vw)"}});
  var head=div({style:{padding:"10px 14px",display:"flex",justifyContent:"space-between",
    alignItems:"center",borderBottom:"1px solid "+C.border}});
  head.appendChild(span({style:{fontSize:13,fontWeight:600,color:C.t2}},"Learn More"));
  var close=btn({style:{fontSize:22,color:C.t3,lineHeight:1,border:"none",background:"none",cursor:"pointer"}},"\u00D7");
  close.addEventListener("click",function(){overlay.remove()});
  head.appendChild(close);
  var iframe=el("iframe",{src:src,frameBorder:"0",allowFullScreen:true,
    style:{display:"block",width:"100%",height:"450px"}});
  box.appendChild(head); box.appendChild(iframe);
  overlay.appendChild(box);
  overlay.addEventListener("click",function(e){if(e.target===overlay)overlay.remove()});
  return overlay;
}

function valWhole(v,label) {
  if(v===""||v==null) return null;
  var n=Number(v);
  if(isNaN(n)) return label+" must be a number";
  if(!Number.isInteger(n)) return label+" must be a whole number (e.g. 20, not 0.20)";
  if(n<0||n>100) return label+" must be between 0 and 100";
  return null;
}

  var mGrid=div({style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:18}});
  metrics.forEach(function(m) {
    var card=div({style:{background:C.panel,border:"1px solid "+C.border,borderRadius:8,
      padding:"14px",boxShadow:"0 1px 4px rgba(15,29,46,0.06)"}});
    card.appendChild(div({style:{fontSize:10,fontWeight:600,textTransform:"uppercase",
      letterSpacing:"0.07em",color:C.t3,marginBottom:7}},m.l));
    card.appendChild(div({style:{fontFamily:"'Courier New',monospace",fontSize:18,
      fontWeight:500,color:m.ok?C.green:C.warn}},m.v));
    card.appendChild(div({style:{fontSize:10,color:C.t3,marginTop:3}},m.s));
    mGrid.appendChild(card);
  });
  main.appendChild(mGrid);

  // Charts
  var chartGrid=div({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:18}});
  [{title:"NPV by Cost of Capital",data:res.cocSens,xLbl:"Cost of Capital (%)"},
   {title:"NPV by Annual Economic Benefits",data:res.benSens,xLbl:"Annual Benefits ("+sym+"000s)"}].forEach(function(ch) {
    var cbox=div({style:{background:C.panel,border:"1px solid "+C.border,borderRadius:8,
      boxShadow:"0 1px 4px rgba(15,29,46,0.06)",padding:"14px 14px 10px"}});
    cbox.appendChild(div({style:{fontSize:11,fontWeight:600,color:C.t2,marginBottom:10}},ch.title));
    var canvas=el("canvas",{width:340,height:200,style:{width:"100%",height:"auto",display:"block"}});
    cbox.appendChild(canvas);
    chartGrid.appendChild(cbox);
    setTimeout(function(){drawBarChart(canvas,ch.data,ch.xLbl)},50);
  });
  main.appendChild(chartGrid);

  // DCF collapsible
  var dcfBox=div({style:{background:C.panel,border:"1px solid "+C.border,borderRadius:8,
    boxShadow:"0 1px 4px rgba(15,29,46,0.06)",marginBottom:16,overflow:"hidden"}});
  var dcfHead=div({style:{padding:"12px 18px",display:"flex",justifyContent:"space-between",
    alignItems:"center",cursor:"pointer"}});
  dcfHead.appendChild(span({style:{fontSize:11,fontWeight:600,textTransform:"uppercase",
    letterSpacing:"0.07em",color:C.t2}},"DCF Summary"));
  var dcfArr=span({style:{color:C.t3,display:"inline-block",
    transform:state.show_dcf?"rotate(90deg)":"rotate(0deg)",
    transition:"transform 0.2s",fontSize:15}},"›");
  dcfHead.appendChild(dcfArr);
  dcfHead.addEventListener("click",function(){setState({show_dcf:!state.show_dcf})});
  dcfBox.appendChild(dcfHead);

  if(state.show_dcf) {
    dcfHead.style.borderBottom="1px solid "+C.border;
    var dcfRows=[
      ["Economic Benefits",inp.annuity?sym+fmt(res.annAmt||0)+" \u00D7 "+inp.taxRate+"% \u00D7 "+inp.life+" yrs":"Variable",res.pvBen],
      ["Investment Tax Credit","Year 1",res.pvITC],
      ["Tax Shield \u2013 Year 1",sym+fmt(res.depr[0]||0)+" \u00D7 "+inp.taxRate+"%",res.pvS1],
      ["Tax Shield \u2013 Years 2+","Sum of remaining years",res.pvS2],
      ["Salvage Value","Year "+inp.life,res.pvSalv],
      ["Less: Loss of Tax Shield","Year "+inp.life,res.pvLoss],
      ["Return of Working Capital","Year "+inp.life,res.pvWC]
    ];
    var tbl=el("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:12.5}});
    var tbody=el("tbody",{});
    function trow(cells,bg,bold,big) {
      var tr=el("tr",{style:{background:bg||"transparent"}});
      cells.forEach(function(c,i) {
        var td=el("td",{style:{padding:"8px "+(i===0?"18px":"10px"),
          color:typeof c==="number"&&c<0?C.warn:C.t1,
          fontFamily:i===2?"'Courier New',monospace":"inherit",
          textAlign:i===2?"right":"left",
          fontWeight:bold?"600":"400",fontSize:big?"16px":"12.5px",
          borderTop:"1px solid "+C.border}});
        td.textContent=typeof c==="number"?M(c):c;
        if(i===0&&cells.length===2){td.colSpan=2;}
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    }
    trow(["Present Value of Outflows",M(res.pvOut)],C.surface,true);
    dcfRows.forEach(function(r){trow(r)});
    trow(["Present Value of Inflows",M(res.pvIn)],C.surface,true);
    var npvTr=el("tr",{style:{background:ok?C.greenSoft:"rgba(200,75,49,0.06)",
      borderTop:"2px solid "+C.blue}});
    var npvTd1=el("td",{colSpan:2,style:{padding:"10px 18px",fontWeight:700,
      fontSize:"14px",color:C.t1,borderTop:"2px solid "+C.blue}},"Net Present Value");
    var npvTd2=el("td",{style:{padding:"10px 18px",fontFamily:"'Courier New',monospace",
      textAlign:"right",fontWeight:700,fontSize:"17px",color:ok?C.green:C.warn,
      borderTop:"2px solid "+C.blue}},M(res.npv));
    npvTr.appendChild(npvTd1); npvTr.appendChild(npvTd2);
    tbody.appendChild(npvTr);
    tbl.appendChild(tbody); dcfBox.appendChild(tbl);
  }
  main.appendChild(dcfBox);

  // Year table collapsible
  var tblBox=div({style:{background:C.panel,border:"1px solid "+C.border,borderRadius:8,
    boxShadow:"0 1px 4px rgba(15,29,46,0.06)",overflow:"hidden"}});
  var tblHead=div({style:{padding:"12px 18px",display:"flex",justifyContent:"space-between",
    alignItems:"center",cursor:"pointer"}});
  tblHead.appendChild(span({style:{fontSize:11,fontWeight:600,textTransform:"uppercase",
    letterSpacing:"0.07em",color:C.t2}},"Year-by-Year Cash Flows"));
  var tblArr=span({style:{color:C.t3,display:"inline-block",
    transform:state.show_table?"rotate(90deg)":"rotate(0deg)",
    transition:"transform 0.2s",fontSize:15}},"›");
  tblHead.appendChild(tblArr);
  tblHead.addEventListener("click",function(){setState({show_table:!state.show_table})});
  tblBox.appendChild(tblHead);

  if(state.show_table) {
    tblHead.style.borderBottom="1px solid "+C.border;
    var yscroll=div({style:{overflowX:"auto"}});
    var ytbl=el("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:12}});
    var yhead=el("thead",{});
    var yhr=el("tr",{style:{background:C.surface}});
    ["Year","BT Benefit","AT Benefit","BT Depr","AT Shield","Total AT","PV AT Ben"].forEach(function(h) {
      var th=el("th",{style:{padding:"8px 12px",textAlign:"right",fontWeight:600,
        color:C.t3,fontSize:10,textTransform:"uppercase",letterSpacing:"0.06em",
        borderBottom:"1px solid "+C.border,whiteSpace:"nowrap"}},h);
      yhr.appendChild(th);
    });
    yhead.appendChild(yhr); ytbl.appendChild(yhead);
    var ybody=el("tbody",{});
    res.rows.forEach(function(row,i) {
      var tr=el("tr",{style:{borderBottom:"1px solid "+C.border,
        background:i%2===0?C.surface:"transparent"}});
      [row.yr,row.btBen,row.atBen,row.btDepr,row.atShield,row.totalAT,row.pvAtBen].forEach(function(v,j) {
        var td=el("td",{style:{padding:"8px 12px",textAlign:"right",
          fontFamily:"'Courier New',monospace",color:j===0?C.t2:C.t1}},j===0?String(v):M(v));
        tr.appendChild(td);
      });
      ybody.appendChild(tr);
    });
    ytbl.appendChild(ybody); yscroll.appendChild(ytbl); tblBox.appendChild(yscroll);
  }
  main.appendChild(tblBox);
  page.appendChild(main);
  return page;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  var app=document.getElementById("app");
  app.innerHTML="";
  app.appendChild(renderMasthead());
  app.appendChild(renderStepper());
  if(state.page===1) app.appendChild(renderPage1());
  else if(state.page===2) app.appendChild(renderPage2());
  else if(state.page===3&&state.res) app.appendChild(renderPage3());
}

render();
</script>
</body>
</html>
