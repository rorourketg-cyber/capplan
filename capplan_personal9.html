<style>

tr.total-row td{font-weight:700;background:var(--surface)}tr:nth-child(even){background:var(--surface)}
tr.highlight td{background:var(--green-soft)!important;font-weight:700;color:var(--green)}

<body>
<div id="masthead">
  <div class="logo"><div class="logo-mark"><svg viewBox="0 0 18 18" width="14" height="14" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,10 7,14 15,4"/></svg></div><div class="logo-text">Cap<span>Plan</span></div><div class="logo-sub">Personal</div></div>
  <div class="module-name">Lease or Buy?</div>
  <div style="position:relative"><button style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:5px;padding:6px 12px;color:white;font-size:12px;font-weight:600" id="cur-btn" onclick="toggleCur()"><span id="cur-label">$ USD</span> ▾</button><div id="cur-dropdown" style="display:none;position:absolute;right:0;top:110%;background:white;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(15,29,46,.16);min-width:200px;z-index:300;overflow:hidden"></div></div>
</div>
<div id="stepper">
  <div class="step active" id="step1"><div class="step-num" id="sn1">1</div><div class="step-label">Your details</div></div>
  <div class="step-sep">›</div>
  <div class="step" id="step2"><div class="step-num" id="sn2">2</div><div class="step-label">Results</div></div>
</div>
<div id="main-content"></div>
<script>
var CURRENCIES=[{code:"USD",symbol:"$",label:"US Dollar"},{code:"EUR",symbol:"€",label:"Euro"},{code:"GBP",symbol:"£",label:"British Pound"},{code:"CAD",symbol:"CA$",label:"Canadian Dollar"},{code:"AUD",symbol:"AU$",label:"Australian Dollar"},{code:"NZD",symbol:"NZ$",label:"New Zealand Dollar"},{code:"JPY",symbol:"¥",label:"Japanese Yen"},{code:"JPY",symbol:"¥",label:"Japanese Yen"},{code:"CHF",symbol:"CHF",label:"Swiss Franc"}];
function getSym(){var c=CURRENCIES.find(function(c){return c.code===S.currency});return c?c.symbol:"$"}
function toggleCur(){S.cur_open=!S.cur_open;var dd=document.getElementById("cur-dropdown");dd.style.display=S.cur_open?"block":"none";if(S.cur_open){dd.innerHTML="";CURRENCIES.forEach(function(c){var b=document.createElement("button");b.style.cssText="display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;background:"+(c.code===S.currency?"var(--green-soft)":"transparent")+";border:none;border-bottom:1px solid var(--border);cursor:pointer";b.innerHTML='<span style="font-family:monospace;font-size:13px;font-weight:700;color:var(--green);width:36px">'+c.symbol+'</span><span>'+c.label+'</span>';b.onclick=function(){S.currency=c.code;S.cur_open=false;render()};dd.appendChild(b);});}}

var S={
  page:1,currency:"USD",cur_open:false,
  show_pmt_sens:false,show_dcf:false,choosing_lease:false,
  price:"",life:"",salvage:"",term:"",
  deposit:true,depositAmt:"",depositReturned:true,
  freq:1,leasePmt:"",borrowRate:"",
  missingFields:null,res:null
};

// ── CALC ──────────────────────────────────────────────────────────────────────
function pvPurchase(price,salvage,life,r){return price-salvage/Math.pow(1+r,life);}

function pvLease(term,depAmt,depositReturned,pmt,freq,r){
  // depAmt=0 means no deposit
  var rp=Math.pow(1+r,1/freq)-1;
  var totalN=term*freq;
  if(depAmt>0){
    if(depositReturned){
      // Deposit paid t=0, returned t=term; full payment schedule runs
      var af=rp>0?(1-Math.pow(1+rp,-totalN))/rp:totalN;
      return depAmt + pmt*af - depAmt/Math.pow(1+r,term);
    } else {
      // Deposit = first payment, not returned; remaining (totalN-1) payments follow
      var n2=totalN-1;
      var af2=rp>0&&n2>0?(1-Math.pow(1+rp,-n2))/rp:n2;
      return depAmt + pmt*af2;
    }
  } else {
    var af=rp>0?(1-Math.pow(1+rp,-totalN))/rp:totalN;
    return pmt*af;
  }
}

function impliedRate(price,salvage,depAmt,depositReturned,pmt,freq,term){
  // Search in annual rate space. pvLease > pvPurchase at low rates,
  // so increasing rate brings pvLease down toward pvPurchase.
  var lo=0.000001,hi=10.0,mid;
  for(var i=0;i<120;i++){
    mid=(lo+hi)/2;
    var pv=pvLease(term,depAmt,depositReturned,pmt,freq,mid);
    var target=price-salvage/Math.pow(1+mid,term);
    if(pv>target)lo=mid;else hi=mid;
  }
  return mid*100;
}

function calcBreakEven(pvP,term,depAmt,depositReturned,freq,r){
  var rp=Math.pow(1+r,1/freq)-1;var totalN=term*freq;
  var pvDep=depAmt>0?depAmt:0;
  var pvDepReturn=depAmt>0&&depositReturned?depAmt/Math.pow(1+r,term):0;
  if(depAmt>0&&!depositReturned){
    var n2=totalN-1;var af2=rp>0&&n2>0?(1-Math.pow(1+rp,-n2))/rp:n2;
    return af2>0?(pvP-pvDep)/af2:0;
  } else {
    var af=rp>0?(1-Math.pow(1+rp,-totalN))/rp:totalN;
    return af>0?(pvP-pvDep+pvDepReturn)/af:0;
  }
}

function calcAll(){
  var price=+S.price,life=+S.life||1,salvage=+S.salvage||0;
  var term=+S.term||life,pmt=+S.leasePmt,freq=+S.freq,r=+S.borrowRate/100;
  var depAmt=S.deposit?(+S.depositAmt||0):0;
  var depRet=S.deposit?S.depositReturned:true;
  var pvP=pvPurchase(price,salvage,life,r);
  var pvL=pvLease(term,depAmt,depRet,pmt,freq,r);
  var diff=pvP-pvL;var winner=diff<0?"purchase":"lease";
  var costOfConstraint=winner==="purchase"?Math.abs(diff):0;
  var rMonthly=r/12;var months=term*12;
  var monthlyExtra=costOfConstraint>0&&rMonthly>0?costOfConstraint*rMonthly/(1-Math.pow(1+rMonthly,-months)):costOfConstraint/(months||1);
  var ir=impliedRate(price,salvage,depAmt,depRet,pmt,freq,term);
  var bePmt=calcBreakEven(pvP,term,depAmt,depRet,freq,r);
  var pmtSens=[-0.40,-0.30,-0.20,-0.10,0,0.10,0.20,0.30,0.40].map(function(delta){
    var p2=pmt*(1+delta);var pvL2=pvLease(term,depAmt,depRet,p2,freq,r);
    return{pmt:p2,pvLease:pvL2,diff:pvP-pvL2,winner:pvP<pvL2?"purchase":"lease"};
  });
  var borrowSens=[-3,-2,-1,0,1,2,3].map(function(delta){
    var r2=(+S.borrowRate+delta)/100;if(r2<=0)return{label:(+S.borrowRate+delta)+"%",diff:0,pvP:0,pvL:0};
    var pvP2=pvPurchase(price,salvage,life,r2);var pvL2=pvLease(term,depAmt,depRet,pmt,freq,r2);
    return{label:(+S.borrowRate+delta)+"%",pvP:pvP2,pvL:pvL2,diff:pvP2-pvL2};
  });
  return{pvPurchase:pvP,pvLease:pvL,diff:diff,winner:winner,ir:ir,bePmt:bePmt,
    costOfConstraint:costOfConstraint,monthlyExtra:monthlyExtra,
    pmtSens:pmtSens,borrowSens:borrowSens,depAmt:depAmt,depRet:depRet};
}

function fmt(n,d){if(n==null||isNaN(n))return"--";d=d||0;return n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d})}
function fmtM(n){if(n==null||isNaN(n))return"--";var s=getSym();return n<0?"-"+s+fmt(Math.abs(n)):s+fmt(n)}

function updateStepper(){for(var i=1;i<=2;i++){var step=document.getElementById("step"+i),sn=document.getElementById("sn"+i);step.className="step";if(i<S.page){step.classList.add("done");sn.textContent="✓"}else if(i===S.page){step.classList.add("active");sn.textContent=String(i)}else sn.textContent=String(i);var n=i;(function(n,step){step.onclick=function(){if(n<S.page||(n===2&&S.res)){S.page=n;render()}}})(n,step);step.style.cursor=(i<S.page||(i===2&&S.res))?"pointer":"default";}}

var NOTES1=[
  {q:"What does this model tell me?",a:"It compares the total cost of leasing versus buying in today's money. If buying is cheaper, it tells you by how much — and if you need to lease anyway (because you don't have the purchase price), it shows exactly what that decision costs you expressed as a monthly figure.",v:""},
  {q:"How is the deposit treated — and why does it matter?",a:"In a standard lease, the deposit is security — you pay it upfront and get it back at the end of the lease term. That return makes it different from a sunk cost: the model accounts for the deposit going out at the start and coming back at the end. In some business leases, the deposit is treated as the first lease payment and is not returned. Use the toggle under the deposit amount to select the correct treatment — it makes a material difference to the lease cost.",v:""},
  {q:"What if I can't afford to buy?",a:"Select 'I'll lease regardless' and the results page will show you the extra cost of leasing compared to buying — both as a total present value and as a monthly equivalent. This helps you understand the real cost of the capital constraint you're facing.",v:""},
  {q:"What purchase price should I use?",a:"Use the cash price — what you'd pay buying outright with no financing. Ask the dealer or vendor for the cash price separately if you're negotiating a lease, because they often bundle charges differently.",v:""},
  {q:"What resale value should I use?",a:"Your best estimate of what the asset will be worth at the end of the period. For cars, Kelley Blue Book or similar services give depreciation estimates by make, model, and mileage. For appliances, 10–20% of purchase price after useful life is a reasonable starting point.",v:""}
];
var NOTES2=[
  {q:"What does the comparison show?",a:"The lower present value is the cheaper option. If buying has a lower present value, purchasing costs less in today's money over the full period. If leasing has a lower present value, the lease payments add up to less than the cost of buying, net of resale value.",v:""},
  {q:"What is the implied interest rate?",a:"This is the effective rate the lessor is charging you through the lease payments — found by solving for the interest rate at which the present value of all payments (including any deposit and residual value) equals the purchase price. If it's higher than your borrowing rate, you'd be better off with a loan to buy.",v:""},
  {q:"What is the break-even lease payment?",a:"The payment amount at which leasing and buying cost exactly the same. If the lessor charges less than this, leasing is cheaper. If more, buying is cheaper. Use it as a benchmark when negotiating.",v:""},
  {q:"What does the payment sensitivity table show?",a:"How the comparison changes if the lease payment were higher or lower. It shows you exactly where the break-even point is and how quickly the cost difference grows as payments move away from it.",v:""}
];

function drawChart(canvasId,data){
  var canvas=document.getElementById(canvasId);if(!canvas)return;
  var ctx=canvas.getContext("2d"),W=canvas.width,H=canvas.height;
  var pad={top:16,bottom:48,left:80,right:16};var cw=W-pad.left-pad.right,ch=H-pad.top-pad.bottom;
  ctx.clearRect(0,0,W,H);
  var vals=data.map(function(d){return d.diff});
  var minV=Math.min.apply(null,vals),maxV=Math.max.apply(null,vals);
  var rng=maxV-minV||Math.abs(maxV||1)*0.4;var lo=minV-rng*0.15,hi=maxV+rng*0.15;
  var zeroY=(hi-lo)!==0?pad.top+ch*(hi/(hi-lo)):pad.top+ch*0.5;
  ctx.strokeStyle="#D8E8DC";ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(pad.left,zeroY);ctx.lineTo(pad.left+cw,zeroY);ctx.stroke();ctx.setLineDash([]);
  ctx.strokeStyle="#D8E8DC";ctx.lineWidth=1;
  for(var i=0;i<=4;i++){var y=pad.top+ch*(1-i/4);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cw,y);ctx.stroke();var v=lo+(hi-lo)*(i/4);ctx.fillStyle="#8A96A6";ctx.font="10px system-ui";ctx.textAlign="right";ctx.fillText((v>=0?getSym():"-"+getSym())+fmt(Math.abs(v)/1000,1)+"k",pad.left-3,y+3);}
  var bw=Math.floor(cw/data.length*0.6),gap=cw/data.length,midIdx=Math.floor(data.length/2);
  data.forEach(function(d,i){var x=pad.left+gap*i+(gap-bw)/2,bh=Math.abs(d.diff)/(hi-lo)*ch,y=d.diff>=0?zeroY-bh:zeroY;
    ctx.fillStyle=d.diff<0?"#3182CE":(i===midIdx?"#2E7D52":"#6DBF8A");ctx.fillRect(x,y,bw,bh);
    // Mouseover tooltip stored as dataset - drawn as text on hover via title attr not available on canvas
    ctx.fillStyle="#8A96A6";ctx.font=i===midIdx?"bold 10px system-ui":"10px system-ui";ctx.textAlign="center";ctx.fillText(d.label,x+bw/2,H-pad.bottom+13);
    // Value label on bar
    if(Math.abs(d.diff)>10){ctx.fillStyle=d.diff<0?"#3182CE":"#2E7D52";ctx.font="9px system-ui";ctx.textAlign="center";ctx.fillText(getSym()+fmt(Math.abs(d.diff)/1000,1)+"k",x+bw/2,d.diff>=0?y-3:y+bh+10);}
  });
  ctx.fillStyle="#4A5568";ctx.font="bold 11px system-ui";ctx.textAlign="center";ctx.fillText("Borrowing rate — bars above zero = buying cheaper · bars below = leasing cheaper",pad.left+cw/2,H-3);
}

function initChartTooltip(canvasId,data,labelFn){
  setTimeout(function(){
    var canvas=document.getElementById(canvasId);if(!canvas)return;
    var par=canvas.parentNode;par.style.position='relative';
    var old=par.querySelector('.ctip');if(old)old.remove();
    var tip=document.createElement('div');tip.className='ctip';
    tip.style.cssText='position:absolute;pointer-events:none;background:rgba(15,29,46,.88);color:white;font-size:11px;font-weight:600;padding:5px 10px;border-radius:5px;white-space:nowrap;display:none;z-index:99;transform:translateX(-50%);top:6px';
    par.appendChild(tip);
    canvas.style.cursor='crosshair';
    canvas.onmousemove=function(e){
      var r=canvas.getBoundingClientRect();
      var scaleX=canvas.width/r.width;
      var mx=(e.clientX-r.left)*scaleX;
      var W=canvas.width,padL=80,cw=W-96;
      var n=data.length,gap=cw/n,bw=Math.floor(gap*0.6);
      var hit=null,hitPct=0;
      for(var i=0;i<n;i++){
        var bx=padL+gap*i+(gap-bw)/2;
        if(mx>=bx&&mx<=bx+bw){hit=data[i];hitPct=((bx+bw/2)/W*100);break;}
      }
      if(hit){tip.textContent=labelFn(hit);tip.style.left=hitPct.toFixed(1)+'%';tip.style.display='block';}
      else tip.style.display='none';
    };
    canvas.onmouseleave=function(){tip.style.display='none';};
  },90);
}

function render(){updateStepper();if(S.page===1)renderPage1();else if(S.page===2&&S.res)renderPage2();var cl=document.getElementById("cur-label");if(cl)cl.textContent=getSym()+" "+S.currency;}
render();
</script>
</body>
