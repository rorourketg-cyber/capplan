<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{--blue:#1B3F6E;--green:#2E7D52;--surface:#F7F8FA;--panel:#fff;--border:#E2E6EC;--t1:#0F1D2E;--t2:#4A5568;--t3:#8A96A6;--warn:#C84B31;--blue-soft:rgba(27,63,110,0.08);--green-soft:rgba(46,125,82,0.09);--amber:#F59E0B;--amber-soft:#FFFBEB;--amber-dark:#92400E;--amber-mid:#FEF3C7}

.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:11px}

.chart-box{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:18px}

table{width:100%;border-collapse:collapse;font-size:12.5px}

th.left{text-align:left}
td{padding:8px 14px;text-align:right;font-family:monospace;border-bottom:1px solid var(--border)}
td.left{text-align:left;font-family:inherit;color:var(--t1)}td.sub{text-align:left;font-family:inherit;color:var(--t3);font-size:11px}
tr.total-row td{font-weight:700;background:var(--surface)}tr:nth-child(even){background:var(--surface)}
tr.highlight td{background:var(--blue-soft)!important;font-weight:700;color:var(--blue)}

.mode-btn.active{background:var(--blue);color:white}.mode-btn:not(.active){background:white;color:var(--t2)}

.video-wrap{position:relative;padding-bottom:56.25%;height:0}.video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%}
@media print{*{-webkit-print-color-adjust:exact;print-color-adjust:exact}html,body{margin:0;padding:0;background:white}#masthead{position:static!important;height:auto!important;padding:8px 0!important}#stepper,.btn-ghost,.print-btn,.coll-arr,.mode-toggle{display:none!important}.page-grid,.p2-grid{display:block!important}aside{display:none!important}.coll-body{display:block!important}.coll-head{break-after:avoid!important}.result-banner,.metric,.chart-box,.collapsible,.helper-card{box-shadow:none!important;border:1px solid #ccc!important;break-inside:avoid}table{font-size:9px;table-layout:fixed}th,td{padding:3px 5px}thead{display:table-header-group}tr{break-inside:avoid}@page{margin:0.5in;size:landscape}}

<body>
<div id="masthead">
  <div class="logo"><div class="logo-icon"><svg viewBox="0 0 18 18" width="18" height="18" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,10 7,14 15,4"/></svg></div><div class="logo-text">Cap<span>Plan</span></div></div>
  <div class="module-name">Minimum Selling Price</div>
  <div style="position:relative"><button style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:5px;padding:6px 12px;color:white;font-size:12px;font-weight:600" id="cur-btn" onclick="toggleCur()"><span id="cur-label">$ USD</span> ▾</button><div id="cur-dropdown" style="display:none;position:absolute;right:0;top:110%;background:white;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(15,29,46,.16);min-width:200px;z-index:300;overflow:hidden"></div></div>
</div>
<div id="stepper">
  <div class="step active" id="step1"><div class="step-num" id="sn1">1</div><div class="step-label">Asset Details</div></div>
  <div class="step-sep">›</div>
  <div class="step" id="step2"><div class="step-num" id="sn2">2</div><div class="step-label">Results</div></div>
</div>
<div id="main-content"></div>
<script>
var CURRENCIES=[{code:"USD",symbol:"$",label:"US Dollar"},{code:"EUR",symbol:"€",label:"Euro"},{code:"JPY",symbol:"¥",label:"Japanese Yen"},{code:"GBP",symbol:"£",label:"British Pound"},{code:"INR",symbol:"₹",label:"Indian Rupee"},{code:"CHF",symbol:"CHF",label:"Swiss Franc"},{code:"CAD",symbol:"CA$",label:"Canadian Dollar"},{code:"AUD",symbol:"AU$",label:"Australian Dollar"},{code:"NZD",symbol:"NZ$",label:"New Zealand Dollar"}];
function getSym(){var c=CURRENCIES.find(function(c){return c.code===S.currency});return c?c.symbol:"$"}

var S={
  page:1,currency:"USD",cur_open:false,mode:"business",
  coc_open:false,coc_mode:"wacc",coc_kd:6,coc_ke:12,coc_wd:40,coc_rf:4.5,coc_beta:1.0,coc_mrp:5.5,
  res:null,show_dcf:false,show_coc_sens:false,show_age_sens:false,missingFields:null,
  // benefit wizard
  bw_open:false,bw_type:"cost_saving",bw_current:"",bw_improvement:"",
  cost:"",life:"",age:"",benefits:"",method:"Double-declining",hyr:true,ddbRate:"",
  taxRate:"",coc:""
};

function toggleCur(){S.cur_open=!S.cur_open;var dd=document.getElementById("cur-dropdown");dd.style.display=S.cur_open?"block":"none";if(S.cur_open){dd.innerHTML="";CURRENCIES.forEach(function(c){var b=document.createElement("button");b.style.cssText="display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;background:"+(c.code===S.currency?"var(--blue-soft)":"transparent")+";border:none;border-bottom:1px solid var(--border);cursor:pointer";b.innerHTML='<span style="font-family:monospace;font-size:13px;font-weight:700;color:var(--blue);width:36px">'+c.symbol+'</span><span>'+c.label+'</span>';b.onclick=function(){S.currency=c.code;S.cur_open=false;render()};dd.appendChild(b);});}}

// ── CALC ──────────────────────────────────────────────────────────────────────
function calcDepr(cost,life,method,hyr,ddbRate){
  var d=[];
  if(method==="Double-declining"){var rate=ddbRate/100;d.push(cost*rate*(hyr?0.5:1));for(var y=2;y<=life;y++)d.push((cost-d.reduce(function(s,v){return s+v},0))*rate);}
  else if(method==="Straight-line"){var y1=cost/life*(hyr?0.5:1);d.push(y1);for(var y=2;y<=life;y++)d.push(hyr?(cost-y1)/(life-1):cost/life);}
  else{var y1=hyr?cost/(life+1):2*cost/(life+1);d.push(y1);if(hyr)for(var y=2;y<=life;y++)d.push(2*cost*(life-y+1)/((life+1)*(life-1)));else for(var y=2;y<=life;y++)d.push(cost*(life-y+1)*2/(life*(life+1)));}
  return d;
}

function calcMinPrice(cost,life,age,benefits,method,hyr,ddbRate,taxRate,coc,isConsumer){
  var tx=isConsumer?0:taxRate/100, r=coc/100;
  var depr=isConsumer?[]:calcDepr(cost,Math.min(age,life),method,hyr,ddbRate);
  // Financial position at time of sale
  var pvBen=benefits*(1-(isConsumer?0:tx))*((1-(1+r)**-age)/r);
  var pvTS=isConsumer?0:depr.reduce(function(s,d,i){return s+d*tx/Math.pow(1+r,i+1)},0);
  var finPos=-cost+pvBen+pvTS;
  // Min selling price: finPos + price*(1-tax)/(1+r)^age = 0
  // price = -finPos / ((1-tax)/(1+r)^age)
  var denom=isConsumer?1/Math.pow(1+r,age):(1-tx)/Math.pow(1+r,age);
  var minPrice=denom>0?-finPos/denom:0;
  // CoC sensitivity
  var cocSens=[-6,-4,-2,-1,0,1,2,4,6].map(function(delta){
    var r2=(coc+delta)/100;if(r2<=0)return{coc:coc+delta,price:0};
    var pvB2=benefits*(1-tx)*((1-(1+r2)**-age)/r2);
    var pvT2=isConsumer?0:depr.reduce(function(s,d,i){return s+d*tx/Math.pow(1+r2,i+1)},0);
    var fp2=-cost+pvB2+pvT2;
    var d2=isConsumer?1/Math.pow(1+r2,age):(1-tx)/Math.pow(1+r2,age);
    return{coc:coc+delta,price:d2>0?-fp2/d2:0};
  });
  // Age sensitivity (sell at different ages)
  var ageSens=[];
  for(var a=Math.max(1,age-3);a<=age+3;a++){
    var deprA=isConsumer?[]:calcDepr(cost,Math.min(a,life),method,hyr,ddbRate);
    var pvBA=benefits*(1-tx)*((1-(1+r)**-a)/r);
    var pvTA=isConsumer?0:deprA.reduce(function(s,d,i){return s+d*tx/Math.pow(1+r,i+1)},0);
    var fpA=-cost+pvBA+pvTA;
    var dA=isConsumer?1/Math.pow(1+r,a):(1-tx)/Math.pow(1+r,a);
    ageSens.push({age:a,price:dA>0?-fpA/dA:0});
  }
  return{minPrice:minPrice,finPos:finPos,pvBen:pvBen,pvTS:pvTS,depr:depr,cocSens:cocSens,ageSens:ageSens};
}

function calcAll(){
  return calcMinPrice(+S.cost,+S.life||1,+S.age||1,+S.benefits||0,S.method,S.hyr,+S.ddbRate,+S.taxRate||0,+S.coc||0,S.mode==="consumer");
}

function fmt(n,d){if(n==null||isNaN(n))return"--";d=d||0;return n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d})}
function fmtM(n){if(n==null||isNaN(n))return"--";var s=getSym();return n<0?"-"+s+fmt(Math.abs(n)):s+fmt(n)}

function updateStepper(){for(var i=1;i<=2;i++){var step=document.getElementById("step"+i),sn=document.getElementById("sn"+i);step.className="step";if(i<S.page){step.classList.add("done");sn.textContent="✓"}else if(i===S.page){step.classList.add("active");sn.textContent=String(i)}else sn.textContent=String(i);var n=i;(function(n,step){step.onclick=function(){if(n<S.page||(n===2&&S.res)){S.page=n;render()}}})(n,step);step.style.cursor=(i<S.page||(i===2&&S.res))?"pointer":"default";}}

var NOTES_BUS=[
  {q:"What does this model calculate?",a:"This model calculates the minimum price at which you should sell an asset you have held for some time, given your required rate of return. It ensures you recover your original investment plus the cost of capital on that investment, after accounting for the benefits you have already received and the depreciation tax shields you have claimed.",v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"What are annual benefits and how do I estimate them?",a:"Annual benefits are the incremental after-tax revenues or cost savings generated by the asset each year you held it. If you used a standard capital budgeting analysis to justify the original purchase, the same benefit figures apply here. If not, estimate the additional cash flows — revenue increases or cost reductions — that resulted from having this asset.",v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"What does the financial position at time of sale mean?",a:"The financial position is the present value of what you have put in (the original cost) minus the present value of what you have received so far (after-tax benefits and depreciation tax shields). A negative financial position means you have not yet recovered your investment — the selling price must make up the shortfall.",v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"Is this the price I should list my asset for?",a:"This is a floor price — the minimum that earns your required return on the original investment. Your actual asking price should also consider market conditions. If the market will bear more, ask for more. If the market will not support this floor price, you face a choice between accepting less (and a lower return) or continuing to hold the asset.",v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"How do I calculate a required rate of return?",a:"Use the Cost of Capital Calculator to estimate your WACC or CAPM rate — the blended cost of your debt and equity financing.",v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"}
];
var NOTES_CON=[
  {q:"What does this model calculate?",a:"This model tells you the minimum price to accept when selling a personal asset — a car, a piece of equipment, or other durable good — to ensure you break even or earn your target return on what you originally paid.",v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"What are annual benefits for a personal asset?",a:"For a consumer asset, benefits represent the value you received from using it — money saved (by not renting, for example), or the estimated monetary value of the services it provided. This is often a subjective estimate but it matters: the more value you extracted while owning the asset, the lower the price you need to recoup your investment.",v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"How should I use this result when negotiating?",a:"The result is your reservation price — the minimum you should accept. Never reveal this number to the buyer. Your asking price should start above it, leaving room to negotiate down while still landing above your minimum.",v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"What if the market price is below my minimum?",a:"You have three options: continue using the asset until the market price recovers, accept the lower price and the lower return it implies, or take the asset off the market entirely. The minimum price analysis at least gives you a clear anchor for that decision.",v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"}
];

function makeBNList(notes,id){var list=document.getElementById(id);if(!list)return;list.innerHTML="";notes.forEach(function(n,i){var item=document.createElement("div");item.className="bn-item";var head=document.createElement("div");head.className="bn-head";head.innerHTML='<div class="bn-qmark">?</div><div class="bn-q">'+n.q+'</div><div class="bn-arr" id="arr'+id+i+'">›</div>';var body=document.createElement("div");body.className="bn-body";body.textContent=n.a;if(n.v){var vb=document.createElement("button");vb.className="watch-btn";vb.textContent="▶ Learn More";vb.onclick=function(e){e.stopPropagation();openVideo(n.v)};body.appendChild(vb)}head.onclick=function(){var open=body.classList.contains("open");body.classList.toggle("open");document.getElementById("arr"+id+i).style.transform=open?"rotate(0deg)":"rotate(90deg)";head.style.background=open?"":"var(--surface)";};item.appendChild(head);item.appendChild(body);list.appendChild(item);})}
function openVideo(url){var id=url.split(/[/?=v]/).filter(function(s){return s.length>5}).pop()||"";var ov=document.createElement("div");ov.className="modal-overlay";ov.innerHTML='<div class="modal-box"><div class="modal-head"><span style="font-size:13px;font-weight:700;color:var(--t2)">Learn More</span><button class="modal-close">×</button></div><div class="video-wrap"><iframe src="https://www.youtube.com/embed/'+id+'" allowfullscreen frameborder="0"></iframe></div></div>';ov.querySelector(".modal-close").onclick=function(){ov.remove()};ov.onclick=function(e){if(e.target===ov)ov.remove()};document.body.appendChild(ov);}

function renderCoC(){
  var box=document.getElementById("coc-box");if(!box)return;box.innerHTML="";
  var tx=35,we=100-S.coc_wd;var wacc=+(S.coc_kd*(1-tx/100)*S.coc_wd/100+S.coc_ke*we/100).toFixed(2);var capm=+(S.coc_rf+S.coc_beta*S.coc_mrp).toFixed(2);var result=S.coc_mode==="wacc"?wacc:capm;
  if(!S.coc_open){box.innerHTML='<button onclick="S.coc_open=true;renderCoC()" style="display:flex;align-items:center;gap:12px;width:100%;padding:13px 14px;background:none;border:none;cursor:pointer;text-align:left"><div style="width:34px;height:34px;background:var(--green-soft);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg viewBox="0 0 18 18" width="16" height="16" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="9" r="3"/><path d="M9 2v2M9 14v2M2 9h2M14 9h2"/></svg></div><div><div style="font-size:13px;font-weight:700;color:var(--blue)">Cost of Capital Calculator</div><div style="font-size:11px;color:var(--t3);margin-top:2px">WACC · CAPM</div></div><span style="margin-left:auto;color:var(--t3)">›</span></button>';return;}
  var html='<div style="border:1px solid var(--blue);border-radius:8px;overflow:hidden"><div style="background:var(--blue);padding:11px 14px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;font-weight:700;color:white">Cost of Capital Calculator</span><button onclick="S.coc_open=false;renderCoC()" style="color:rgba(255,255,255,.7);font-size:20px">×</button></div><div style="padding:12px 14px 0;display:flex;gap:8px">';
  [{k:"wacc",n:"WACC",s:"Borrowing rate"},{k:"capm",n:"CAPM",s:"Market risk"}].forEach(function(t){html+='<button onclick="S.coc_mode=\''+t.k+'\';renderCoC()" style="flex:1;padding:8px 10px;border-radius:7px;border:1.5px solid '+(S.coc_mode===t.k?"var(--blue)":"var(--border)")+';background:'+(S.coc_mode===t.k?"var(--blue-soft)":"transparent")+';cursor:pointer;text-align:left"><div style="font-size:12px;font-weight:700;color:'+(S.coc_mode===t.k?"var(--blue)":"var(--t2)")+'">'+t.n+'</div><div style="font-size:10px;color:var(--t3)">'+t.s+'</div></button>';});
  html+='</div><div style="padding:14px">';
  if(S.coc_mode==="wacc"){html+=cR("Cost of Debt (pre-tax)","coc_kd",S.coc_kd,"%");html+=cR("Cost of Equity","coc_ke",S.coc_ke,"%");html+=cR("Debt Weighting","coc_wd",S.coc_wd,"%");html+='<div style="background:var(--surface);border-radius:5px;padding:8px 10px;font-size:11px">WACC = <strong style="color:var(--green)">'+wacc+'%</strong></div>';}
  else{html+=cR("Risk-Free Rate","coc_rf",S.coc_rf,"%");html+=cR("Beta","coc_beta",S.coc_beta,"");html+=cR("Market Risk Premium","coc_mrp",S.coc_mrp,"%");html+='<div style="background:var(--surface);border-radius:5px;padding:8px 10px;font-size:11px">Ke = '+capm+'%</div>';}
  html+='<div style="margin-top:12px;padding:10px 14px;background:var(--green-soft);border-radius:8px;border:1px solid var(--green);display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--green)">Calculated Rate</div><div style="font-family:monospace;font-size:22px;font-weight:700;color:var(--green)">'+result+'%</div></div><button onclick="S.coc='+result+';renderCoC();var el=document.getElementById(\'inp-coc\');if(el)el.value='+result+'" style="background:var(--green);color:white;border:none;border-radius:7px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer">Use this rate →</button></div></div></div>';
  box.innerHTML=html;
}
function cR(l,k,v,s){return'<div style="margin-bottom:11px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:5px">'+l+'</div><div class="ui"><input type="text" value="'+v+'" onchange="S.'+k+'=+this.value||0;renderCoC()" onfocus="this.style.borderBottomColor=\'var(--blue)\'" onblur="this.style.borderBottomColor=\'var(--border)\'" style="font-family:monospace;font-size:15px;font-weight:600;border:none;border-bottom:2px solid var(--border);background:transparent;width:100%;outline:none;padding:2px 0">'+(s?'<span style="font-size:12px;color:var(--t3)">'+s+'</span>':'')+'</div></div>'}

function field(l,h,fw,last,note){return'<div class="field'+(fw?" full":"")+(last?" last":"")+'"><div class="field-label">'+l+'</div>'+h+(note?'<div class="field-note">'+note+'</div>':'')+'</div>';}
function uIn(pfx,val,id,ob,sfx,dis){return'<div class="ui">'+(pfx?'<span class="pfx">'+pfx+'</span>':'')+'<input type="text" id="'+id+'" value="'+(val==null?"":val)+'" '+(dis?'disabled ':'')+' onblur="'+ob+'" onfocus="this.style.borderBottomColor=\'var(--blue)\'">'+(sfx?'<span class="sfx">'+sfx+'</span>':'')+'</div>';}

function goToResults(){
  var missing=[];var isC=S.mode==="consumer";
  if(!S.cost)missing.push("Original Cost");if(!S.life)missing.push("Useful Life");if(!S.age)missing.push("Age of Asset");
  if(!S.benefits&&S.benefits!==0)missing.push("Annual Benefits");
  if(!isC&&S.method==="Double-declining"&&!S.ddbRate)missing.push("Depreciation Rate");
  if(!isC&&!S.taxRate)missing.push("Tax Rate");if(!S.coc)missing.push("Required Return");
  if(missing.length>0){S.missingFields=missing;render();return;}
  S.missingFields=null;try{S.res=calcAll();S.page=2;render();}catch(e){alert("Error: "+e.message)}
}
function resetInputs(){S.cost="";S.life="";S.age="";S.benefits="";S.method="Double-declining";S.hyr=true;S.ddbRate="";S.taxRate="";S.coc="";S.missingFields=null;S.bw_open=false;S.bw_current="";S.bw_improvement="";render();}
function loadExample(){
  var isC=S.mode==="consumer";
  if(!isC){S.cost=80000;S.life=10;S.age=3;S.benefits=20000;S.method="Double-declining";S.hyr=true;S.ddbRate=20;S.taxRate=30;S.coc=12;}
  else{S.cost=30000;S.life=5;S.age=2;S.benefits=6000;S.method="Straight-line";S.hyr=false;S.ddbRate=0;S.taxRate=0;S.coc=6;}
  S.missingFields=null;render();
}

function drawChart(canvasId,data,current){
  var canvas=document.getElementById(canvasId);if(!canvas)return;
  var ctx=canvas.getContext("2d"),W=canvas.width,H=canvas.height;
  var pad={top:16,bottom:48,left:80,right:16};var cw=W-pad.left-pad.right,ch=H-pad.top-pad.bottom;
  ctx.clearRect(0,0,W,H);
  var vals=data.map(function(d){return d.price});var minV=Math.min.apply(null,vals),maxV=Math.max.apply(null,vals);var rng=maxV-minV||maxV*0.2;var lo=minV-rng*0.1,hi=maxV+rng*0.15;
  ctx.strokeStyle="#E2E6EC";ctx.lineWidth=1;
  for(var i=0;i<=4;i++){var y=pad.top+ch*(1-i/4);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cw,y);ctx.stroke();ctx.fillStyle="#8A96A6";ctx.font="10px system-ui";ctx.textAlign="right";ctx.fillText(getSym()+fmt((lo+(hi-lo)*(i/4))/1000,0)+"k",pad.left-3,y+3);}
  var bw=Math.floor(cw/data.length*0.6),gap=cw/data.length,midIdx=data.findIndex(function(d){return d.coc===current});if(midIdx<0)midIdx=Math.floor(data.length/2);
  data.forEach(function(d,i){var x=pad.left+gap*i+(gap-bw)/2,bh=(d.price-lo)/(hi-lo)*ch,y=pad.top+ch-bh;ctx.fillStyle=i===midIdx?"#2E7D52":"#6DBF8A";ctx.fillRect(x,y,bw,bh);ctx.fillStyle=i===midIdx?"var(--green)":"#8A96A6";ctx.font=i===midIdx?"bold 10px system-ui":"10px system-ui";ctx.textAlign="center";ctx.fillText(d.coc+"%",x+bw/2,H-pad.bottom+13);});
  ctx.strokeStyle="#4A5568";ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(pad.left,pad.top+ch);ctx.lineTo(pad.left+cw,pad.top+ch);ctx.stroke();ctx.fillStyle="#4A5568";ctx.font="bold 12px system-ui";ctx.textAlign="center";ctx.fillText("Required Return (%)",pad.left+cw/2,H-3);
}

function printSummary(){
  var res=S.res;if(!res)return;var pd=S.show_dcf,pd2=S.show_age_sens;S.show_dcf=true;S.show_age_sens=true;renderPage2();
  setTimeout(function(){document.querySelectorAll('canvas').forEach(function(c){var img=document.createElement('img');img.src=c.toDataURL('image/png');img.style.cssText='width:100%;height:auto;display:block';c.parentNode.replaceChild(img,c);});window.print();S.show_dcf=pd;S.show_age_sens=pd2;renderPage2();},300);
