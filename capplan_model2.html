<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapPlan — Asset Purchase With Alternatives</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#F7F8FA;color:#0F1D2E;font-size:14px}
input,select,button{font-family:inherit;font-size:14px}
button{cursor:pointer;background:none;border:none}
select{-webkit-appearance:none;appearance:none}

/* ── TOKENS ── */
:root{
  --blue:#1B3F6E;--green:#2E7D52;--surface:#F7F8FA;--panel:#fff;
  --border:#E2E6EC;--t1:#0F1D2E;--t2:#4A5568;--t3:#8A96A6;--warn:#C84B31;
  --blue-soft:rgba(27,63,110,0.08);--green-soft:rgba(46,125,82,0.09);
}

/* ── MASTHEAD ── */
#masthead{background:var(--blue);height:72px;min-height:72px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:34px;height:34px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center}
.logo-text{font-family:Georgia,serif;font-size:22px;color:white}
.logo-text span{color:#A8C5E8}
.module-name{font-size:13px;font-weight:700;color:rgba(255,255,255,0.85)}

/* ── STEPPER ── */
#stepper{background:white;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px}
.step{display:flex;align-items:center;gap:8px;padding:13px 4px;border-bottom:2px solid transparent}
.step.active{border-bottom-color:var(--blue)}
.step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--border);color:var(--t3)}
.step.active .step-num{background:var(--blue);color:white}
.step.done .step-num{background:var(--green);color:white}
.step-label{font-size:13px;font-weight:500;color:var(--t3);white-space:nowrap}
.step.active .step-label{color:var(--blue)}
.step.done .step-label{color:var(--green)}
.step-sep{color:var(--border);margin:0 8px;font-size:16px}

/* ── LAYOUT ── */
.page{max-width:1100px;margin:0 auto;padding:24px 22px}
.page-grid{display:grid;grid-template-columns:300px 1fr;gap:22px}

/* ── PANELS ── */
.panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.06);overflow:hidden;margin-bottom:18px}
.panel-head{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.panel-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0}
.panel-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t2)}
.field-grid{display:grid;grid-template-columns:1fr 1fr}
.field{padding:13px 18px;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.field.full{grid-column:1/-1;border-right:none}
.field.last{border-bottom:none}
.field-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:6px}
.field-note{font-size:10px;color:var(--t3);margin-top:4px}

/* ── INPUTS ── */
.ui{display:flex;align-items:center;gap:6px}
.ui .pfx,.ui .sfx{font-family:monospace;font-size:12px;color:var(--t3);flex-shrink:0}
.ui input{font-family:monospace;font-size:15px;font-weight:600;color:var(--t1);border:none;border-bottom:2px solid var(--border);background:transparent;width:100%;padding:2px 0;outline:none}
.ui input:focus{border-bottom-color:var(--blue)}
.ui input:disabled{color:var(--t3);opacity:.6}
.ui select{font-family:monospace;font-size:14px;font-weight:600;color:var(--t1);border:none;border-bottom:2px solid var(--border);background:transparent;width:100%;padding:2px 0;outline:none;cursor:pointer}
.ui select:focus{border-bottom-color:var(--blue)}
.pills{display:flex;gap:8px;margin-top:4px}
.pill{display:flex;align-items:center;gap:6px;padding:6px 13px;border:1.5px solid var(--border);border-radius:20px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;user-select:none}
.pill.active{border-color:var(--blue);background:var(--blue-soft);color:var(--blue)}
.pill-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--t3);flex-shrink:0}
.pill.active .pill-dot{border-color:var(--blue);background:var(--blue)}

/* ── TABS ── */
.alt-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:0;background:var(--surface)}
.alt-tab{padding:10px 18px;font-size:13px;font-weight:600;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.alt-tab:hover{color:var(--t2)}
.alt-tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* ── BUTTONS ── */
.btn-primary{background:var(--blue);color:white;border:none;border-radius:8px;padding:11px 22px;font-size:13px;font-weight:700;cursor:pointer}
.btn-primary:hover{background:#163357}
.btn-ghost{background:transparent;color:var(--t2);border:1.5px solid var(--border);border-radius:8px;padding:11px 22px;font-size:13px;font-weight:600;cursor:pointer}
.btn-sm{background:var(--blue);color:white;border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer}
.btn-sm.ghost{background:transparent;color:var(--t2);border:1.5px solid var(--border)}
.action-row{display:flex;justify-content:flex-end;gap:10px;margin-top:4px}

/* ── BRIEFING NOTES ── */
.bn-item{border-bottom:1px solid var(--border)}
.bn-item:last-child{border-bottom:none}
.bn-head{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;cursor:pointer}
.bn-head:hover{background:var(--surface)}
.bn-qmark{width:21px;height:21px;border-radius:50%;background:var(--blue-soft);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--blue);flex-shrink:0;margin-top:1px;margin-right:5px}
.bn-q{font-size:13px;line-height:1.5;color:var(--blue);flex:1}
.bn-arr{color:var(--t3);font-size:14px;flex-shrink:0;margin-top:2px;transition:transform .2s}
.bn-body{padding:10px 13px 12px 44px;font-size:12.5px;line-height:1.7;color:var(--t2);background:var(--surface);border-top:1px solid var(--border);display:none}
.bn-body.open{display:block}
.watch-btn{margin-top:10px;display:flex;width:fit-content;align-items:center;gap:5px;border:1px solid var(--blue);border-radius:5px;padding:5px 12px;font-size:11px;font-weight:700;color:var(--blue);background:none;cursor:pointer}
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:11px}

/* ── PAGE 2 ── */
.p2-box{background:var(--panel);border:1px solid var(--border);border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.06);overflow:hidden;margin-bottom:18px}

/* ── PAGE 3 RESULTS ── */
.banner{border-radius:10px;padding:18px 22px;margin-bottom:18px;border:1.5px solid transparent}
.banner.positive{background:var(--green-soft);border-color:var(--green)}
.banner.negative{background:rgba(200,75,49,.07);border-color:var(--warn)}
.banner.mixed{background:rgba(27,63,110,.06);border-color:var(--blue)}
.banner-headline{font-family:Georgia,serif;font-size:22px;line-height:1.2;font-weight:400}
.banner.positive .banner-headline{color:var(--green)}
.banner.negative .banner-headline{color:var(--warn)}
.banner.mixed .banner-headline{color:var(--blue)}
.decision-box{background:white;border:1px solid var(--border);border-radius:8px;padding:18px 22px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.decision-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:12px}
.decision-type{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.d-pill{display:flex;align-items:center;gap:6px;padding:7px 14px;border:1.5px solid var(--border);border-radius:20px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;user-select:none}
.d-pill.active{border-color:var(--blue);background:var(--blue-soft);color:var(--blue)}
.results-grid{display:grid;gap:14px;margin-bottom:18px}
.alt-card{background:var(--panel);border:2px solid var(--border);border-radius:10px;overflow:hidden}
.alt-card.winner{border-color:var(--green)}
.alt-card.loser{border-color:var(--border);opacity:.85}
.alt-card.rejected{border-color:var(--warn);opacity:.8}
.alt-card-head{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.alt-card.winner .alt-card-head{background:var(--green-soft)}
.alt-card.rejected .alt-card-head{background:rgba(200,75,49,.06)}
.alt-name{font-size:14px;font-weight:700}
.alt-card.winner .alt-name{color:var(--green)}
.alt-card.rejected .alt-name{color:var(--warn)}
.alt-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 10px;border-radius:12px}
.badge-accept{background:rgba(46,125,82,.15);color:var(--green)}
.badge-select{background:rgba(27,63,110,.12);color:var(--blue)}
.badge-reject{background:rgba(200,75,49,.12);color:var(--warn)}
.metrics-row{display:grid;padding:14px 18px;gap:8px}
.m-item{display:flex;justify-content:space-between;align-items:baseline;font-size:13px}
.m-label{color:var(--t3);font-size:12px}
.m-val{font-family:monospace;font-weight:700;color:var(--t1)}
.m-val.ok{color:var(--green)}
.m-val.bad{color:var(--warn)}
.collapsible{background:var(--panel);border:1px solid var(--border);border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:14px;overflow:hidden}
.coll-head{padding:12px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.coll-head:hover{background:var(--surface)}
.coll-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t2)}
.coll-arr{color:var(--t3);font-size:14px;transition:transform .2s}
.coll-body{display:none;border-top:1px solid var(--border)}
.coll-body.open{display:block}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{padding:8px 14px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);border-bottom:1px solid var(--border);white-space:nowrap;background:var(--surface)}
th.left{text-align:left}
td{padding:8px 14px;text-align:right;font-family:monospace;border-bottom:1px solid var(--border)}
td.left{text-align:left;font-family:inherit;color:var(--t1)}
td.sub{text-align:left;font-family:inherit;color:var(--t3);font-size:11px}
td.neg{color:var(--warn)}
tr.total-row td{font-weight:700;background:var(--surface)}
tr.npv-row td{font-size:15px;font-weight:800;border-top:2px solid var(--blue)}
tr.npv-row.ok td{background:rgba(46,125,82,.09);color:var(--green)}
tr.npv-row.bad td{background:rgba(200,75,49,.06);color:var(--warn)}
tr:nth-child(even){background:var(--surface)}
.overflow-x{overflow-x:auto}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.chart-box{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.chart-title{font-size:14px;font-weight:700;color:var(--t2);margin-bottom:10px}
.modal-overlay{position:fixed;inset:0;background:rgba(15,29,46,.82);z-index:9999;display:flex;align-items:center;justify-content:center}
.modal-box{background:white;border-radius:10px;overflow:hidden;width:min(820px,95vw)}
.modal-head{padding:11px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.modal-close{font-size:22px;color:var(--t3);line-height:1;cursor:pointer;background:none;border:none}
.video-wrap{position:relative;padding-bottom:56.25%;height:0}
.video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%}
.ok{color:var(--green);font-weight:700}
.bad{color:var(--warn);font-weight:700}
.print-btn{display:flex;align-items:center;gap:6px;background:transparent;color:var(--t2);border:1.5px solid var(--border);border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer}
.print-btn:hover{border-color:var(--blue);color:var(--blue)}

/* wizard CSS now in .helper-* classes */
.sens-indicator{border-radius:8px;padding:14px 18px;border:1.5px solid transparent}
.si-positive{background:var(--green-soft);border-color:var(--green)}
.si-negative{background:rgba(200,75,49,.07);border-color:var(--warn)}
.si-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.si-positive .si-title{color:var(--green)}.si-negative .si-title{color:var(--warn)}
.si-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.si-item{display:flex;flex-direction:column;gap:3px}
.si-label{font-size:11px;color:var(--t2)}
.si-val{font-family:monospace;font-size:20px;font-weight:800}
.si-val.ok{color:var(--green)}.si-val.bad{color:var(--warn)}
.si-sub{font-size:10px;color:var(--t3)}

/* ── HELPER / GUIDANCE ELEMENTS (amber) ──────────────────────────────────── */
:root { --amber:#F59E0B;--amber-soft:#FFFBEB;--amber-dark:#92400E;--amber-mid:#FEF3C7; }
.helper-card{background:var(--amber-soft);border:2px solid var(--amber);border-radius:10px;overflow:hidden;margin-bottom:18px}
.helper-head{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;background:var(--amber-mid)}
.helper-head:hover{background:#fde68a}
.helper-icon{font-size:18px;flex-shrink:0}
.helper-title{font-size:13px;font-weight:700;color:var(--amber-dark);flex:1}
.helper-toggle{font-size:11px;font-weight:600;color:var(--amber-dark);opacity:.7}
.helper-body{padding:16px;border-top:1.5px solid var(--amber);display:flex;flex-direction:column;gap:14px}
.helper-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--amber-dark)}
.helper-result{background:var(--green-soft);border:1.5px solid var(--green);border-radius:8px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.helper-use{background:var(--green);color:white;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.asset-picker{background:var(--amber-soft);border:2px solid var(--amber);border-radius:10px;padding:14px 16px;margin-bottom:18px}
.asset-picker-label{font-size:12px;font-weight:700;color:var(--amber-dark);margin-bottom:8px;display:flex;align-items:center;gap:6px}
@media print{
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  html,body{height:auto!important;margin:0!important;padding:0!important;background:white!important}
  #masthead{position:static!important;top:auto!important;height:auto!important;min-height:0!important;padding:8px 0!important;margin:0!important;box-shadow:none!important}
  .btn-ghost,#stepper,.print-btn{display:none!important}
  .coll-arr{display:none!important}
  .coll-head{cursor:default!important;break-after:avoid!important;break-inside:avoid!important}
  .page-grid{display:block!important}
  aside{display:none!important}
  .coll-body{display:block!important}
  .banner,.metric,.chart-box,.alt-card{box-shadow:none!important;border:1px solid #ccc!important;break-inside:avoid}
  .collapsible{box-shadow:none!important;border:1px solid #ccc!important;break-inside:auto!important}
  .charts-grid{grid-template-columns:1fr 1fr}
  .page{max-width:100%!important;padding:8px!important;margin:0!important}
  table{width:100%!important;font-size:8.5px!important;table-layout:fixed!important}
  th,td{padding:3px 4px!important;white-space:normal!important;word-break:break-word;overflow-wrap:anywhere}
  thead{display:table-header-group}
  tr{break-inside:avoid}
  .overflow-x{overflow-x:visible!important;overflow:visible!important}
  @page{margin:0.5in;size:landscape}
}

#model-banner {
  background: var(--blue);
  color: white;
  text-align: center;
  padding: 10px 28px;
  font-size: 14px;
  font-weight: 600;
  font-family: Georgia, serif;
  font-style: italic;
  letter-spacing: 0.01em;
  border-bottom: 2px solid rgba(255,255,255,0.12);
}

.model-overview {
  background: var(--amber-soft);
  border: 1.5px solid var(--amber);
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 18px;
  font-size: 13px;
  color: var(--amber-dark);
  line-height: 1.6;
}
.model-overview strong { color: var(--amber-dark); }
</style>
</head>
<body>

<div id="masthead">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 18 18" width="18" height="18" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,10 7,14 15,4"/></svg>
    </div>
    <div class="logo-text">Cap<span>Plan</span></div>
  </div>
  <div class="module-name">Asset Purchase — Choice of Alternatives</div>
  <button style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:5px;padding:6px 12px;color:white;font-size:12px;font-weight:600" onclick="window.location='capplan_v3.html'">← Model 1</button>
</div>

<div id="model-banner">Which asset option delivers the best return on investment?</div>
<div id="stepper">
  <div class="step active" id="step1"><div class="step-num" id="sn1">1</div><div class="step-label">Asset Details</div></div>
  <div class="step-sep">›</div>
  <div class="step" id="step2"><div class="step-num" id="sn2">2</div><div class="step-label">Economic Benefits</div></div>
  <div class="step-sep">›</div>
  <div class="step" id="step3"><div class="step-num" id="sn3">3</div><div class="step-label">Results</div></div>
</div>

<div id="main-content"></div>

<script>
// ── STATE ────────────────────────────────────────────────────────────────────
var S = {
  page: 1,
  numAlts: 2,
  activeAlt: 0,
  investType: "mutually_exclusive",
  capitalType: "adequate",
  res: null,
  show_table: [false, false],
  show_dcf: [false, false],
  missingFields: null,
  // Firm data (shared) — blank by default
  taxRate: "", coc: "",
  // Alternatives array — blank by default
  alts: [
    {cost:"",itcPct:"",life:"",salvage:"",method:"Double-declining",hyr:true,ddbRate:"",wc:"",annuity:true,annuityAmount:"",yearlyBenefits:[]},
    {cost:"",itcPct:"",life:"",salvage:"",method:"Double-declining",hyr:true,ddbRate:"",wc:"",annuity:true,annuityAmount:"",yearlyBenefits:[]}
  ]
};

function getAlt(i){ return S.alts[i]; }

function ensureAlts() {
  while (S.alts.length < S.numAlts) {
    S.alts.push({cost:"",itcPct:"",life:"",salvage:"",method:"Double-declining",
      hyr:true,ddbRate:"",wc:"",annuity:true,annuityAmount:"",yearlyBenefits:[]});
  }
}

// ── CALC ─────────────────────────────────────────────────────────────────────
function calcDepr(cost,itcPct,life,method,hyr,ddbRate){
  var base=cost-cost*itcPct/100, d=[];
  if(method==="Double-declining"){
    var rate=ddbRate/100;
    d.push(base*rate*(hyr?0.5:1));
    for(var y=2;y<=life;y++) d.push((base-d.reduce(function(s,v){return s+v},0))*rate);
  } else if(method==="Straight-line"){
    var y1=base/life*(hyr?0.5:1); d.push(y1);
    for(var y=2;y<=life;y++) d.push(hyr?(base-y1)/(life-1):base/life);
  } else {
    var y1=hyr?base/(life+1):2*base/(life+1); d.push(y1);
    if(hyr) for(var y=2;y<=life;y++) d.push(2*base*(life-y+1)/((life+1)*(life-1)));
    else     for(var y=2;y<=life;y++) d.push(base*(life-y+1)*2/(life*(life+1)));
  }
  return d;
}

function calcAsset(alt, taxRate, coc) {
  var tx=taxRate/100, r=coc/100, life=+alt.life||10;
  var itc=alt.cost*alt.itcPct/100;
  var ben=alt.annuity?Array(life).fill(+alt.annuityAmount||0):(alt.yearlyBenefits||[]);
  while(ben.length<life) ben.push(0);
  var depr=calcDepr(+alt.cost,+alt.itcPct,life,alt.method,alt.hyr,+alt.ddbRate);
  var rows=[];
  for(var i=0;i<life;i++){
    var yr=i+1,atBen=ben[i]*(1-tx),atShield=depr[i]*tx,
        itcYr=(yr===1?itc:0),totalAT=atBen+atShield+itcYr,
        pvAtBen=atBen/Math.pow(1+r,yr);
    rows.push({yr:yr,btBen:ben[i],atBen:atBen,btDepr:depr[i],atShield:atShield,
               itcYr:itcYr,totalAT:totalAT,pvAtBen:pvAtBen});
  }
  var pvOut=+alt.cost + +alt.wc;
  var pvBen=rows.reduce(function(s,row){return s+row.pvAtBen},0);
  var pvITC=itc/(1+r);
  var pvS1=depr.length>0?depr[0]*tx/(1+r):0;
  var pvS2=0; for(var i=1;i<rows.length;i++) pvS2+=rows[i].atShield/Math.pow(1+r,i+1);
  var pvSalv=alt.salvage/Math.pow(1+r,life);
  var pvLoss=-(alt.salvage*tx)/Math.pow(1+r,life);
  var pvWC=alt.wc/Math.pow(1+r,life);
  var pvIn=pvBen+pvITC+pvS1+pvS2+pvSalv+pvLoss+pvWC;
  var npv=pvIn-pvOut;
  var af=r>0?(1-Math.pow(1+r,-life))/r:life;
  var anpv=af>0?npv/af:0, bc=pvOut>0?pvIn/pvOut:0;

  function npvR(rate){
    var cfs=[-pvOut];
    for(var i=0;i<life;i++){
      var yr=i+1,cf=ben[i]*(1-tx)+depr[i]*tx;
      if(yr===1)cf+=itc; if(yr===life)cf+=alt.salvage*(1-tx)+(+alt.wc);
      cfs.push(cf);
    }
    return cfs.reduce(function(s,cf,i){return s+cf/Math.pow(1+rate,i)},0);
  }
  var irr=r; for(var i=0;i<200;i++){
    var f=npvR(irr),df=(npvR(irr+0.0001)-f)/0.0001;
    if(Math.abs(df)<1e-12)break;
    var nx=irr-f/df; if(Math.abs(nx-irr)<1e-8){irr=nx;break;}
    irr=nx; if(irr<-0.99||irr>100){irr=NaN;break;}
  }
  var payback=null,cum=-pvOut;
  for(var i=0;i<rows.length;i++){
    var prev=cum; cum+=rows[i].totalAT;
    if(cum>=0&&prev<0){payback=i+Math.abs(prev)/(Math.abs(prev)+cum);break;}
  }
  return{npv:npv,irr:irr,payback:payback,anpv:anpv,bc:bc,af:af,
         pvOut:pvOut,pvBen:pvBen,pvITC:pvITC,pvS1:pvS1,pvS2:pvS2,
         pvSalv:pvSalv,pvLoss:pvLoss,pvWC:pvWC,pvIn:pvIn,
         depr:depr,rows:rows,itc:itc,annAmt:alt.annuity?(+alt.annuityAmount):null};
}

function calcDecision(results) {
  var type=S.investType, cap=S.capitalType;
  var decisions=[];
  if(type==="independent"){
    results.forEach(function(r,i){
      decisions.push({i:i,accept:r.npv>0,reason:r.npv>0?"NPV > 0":"NPV ≤ 0",role:r.npv>0?"accept":"reject"});
    });
  } else {
    // mutually exclusive
    var anyPositive=results.some(function(r){return r.npv>0});
    if(!anyPositive){
      results.forEach(function(_,i){decisions.push({i:i,accept:false,reason:"All NPVs ≤ 0",role:"reject"})});
    } else if(cap==="adequate"){
      // largest NPV
      var best=-Infinity,bestIdx=-1;
      results.forEach(function(r,i){if(r.npv>0&&r.npv>best){best=r.npv;bestIdx=i}});
      results.forEach(function(r,i){
        decisions.push({i:i,accept:i===bestIdx,
          reason:i===bestIdx?"Largest NPV ("+fmtM(r.npv)+")":"Not selected — lower NPV",
          role:i===bestIdx?"select":"reject"});
      });
    } else {
      // capital rationing - largest B/C
      var best=-Infinity,bestIdx=-1;
      results.forEach(function(r,i){if(r.npv>0&&r.bc>best){best=r.bc;bestIdx=i}});
      results.forEach(function(r,i){
        decisions.push({i:i,accept:i===bestIdx,
          reason:i===bestIdx?"Largest B/C ratio ("+r.bc.toFixed(4)+")":"Not selected — lower B/C",
          role:i===bestIdx?"select":"reject"});
      });
    }
  }
  return decisions;
}

// ── CANVAS CHART ─────────────────────────────────────────────────────────────
function drawChart(canvasId,data,xLabel){
  var canvas=document.getElementById(canvasId);if(!canvas)return;
  var ctx=canvas.getContext("2d");
  var W=canvas.width,H=canvas.height,pad={top:8,bottom:44,left:52,right:8};
  var cw=W-pad.left-pad.right,ch=H-pad.top-pad.bottom;
  ctx.clearRect(0,0,W,H);
  var vals=data.map(function(d){return d.npv});
  var maxV=Math.max.apply(null,vals.map(Math.abs))||1,rng=maxV*1.2;
  var hasNeg=vals.some(function(v){return v<0}),zY=hasNeg?pad.top+ch/2:pad.top+ch;
  ctx.strokeStyle="#E2E6EC";ctx.lineWidth=1;
  for(var i=0;i<=4;i++){
    var y=pad.top+(ch/4)*i;
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cw,y);ctx.stroke();
    var v=hasNeg?(rng-rng*2*(i/4)):(rng*(1-i/4));
    ctx.fillStyle="#8A96A6";ctx.font="10px system-ui";ctx.textAlign="right";
    ctx.fillText(Math.round(v/1000)+"k",pad.left-3,y+3);
  }
  ctx.strokeStyle="#4A5568";ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(pad.left,zY);ctx.lineTo(pad.left+cw,zY);ctx.stroke();
  var bw=Math.floor(cw/data.length*.6),gap=cw/data.length;
  data.forEach(function(d,i){
    var x=pad.left+gap*i+(gap-bw)/2,bh=Math.abs(d.npv)/rng*(hasNeg?ch/2:ch),
        y=d.npv>=0?zY-bh:zY;
    ctx.fillStyle=d.npv>=0?"#2E7D52":"#C84B31";
    ctx.fillRect(x,y,bw,Math.max(bh,1));
    ctx.fillStyle="#8A96A6";ctx.font="10px system-ui";ctx.textAlign="center";
    ctx.fillText(d.label,x+bw/2,H-pad.bottom+12);
  });
  ctx.fillStyle="#4A5568";ctx.font="bold 12px system-ui";ctx.textAlign="center";
  ctx.fillText(xLabel,pad.left+cw/2,H-4);
}

function calcBreakEvenAlt(a){
  var cost=+a.cost,itcPct=+a.itcPct,life=+a.life||1,salvage=+a.salvageNew||+a.salvage||0;
  var tx=+S.taxRate/100,r=+S.coc/100,wc=+a.wc;
  var itc=cost*itcPct/100;
  var depr=calcDeprM2(a);
  var pvOut=cost+wc;
  var pvITC=itc/(1+r);
  var pvS1=depr.length>0?depr[0]*tx/(1+r):0;
  var pvS2=0;for(var i=1;i<depr.length;i++)pvS2+=depr[i]*tx/Math.pow(1+r,i+1);
  var pvSalv=salvage/Math.pow(1+r,life);
  var pvLoss=-(salvage*tx)/Math.pow(1+r,life);
  var pvWC=wc/Math.pow(1+r,life);
  var pvFixed=pvITC+pvS1+pvS2+pvSalv+pvLoss+pvWC;
  var af=r>0?(1-Math.pow(1+r,-life))/r:life;
  return(pvOut-pvFixed)/((1-tx)*af);
}

function calcDeprM2(a){
  var cost=+a.cost,itcPct=+a.itcPct,life=+a.life||1,ddbRate=+a.ddbRate;
  var method=a.method,hyr=a.hyr;
  var itc=cost*itcPct/100,base=cost-itc,d=[];
  if(method==="Double-declining"){
    var rate=ddbRate/100;d.push(base*rate*(hyr?0.5:1));
    for(var y=2;y<=life;y++)d.push((base-d.reduce(function(s,v){return s+v},0))*rate);
  }else if(method==="Straight-line"){
    var y1=base/life*(hyr?0.5:1);d.push(y1);
    for(var y=2;y<=life;y++)d.push(hyr?(base-y1)/(life-1):base/life);
  }else{
    var y1=hyr?base/(life+1):2*base/(life+1);d.push(y1);
    if(hyr)for(var y=2;y<=life;y++)d.push(2*base*(life-y+1)/((life+1)*(life-1)));
    else    for(var y=2;y<=life;y++)d.push(base*(life-y+1)*2/(life*(life+1)));
  }
  return d;
}

function validateInputs(){
  var errs=[];
  if(+S.taxRate<0||+S.taxRate>=100) errs.push("Tax rate must be between 0 and 100");
  if(+S.coc<=0) errs.push("Required return must be greater than zero");
  if(+S.coc>=100) errs.push("Required return cannot equal or exceed 100%");
  for(var i=0;i<S.numAlts;i++){
    var o=S.alts[i];
    if(+o.cost<=0) errs.push("Option "+(i+1)+" cost must be greater than zero");
    if(+o.life<=0) errs.push("Option "+(i+1)+" life must be greater than zero");
    if(o.salvage!==undefined&&+o.salvage<0) errs.push("Option "+(i+1)+" salvage cannot be negative");
    if(o.salvage!==undefined&&+o.salvage>=+o.cost) errs.push("Option "+(i+1)+" salvage cannot equal or exceed its cost");
  }
  return errs;
}
function runCalc(){
  var valErrs=validateInputs();if(valErrs.length>0){S.missing=valErrs;render();return;}
  try{
    var results=[];
    for(var i=0;i<S.numAlts;i++) results.push(calcAsset(S.alts[i],S.taxRate,S.coc));
    S.res=results; S.page=3; render();
  }catch(e){console.error(e);alert("Calculation error: "+e.message)}
}

  },50);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
// ── PRINT ─────────────────────────────────────────────────────────────────────
function printSummary(){
  var res=S.res;
  if(!res)return;

  var pd=S.show_dcf.slice(),pt=S.show_table.slice();
  S.show_dcf=S.show_dcf.map(function(){return true});
  S.show_table=S.show_table.map(function(){return true});
  renderPage3();

  setTimeout(function(){
    // Replace canvas elements with img tags directly in the DOM before cloning
    document.querySelectorAll('canvas').forEach(function(c){
      var img=document.createElement('img');
      img.src=c.toDataURL('image/png');
      img.style.cssText='width:100%;height:auto;display:block';
      c.parentNode.replaceChild(img,c);
    });

    var mainHTML=document.querySelector('main').innerHTML;

    // Restore state by re-rendering
    S.show_dcf=pd;S.show_table=pt;renderPage3();

    // Split into 4 sections: cards | charts | DCF summaries | year-by-year
    var sp0=mainHTML.indexOf('<div id="chart-block">');
    var sp1=mainHTML.indexOf('<div id="dcf-block">');
    var sp2=mainHTML.indexOf('<div id="year-block">');
    var section1=sp0>=0?mainHTML.substring(0,sp0):mainHTML;
    var section2=sp0>=0&&sp1>=0?mainHTML.substring(sp0,sp1):'';
    var section3=sp1>=0&&sp2>=0?mainHTML.substring(sp1,sp2):'';
    var section4=sp2>=0?mainHTML.substring(sp2):'';

    var css=document.querySelector('style').textContent;
    var hdr='<div style="background:var(--blue);padding:8px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">'
      +'<div style="font-family:Georgia,serif;font-size:17px;color:white">Cap<span style="color:#A8C5E8">Plan</span></div>'
      +'<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.85)">Asset Purchase — Choice of Alternatives</div>'
      +'<div style="font-size:11px;color:rgba(255,255,255,.6)">'+new Date().toLocaleDateString()+'</div>'
      +'</div>';

    var doc='<!DOCTYPE html><html><head><meta charset="UTF-8">'
      +'<title>CapPlan Model 2</title>'
      +'<style>'+css+'</style>'
      +'<style>'
      +'*{box-sizing:border-box}'
      +'html,body{margin:0;padding:0;background:white}'
      +'.pg{width:10.5in;min-height:7.5in;padding:0.35in;display:flex;flex-direction:column;overflow:visible}'
      +'aside,.print-btn,.btn-ghost,.btn-primary,.coll-arr{display:none!important}'
      +'.p3-grid,.page-grid{display:block!important}'
      +'.coll-body{display:block!important}'
      +'.banner,.metric,.chart-box,.alt-card{box-shadow:none!important;border:1px solid #ccc!important}'
      +'.collapsible{box-shadow:none!important;border:1px solid #ccc!important}'
      +'.charts-grid{grid-template-columns:1fr 1fr}'
      +'.results-grid{grid-template-columns:repeat('+Math.min(S.numAlts,3)+',1fr)!important}'
      +'#chart-block,#dcf-block,#year-block{break-before:auto!important}'
      +'table{width:100%;font-size:8.5px;table-layout:fixed;border-collapse:collapse}'
      +'th,td{padding:3px 4px;white-space:normal;word-break:break-word;border-bottom:1px solid #E2E6EC}'
      +'th{background:#F7F8FA;text-align:right;font-size:8px;font-weight:700;text-transform:uppercase}'
      +'th.left,td.left{text-align:left;font-family:inherit}'
      +'td.sub{text-align:left;font-size:9px;color:#8A96A6;font-family:inherit}'
      +'td.neg{color:#C84B31}'
      +'tr.total-row td{font-weight:700;background:#F7F8FA}'
      +'tr.npv-row td{font-size:12px;font-weight:800;border-top:2px solid #1B3F6E}'
      +'tr.npv-row.ok td{background:rgba(46,125,82,.09);color:#2E7D52}'
      +'tr.npv-row.bad td{background:rgba(200,75,49,.06);color:#C84B31}'
      +'tr:nth-child(even){background:#F7F8FA}'
      +'.overflow-x{overflow:visible}'
      +'thead{display:table-header-group}'
      +'@media print{'
      +'  .pg{page-break-after:always;break-after:page;width:100%;min-height:0;padding:0.3in}'
      +'  .pg:last-child{page-break-after:avoid!important;break-after:avoid!important}'
      +'}'
      +'@page{margin:0;size:landscape}'
      +'</style></head><body>'
      +'<div class="pg">'+hdr+'<div style="padding-top:10px;flex:1">'+section1+'</div></div>'
      +'<div class="pg">'+hdr+'<div style="padding-top:10px;flex:1">'+section2+'</div></div>'
      +'<div class="pg">'+hdr+'<div style="padding-top:10px;flex:1">'+section3+'</div></div>'
      +'<div class="pg">'+hdr+'<div style="padding-top:10px;flex:1">'+section4+'</div></div>'
      +'<script>setTimeout(function(){window.print();},500);<\/script>'
      +'</body></html>';

    var win=window.open('','_print','width=1100,height=800');
    win.document.write(doc);
    win.document.close();
  }, 300);
}

function render(){
  updateStepper();
  if(S.page===1)renderPage1();
  else if(S.page===2)renderPage2();
  else if(S.page===3&&S.res)renderPage3();
}


render();
</script>
</body>
</html>
