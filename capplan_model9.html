<title>CapPlan — Lease vs Purchase</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#F7F8FA;color:#0F1D2E;font-size:14px}

select{-webkit-appearance:none;appearance:none}
:root{--blue:#1B3F6E;--green:#2E7D52;--surface:#F7F8FA;--panel:#fff;--border:#E2E6EC;--t1:#0F1D2E;--t2:#4A5568;--t3:#8A96A6;--warn:#C84B31;--blue-soft:rgba(27,63,110,0.08);--green-soft:rgba(46,125,82,0.09);--amber:#F59E0B;--amber-soft:#FFFBEB;--amber-dark:#92400E;--amber-mid:#FEF3C7}

.step.active .step-num{background:var(--blue);color:white}.step.done .step-num{background:var(--green);color:white}

.chart-box{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:18px}

th.left{text-align:left}

td.sub{text-align:left;font-family:inherit;color:var(--t3);font-size:11px}
td.neg{color:var(--warn)}
tr.total-row td{font-weight:700;background:var(--surface)}
tr:nth-child(even){background:var(--surface)}
tr.highlight td{background:var(--blue-soft)!important;font-weight:700;color:var(--blue)}
tr.winner-row td{background:var(--green-soft)!important;font-weight:700;color:var(--green)}
.mode-toggle{display:flex;gap:0;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:18px}
.mode-btn{flex:1;padding:10px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .15s}
.mode-btn.active{background:var(--blue);color:white}
.mode-btn:not(.active){background:white;color:var(--t2)}
.modal-overlay{position:fixed;inset:0;background:rgba(15,29,46,.82);z-index:9999;display:flex;align-items:center;justify-content:center}
.modal-box{background:white;border-radius:10px;overflow:hidden;width:min(820px,95vw)}
.modal-head{padding:11px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.modal-close{font-size:22px;color:var(--t3);line-height:1;cursor:pointer}

  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  html,body{margin:0;padding:0;background:white}

  .decision-banner,.option-card,.metric,.chart-box,.collapsible,.helper-card{box-shadow:none!important;break-inside:avoid}

  tr{break-inside:avoid}

}

<body>
<div id="masthead">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 18 18" width="18" height="18" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,10 7,14 15,4"/></svg></div>
    <div class="logo-text">Cap<span>Plan</span></div>
  </div>
  <div class="module-name">Lease vs Purchase</div>
  <div style="position:relative">
    <button style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:5px;padding:6px 12px;color:white;font-size:12px;font-weight:600" id="cur-btn" onclick="toggleCur()"><span id="cur-label">$ USD</span> ▾</button>
    <div id="cur-dropdown" style="display:none;position:absolute;right:0;top:110%;background:white;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(15,29,46,.16);min-width:200px;z-index:300;overflow:hidden"></div>
  </div>
</div>
<div id="stepper">
  <div class="step active" id="step1"><div class="step-num" id="sn1">1</div><div class="step-label">Asset &amp; Lease Details</div></div>
  <div class="step-sep">›</div>
  <div class="step" id="step2"><div class="step-num" id="sn2">2</div><div class="step-label">Results</div></div>
</div>
<div id="main-content"></div>
<script>
var CURRENCIES=[
  {code:"USD",symbol:"$",label:"US Dollar"},{code:"EUR",symbol:"€",label:"Euro"},
  {code:"JPY",symbol:"¥",label:"Japanese Yen"},{code:"GBP",symbol:"£",label:"British Pound"},
  {code:"INR",symbol:"₹",label:"Indian Rupee"},{code:"CHF",symbol:"CHF",label:"Swiss Franc"},
  {code:"CAD",symbol:"CA$",label:"Canadian Dollar"},{code:"AUD",symbol:"AU$",label:"Australian Dollar"},
  {code:"NZD",symbol:"NZ$",label:"New Zealand Dollar"}
];
function getSym(){var c=CURRENCIES.find(function(c){return c.code===S.currency});return c?c.symbol:"$"}

var S={
  page:1,currency:"USD",cur_open:false,
  coc_open:false,coc_mode:"wacc",coc_kd:6,coc_ke:12,coc_wd:40,
  coc_rf:4.5,coc_beta:1.0,coc_mrp:5.5,
  res:null,show_purchase_dcf:false,show_lease_dcf:false,show_pmt_sens:false,
  missingFields:null,
  // inputs — blank by default
  price:"",itcPct:"",life:"",salvage:"",
  method:"Double-declining",hyr:true,ddbRate:"",
  term:"",deposit:true,depositAmt:"",freq:1,leasePmt:"",pmtLabel:"per year",
  taxRate:"",borrowRate:"",roi:""
};

function toggleCur(){
  S.cur_open=!S.cur_open;
  var dd=document.getElementById("cur-dropdown");
  dd.style.display=S.cur_open?"block":"none";
  if(S.cur_open){
    dd.innerHTML="";
    CURRENCIES.forEach(function(c){
      var b=document.createElement("button");
      b.style.cssText="display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;background:"+(c.code===S.currency?"var(--blue-soft)":"transparent")+";border:none;border-bottom:1px solid var(--border);cursor:pointer";
      b.innerHTML='<span style="font-family:monospace;font-size:13px;font-weight:700;color:var(--blue);width:36px">'+c.symbol+'</span><span>'+c.label+'</span>';
      b.onclick=function(){S.currency=c.code;S.cur_open=false;render()};
      dd.appendChild(b);
    });
  }
}

// ── CALC ──────────────────────────────────────────────────────────────────────
function calcDepr(price,itcPct,life,method,hyr,ddbRate){
  var base=price-price*itcPct/100,d=[];
  if(method==="Double-declining"){
    var rate=ddbRate/100;d.push(base*rate*(hyr?0.5:1));
    for(var y=2;y<=life;y++)d.push((base-d.reduce(function(s,v){return s+v},0))*rate);
  }else if(method==="Straight-line"){
    var y1=base/life*(hyr?0.5:1);d.push(y1);
    for(var y=2;y<=life;y++)d.push(hyr?(base-y1)/(life-1):base/life);
  }else{
    var y1=hyr?base/(life+1):2*base/(life+1);d.push(y1);
    if(hyr)for(var y=2;y<=life;y++)d.push(2*base*(life-y+1)/((life+1)*(life-1)));
    else    for(var y=2;y<=life;y++)d.push(base*(life-y+1)*2/(life*(life+1)));
  }
  return d;
}

function calcPVPurchase(price,itcPct,life,method,hyr,ddbRate,salvage,taxRate,atBorrow,roi){
  var tx=taxRate/100,r=atBorrow/100,r2=roi/100;
  var itc=price*itcPct/100;
  var depr=calcDepr(price,itcPct,life,method,hyr,ddbRate);
  var pvITC=itc/(1+r);
  var pvTS=depr.reduce(function(s,d,i){return s+d*tx/Math.pow(1+r,i+1)},0);
  var pvSalv=salvage/Math.pow(1+r2,life);
  var pvLoss=(ddbRate/100*tx)/(r+ddbRate/100)*salvage/Math.pow(1+r2,life);
  return price-pvITC-pvTS-pvSalv+pvLoss;
}

function calcPVLease(term,deposit,depositAmt,leasePmt,freq,taxRate,atBorrowPct){
  var tx=taxRate/100;
  var rAnn=atBorrowPct/100;  // annual AT rate
  var rp=Math.pow(1+rAnn,1/freq)-1;  // effective periodic rate
  var totalN=term*freq;
  var hasDep=deposit&&depositAmt>0;
  var n=hasDep?(totalN-1):totalN;  // number of periodic payments after deposit
  var pvDep=hasDep?depositAmt:0;
  // Tax shield on deposit: deductible in year 1 (annual basis)
  var pvDepTS=hasDep?-depositAmt*tx/(1+rAnn):0;
  var afPmt=rp>0&&n>0?(1-Math.pow(1+rp,-n))/rp:n;
  var pvPmt=leasePmt*afPmt;
  // Tax shield on payments: shift by one annual period
  var pvPmtTS=-leasePmt*tx*afPmt/(1+rAnn);
  return pvDep+pvDepTS+pvPmt+pvPmtTS;
}

function calcImpliedRate(price,depositAmt,leasePmt,freq,term,hasDep,salvage){
  // Solve for periodic rate rp such that:
  // deposit + pmt*AF(rp,n) + salvage/(1+annual_rate)^term = price
  // This is the lease implicit rate (includes residual value)
  // Returns annualised effective rate as percentage
  var totalN=term*freq;
  var n=hasDep?(totalN-1):totalN;
  var dep=hasDep?depositAmt:0;
  var salv=salvage||0;
  var lo=0.00001,hi=1.0/freq,mid;
  for(var i=0;i<100;i++){
    mid=(lo+hi)/2;
    var af=mid>0?(1-Math.pow(1+mid,-n))/mid:n;
    var annR=Math.pow(1+mid,freq)-1;
    var pvL=dep+leasePmt*af+(salv>0?salv/Math.pow(1+annR,term):0);
    if(pvL>price)lo=mid;else hi=mid;
  }
  return(Math.pow(1+mid,freq)-1)*100;
}

function calcBreakEvenPmt(pvPurchase,freq,term,deposit,depositAmt,taxRate,atBorrowPct){
  // Returns break-even payment PER PERIOD
  var tx=false?0:taxRate/100;
  var rAnn=atBorrowPct/100;
  var rp=Math.pow(1+rAnn,1/freq)-1;
  var totalN=term*freq;
  var hasDep=deposit&&depositAmt>0;
  var n=hasDep?(totalN-1):totalN;
  var pvDep=hasDep?depositAmt:0;
  var pvDepTS=hasDep?-depositAmt*tx/(1+rAnn):0;
  var af=rp>0&&n>0?(1-Math.pow(1+rp,-n))/rp:n;
  var denom=af-tx*af/(1+rAnn);
  return denom>0?(pvPurchase-pvDep-pvDepTS)/denom:0;
}

function calcAll(){
  var price=+S.price,itcPct=+S.itcPct,life=+S.life||1,salvage=+S.salvage;
  var ddbRate=+S.ddbRate,tx=+S.taxRate/100,borrow=+S.borrowRate;
  var roi=+S.roi,term=+S.term||life;
  var depAmt=S.deposit?(+S.depositAmt||0):0;
  var pmt=+S.leasePmt;
    var atBorrow=borrow*(1-tx);
  // Note: atBorrow is percentage for consumer (raw rate), business uses after-tax

  var atBorrowPct=borrow*(1-tx);
  var pvPurch=calcPVPurchase(price,itcPct,life,S.method,S.hyr,ddbRate,salvage,+S.taxRate,
                              atBorrowPct,roi);
  var pvLease=calcPVLease(term,S.deposit,depAmt,pmt,+S.freq,+S.taxRate,atBorrowPct);
  var diff=pvPurch-pvLease;
  var winner=diff<0?"purchase":"lease";

  // Implied lease interest rate
  var impliedRate=calcImpliedRate(price,depAmt,pmt,+S.freq,term,S.deposit&&depAmt>0,salvage);

  // Break-even lease payment
  var bePmt=calcBreakEvenPmt(pvPurch,+S.freq,term,S.deposit,depAmt,+S.taxRate,atBorrowPct);

  // Cost of constraint (if leasing despite purchase being cheaper)
  var costOfConstraint=winner==="purchase"?Math.abs(diff):0;
  var monthlyEquiv=0;

  // Payment sensitivity
  var pmtSens=[-0.40,-0.30,-0.20,-0.10,0,0.10,0.20,0.30,0.40].map(function(delta){
    var p2=pmt*(1+delta);
    var pvL2=calcPVLease(term,S.deposit,depAmt,p2,+S.freq,+S.taxRate,atBorrowPct);
    return{pmt:p2,pvLease:pvL2,diff:pvPurch-pvL2,winner:pvPurch<pvL2?"purchase":"lease"};
  });

  // CoC sensitivity (borrowing rate)
  var borrowSens=[-4,-3,-2,-1,0,1,2,3,4].map(function(delta){
    var b2=borrow+delta;if(b2<=0)return{label:b2+"%",diff:0};
    var atb2=(b2*(1-+S.taxRate/100));
    var pvP2=calcPVPurchase(price,itcPct,life,S.method,S.hyr,ddbRate,salvage,+S.taxRate,atb2,roi);
    var pvL2=calcPVLease(term,S.deposit,depAmt,pmt,+S.freq,+S.taxRate,atb2);
    return{label:b2+"%",pvP:pvP2,pvL:pvL2,diff:pvP2-pvL2};
  });

  // Depr schedule for DCF
  var depr=calcDepr(price,itcPct,life,S.method,S.hyr,ddbRate);

  return{pvPurch:pvPurch,pvLease:pvLease,diff:diff,winner:winner,
    impliedRate:impliedRate,bePmt:bePmt,costOfConstraint:costOfConstraint,
    monthlyEquiv:monthlyEquiv,pmtSens:pmtSens,borrowSens:borrowSens,
    depr:depr,price:price,itc:price*itcPct/100};
}

// ── VALIDATION ────────────────────────────────────────────────────────────────
function validateInputs(){
  var errs=[];
  if(+S.price<=0) errs.push("Asset price must be greater than zero");
  if(+S.life<=0) errs.push("Asset life must be greater than zero");
  if(S.salvage!==''&&+S.salvage<0) errs.push("Salvage value cannot be negative");
  if(S.salvage!==''&&+S.salvage>=+S.price) errs.push("Salvage cannot equal or exceed the asset price");
  if(+S.term<=0) errs.push("Lease term must be greater than zero");
  if(+S.term>+S.life) errs.push("Lease term cannot exceed asset life");
  if(S.deposit&&+S.depositAmt<0) errs.push("Deposit amount cannot be negative");
  if(+S.leasePmt<=0) errs.push("Lease payment must be greater than zero");
  if(S.method==="Double-declining"&&!(+S.ddbRate>0)) errs.push("Depreciation rate must be greater than zero for double-declining method");
  if(+S.taxRate<0||+S.taxRate>=100) errs.push("Tax rate must be between 0 and 100");
  if(+S.borrowRate<=0) errs.push("Borrowing rate must be greater than zero");
  if(+S.roi<=0) errs.push("Required return on investment must be greater than zero");
  return errs;
}

// ── CHART ─────────────────────────────────────────────────────────────────────
function drawChart(canvasId,data){
  var canvas=document.getElementById(canvasId);if(!canvas)return;
  var ctx=canvas.getContext("2d"),W=canvas.width,H=canvas.height;
  var pad={top:16,bottom:48,left:80,right:16};
  var cw=W-pad.left-pad.right,ch=H-pad.top-pad.bottom;
  ctx.clearRect(0,0,W,H);
  var vals=data.map(function(d){return d.diff});
  var minV=Math.min.apply(null,vals),maxV=Math.max.apply(null,vals);
  var rng=maxV-minV||Math.abs(maxV)*0.4;
  var lo=minV-rng*0.15,hi=maxV+rng*0.15;
  // Zero line
  var zeroY=(hi-lo)!==0?pad.top+ch*(hi/(hi-lo)):pad.top+ch*0.5;
  if(true){
    ctx.strokeStyle="#E2E6EC";ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(pad.left,zeroY);ctx.lineTo(pad.left+cw,zeroY);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle="#8A96A6";ctx.font="9px system-ui";ctx.textAlign="right";
    ctx.fillText("← lease cheaper",pad.left+cw-2,zeroY-4);
    ctx.fillText("purchase cheaper →",pad.left+cw-2,zeroY+12);
  }
  var bw=Math.floor(cw/data.length*0.6),gap=cw/data.length;
  var midIdx=Math.floor(data.length/2);
  data.forEach(function(d,i){
    var x=pad.left+gap*i+(gap-bw)/2;
    var bh=Math.abs(d.diff)/(hi-lo)*ch;
    var y=d.diff<0?zeroY:zeroY-bh;
    ctx.fillStyle=d.diff<0?"#3182CE":i===midIdx?"#1B3F6E":"#93B4D8";
    ctx.fillRect(x,y,bw,bh);
    ctx.fillStyle="#8A96A6";ctx.font=i===midIdx?"bold 10px system-ui":"10px system-ui";
    ctx.textAlign="center";ctx.fillText(d.label,x+bw/2,H-pad.bottom+13);
  });
  ctx.strokeStyle="#4A5568";ctx.lineWidth=1.5;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(pad.left,pad.top+ch);ctx.lineTo(pad.left+cw,pad.top+ch);ctx.stroke();
  ctx.fillStyle="#4A5568";ctx.font="bold 12px system-ui";ctx.textAlign="center";
  ctx.fillText("Borrowing Rate (%)",pad.left+cw/2,H-3);
}

  html+='<div style="display:flex;gap:10px"><button class="btn-ghost" onclick="loadExample()">Load Example</button><button class="btn-ghost" onclick="resetInputs()">Reset</button><button class="btn-primary" onclick="goToResults()">Calculate ›</button></div></div>';
  html+='</main></div></div>';
  document.getElementById("main-content").innerHTML=html;
  var freqSel=document.getElementById("freq-sel");
  if(freqSel)freqSel.value=String(S.freq);
  makeBNList(NOTES_BUSINESS,"bn-list1");
  renderCoC();
  document.getElementById("cur-label").textContent=getSym()+" "+S.currency;
}

// ── PAGE 2: Results ────────────────────────────────────────────────────────────
function renderPage2(){
  var res=S.res,sym=getSym();
  var purchaseWins=res.winner==="purchase";
  var isConstrained=false;

  var html='<div class="page"><div class="p2-grid"><aside>';
  html+='<div class="section-label">Understanding Results</div>';
  html+='<div class="panel" style="margin-bottom:14px"><div id="bn-list2"></div></div>';
  html+='<div style="display:flex;flex-direction:column;gap:10px"><button class="btn-ghost" onclick="S.page=1;render()">‹ Edit Inputs</button><button class="print-btn" onclick="printSummary()">🖶 Print Summary</button></div>';
  html+='</aside><main>';

  // Decision banner
  var bannerClass=isConstrained?"constraint":purchaseWins?"purchase":"lease";
  var bannerColor=isConstrained?"var(--warn)":purchaseWins?"var(--green)":"var(--blue)";
  html+='<div class="decision-banner '+bannerClass+'">';
  html+='<div>';
  if(isConstrained){
    html+='<div style="font-family:Georgia,serif;font-size:20px;color:var(--warn);line-height:1.3">Purchasing is cheaper, but you have chosen to lease.</div>';
    html+='<div style="font-size:13px;color:var(--t2);margin-top:8px;line-height:1.6">The cost of this decision is <strong>'+fmtM(res.costOfConstraint)+'</strong> in present value terms'+(res.monthlyEquiv>0?', equivalent to <strong>'+fmtM(res.monthlyEquiv)+'/month</strong> in extra payments.':'.')+'</div>';
  }else{
    html+='<div style="font-family:Georgia,serif;font-size:22px;color:'+bannerColor+';line-height:1.3"><strong>'+(purchaseWins?"Purchase":"Lease")+'</strong> is the lower-cost option.</div>';
    html+='<div style="font-size:13px;color:var(--t2);margin-top:8px;line-height:1.6">';
    var freqLabels={1:"annual",2:"semi-annual",4:"quarterly",12:"monthly"};
  var freqLbl=freqLabels[+S.freq]||"periodic";
  html+=(purchaseWins?"Purchasing saves ":"Leasing saves ")+fmtM(Math.abs(res.diff))+" in present value terms at "+fmt(+S.leasePmt)+" "+freqLbl+" lease payments.";
    html+='</div>';
  }
  html+='</div>';
  html+='<div style="background:'+bannerColor+';border-radius:10px;padding:14px 18px;text-align:center;flex-shrink:0">';
  html+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.75)">'+(isConstrained?"Extra Cost of Leasing":"PV Advantage")+'</div>';
  html+='<div style="font-family:monospace;font-size:24px;font-weight:800;color:white;margin-top:4px">'+fmtM(Math.abs(res.diff))+'</div>';
  html+='</div></div>';

  // Orientation strip
  html+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 18px;margin-bottom:18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">';
  html+='<span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);flex-shrink:0">This page also provides:</span>';
  html+='<div style="display:flex;gap:8px;flex-wrap:wrap">';
  html+='<span style="font-size:12px;color:var(--t2);background:white;border:1px solid var(--border);border-radius:5px;padding:3px 10px">💰 Implied lease interest rate</span>';
  html+='<span style="font-size:12px;color:var(--t2);background:white;border:1px solid var(--border);border-radius:5px;padding:3px 10px">⚖️ Break-even lease payment</span>';
  html+='<span style="font-size:12px;color:var(--t2);background:white;border:1px solid var(--border);border-radius:5px;padding:3px 10px">📊 Sensitivity to lease payment</span>';
  html+='</div></div>';

  // Comparison cards
  html+='<div class="comparison-grid">';
  var pWin=purchaseWins;
  html+='<div class="option-card '+(pWin?"winner":("loser"))+'">';
  html+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:'+(pWin?"var(--green)":"var(--t3)")+';margin-bottom:10px">Purchase Option '+(pWin?"✓ Lower Cost":"")+'</div>';
  html+='<div style="font-family:monospace;font-size:26px;font-weight:800;color:'+(pWin?"var(--green)":"var(--t1)")+'">'+fmtM(res.pvPurch)+'</div>';
  html+='<div style="font-size:11px;color:var(--t3);margin-top:4px">PV of all outflows</div>';
  html+='<div style="font-size:12px;color:var(--t2);margin-top:10px;line-height:1.5">Asset cost less tax shields'+(",")+' salvage value'+(false?".":', and ITC.')+' </div>';
  html+='</div>';
  html+='<div class="option-card '+(!pWin?"winner":"loser")+(isConstrained?" consumer-loser":"")+'">';
  html+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:'+(!pWin?"var(--blue)":"var(--t3)")+';margin-bottom:10px">Lease Option '+(!pWin?"✓ Lower Cost":"")+(isConstrained?" ⚠ Higher Cost — Chosen":"")+'</div>';
  html+='<div style="font-family:monospace;font-size:26px;font-weight:800;color:'+(!pWin?"var(--blue)":isConstrained?"var(--warn)":"var(--t1)")+'">'+fmtM(res.pvLease)+'</div>';
  html+='<div style="font-size:11px;color:var(--t3);margin-top:4px">PV of all outflows</div>';
  html+='<div style="font-size:12px;color:var(--t2);margin-top:10px;line-height:1.5">Deposit and lease payments less'+(" tax shields on") +' payments.</div>';
  html+='</div></div>';

  // Metrics
  html+='<div class="metrics">';
  html+='<div class="metric"><div class="metric-label">Implied Lease Interest Rate</div><div class="metric-val '+(res.impliedRate>+S.borrowRate?"warn":"ok")+'">'+fmt(res.impliedRate,2)+'%</div><div class="metric-sub">'+(res.impliedRate>+S.borrowRate?"Higher than your borrowing rate of "+S.borrowRate+"%":"Lower than your borrowing rate of "+S.borrowRate+"%")+'</div></div>';
  html+='<div class="metric"><div class="metric-label">Break-Even Lease Payment</div><div class="metric-val">'+fmtM(res.bePmt)+'</div><div class="metric-sub">Leasing is cheaper below this figure'+(('. Current payment of '+fmtM(+S.leasePmt)+' is '+(+S.leasePmt>res.bePmt?'above — purchase is cheaper.':'below — lease is cheaper.')+''))+'</div></div>';
  if(false&&purchaseWins){
    html+='<div class="metric"><div class="metric-label">Monthly Cost of Leasing</div><div class="metric-val warn">'+fmtM(res.monthlyEquiv)+'</div><div class="metric-sub">Extra per month by leasing over '+S.term+' years</div></div>';
  }else{
    html+='<div class="metric"><div class="metric-label">PV Advantage</div><div class="metric-val ok">'+fmtM(Math.abs(res.diff))+'</div><div class="metric-sub">'+(purchaseWins?"Purchase":"Lease")+' saves this amount in PV terms</div></div>';
  }
  html+='</div>';

  // Borrowing rate sensitivity chart
  html+='<div class="chart-box"><div class="chart-title">Difference in PV of Outflows (Purchase − Lease) by Borrowing Rate</div>';
  html+='<div style="font-size:11px;color:var(--t3);margin-bottom:10px">Bars below zero = purchase is cheaper · Bars above zero = lease is cheaper</div>';
  html+='<canvas id="sens-chart" width="700" height="240" style="width:100%;height:auto;display:block"></canvas></div>';

  // Payment sensitivity table
  html+='<div class="collapsible"><div class="coll-head" onclick="S.show_pmt_sens=!S.show_pmt_sens;renderPage2()"><span class="coll-title">Sensitivity to Lease Payment Amount</span><span class="coll-arr" style="transform:'+(S.show_pmt_sens?'rotate(90deg)':'rotate(0deg)')+'" >›</span></div>';
  if(S.show_pmt_sens){
    html+='<div class="coll-body open" style="padding:4px 0"><div style="padding:10px 18px 6px;font-size:12px;color:var(--t2);line-height:1.6">How the decision changes as the lease payment varies. The break-even payment is '+fmtM(res.bePmt)+' — payments below this level make leasing cheaper.</div>';
    html+='<table><thead><tr><th class="left">Annual Lease Payment</th><th>PV Purchase</th><th>PV Lease</th><th>Difference (P−L)</th><th>Decision</th></tr></thead><tbody>';
    res.pmtSens.forEach(function(row){
      var isCurrent=Math.abs(row.pmt-+S.leasePmt)<1;
      var isWinner=row.diff<0;
      html+='<tr'+(isCurrent?' class="highlight"':isWinner?' class="winner-row"':'')+'>';
      html+='<td class="left">'+(isCurrent?'★ ':'')+fmtM(row.pmt)+'</td>';
      html+='<td>'+fmtM(res.pvPurch)+'</td>';
      html+='<td>'+fmtM(row.pvLease)+'</td>';
      html+='<td style="color:'+(row.diff<0?"var(--blue)":"var(--warn)")+'">'+fmtM(row.diff)+'</td>';
      html+='<td class="left" style="font-weight:700;color:'+(row.diff<0?"var(--green)":"var(--t2)")+'">'+row.winner.charAt(0).toUpperCase()+row.winner.slice(1)+'</td>';
      html+='</tr>';
    });
    html+='</tbody></table></div></div>';
  }
  html+='</div>';

  // DCF summaries
{
    html+='<div class="collapsible"><div class="coll-head" onclick="S.show_purchase_dcf=!S.show_purchase_dcf;renderPage2()"><span class="coll-title">Purchase Option — DCF Detail</span><span class="coll-arr" style="transform:'+(S.show_purchase_dcf?'rotate(90deg)':'rotate(0deg)')+'" >›</span></div>';
    if(S.show_purchase_dcf){
      var atb=+S.borrowRate*(1-+S.taxRate/100)/100,r2=+S.roi/100;
      var itc=+S.price*+S.itcPct/100;
      var pvITC=-itc/(1+atb);
      var pvTS=-res.depr.reduce(function(s,d,i){return s+d*(+S.taxRate/100)/Math.pow(1+atb,i+1)},0);
      var pvSalv=-+S.salvage/Math.pow(1+r2,+S.life);
      var pvLoss=+S.salvage*(+S.taxRate/100)/Math.pow(1+r2,+S.life)*(+S.ddbRate/100*(+S.taxRate/100))/(atb+(+S.ddbRate/100));
      html+='<div class="coll-body open"><table><tbody>';
      [["Cost of Asset","Year 0",+S.price,false],
       ["Less: Investment Tax Credit","Year 1",pvITC,true],
       ["Less: Tax Shields on Depreciation","Years 1–"+S.life,pvTS,true],
       ["Less: Salvage Value","Year "+S.life,pvSalv,true],
       ["Plus: Loss of Tax Shield on Salvage","Year "+S.life,pvLoss,false]
      ].forEach(function(r){
        html+='<tr><td class="left">'+r[0]+'</td><td class="sub">'+r[1]+'</td><td class="'+(r[2]<0?"neg":"")+'">'+fmtM(r[2])+'</td></tr>';
      });
      html+='<tr class="total-row"><td class="left" colspan="2">PV of Purchase Outflows</td><td>'+fmtM(res.pvPurch)+'</td></tr>';
      html+='</tbody></table></div>';
    }
    html+='</div>';
    html+='<div class="collapsible"><div class="coll-head" onclick="S.show_lease_dcf=!S.show_lease_dcf;renderPage2()"><span class="coll-title">Lease Option — DCF Detail</span><span class="coll-arr" style="transform:'+(S.show_lease_dcf?'rotate(90deg)':'rotate(0deg)')+'" >›</span></div>';
    if(S.show_lease_dcf){
      var atb2=+S.borrowRate*(1-+S.taxRate/100)/100;
      var dep2=S.deposit?(+S.depositAmt||0):0;
      var pvDepTS2=S.deposit?-dep2*(+S.taxRate/100)/(1+atb2):0;
      var n2=S.deposit?(+S.term-1):(+S.term);
      var af2=n2>0?(1-Math.pow(1+atb2,-n2))/atb2:0;
      var pvPmts2=+S.leasePmt*af2;
      var pvPmtTS2=-+S.leasePmt*(+S.taxRate/100)*af2/(1+atb2);
      html+='<div class="coll-body open"><table><tbody>';
      var totN2=+S.term*+S.freq;var nP2=S.deposit?totN2-1:totN2;
      var rows2=[["Initial Deposit","Year 0",dep2,false],["Less: Tax Shield on Deposit","Year 1",pvDepTS2,true],
        ["Lease Payments ("+nP2+" pmts of "+fmtM(+S.leasePmt)+")","Periods 1–"+nP2,pvPmts2,false],
        ["Less: Tax Shields on Payments","Annual",pvPmtTS2,true]];
      rows2.forEach(function(r){if(!S.deposit&&(r[0].includes("Deposit")))return;html+='<tr><td class="left">'+r[0]+'</td><td class="sub">'+r[1]+'</td><td class="'+(r[2]<0?"neg":"")+'">'+fmtM(r[2])+'</td></tr>';});
      html+='<tr class="total-row"><td class="left" colspan="2">PV of Lease Outflows</td><td>'+fmtM(res.pvLease)+'</td></tr>';
      html+='</tbody></table></div>';
    }
    html+='</div>';
  }
  html+='</main></div></div>';

  document.getElementById("main-content").innerHTML=html;
  makeBNList(NOTES_BUSINESS,"bn-list2");
  setTimeout(function(){drawChart("sens-chart",res.borrowSens)},50);
  document.getElementById("cur-label").textContent=getSym()+" "+S.currency;
}

// ── PRINT ─────────────────────────────────────────────────────────────────────
function printSummary(){
  var res=S.res;if(!res)return;
  var pd1=S.show_purchase_dcf,pd2=S.show_lease_dcf,pd3=S.show_pmt_sens;
  S.show_purchase_dcf=true;S.show_lease_dcf=true;S.show_pmt_sens=true;
  renderPage2();
  setTimeout(function(){
    document.querySelectorAll('canvas').forEach(function(c){
      var img=document.createElement('img');img.src=c.toDataURL('image/png');
      img.style.cssText='width:100%;height:auto;display:block';c.parentNode.replaceChild(img,c);
    });
    window.print();
    S.show_purchase_dcf=pd1;S.show_lease_dcf=pd2;S.show_pmt_sens=pd3;
    renderPage2();
  },300);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  updateStepper();
  if(S.page===1)renderPage1();
  else if(S.page===2&&S.res)renderPage2();
  var cl=document.getElementById("cur-label");
  if(cl)cl.textContent=getSym()+" "+S.currency;
}
render();
</script>
</body>
</html>
