<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  background: var(--blue);
  color: white;
  text-align: center;
  padding: 10px 28px;

<body>
<div id="masthead">
  <div class="logo"><div class="logo-mark"><svg viewBox="0 0 18 18" width="14" height="14" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,10 7,14 15,4"/></svg></div><div class="logo-text">Cap<span>Plan</span></div><div class="logo-sub">Personal</div></div>
  <div class="module-name">Should I Buy This?</div>
  <div style="position:relative"><button style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:5px;padding:6px 12px;color:white;font-size:12px;font-weight:600" id="cur-btn" onclick="toggleCur()"><span id="cur-label">$ USD</span> ▾</button><div id="cur-dropdown" style="display:none;position:absolute;right:0;top:110%;background:white;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(15,29,46,.16);min-width:200px;z-index:300;overflow:hidden"></div></div>
</div>
<div id="model-banner">Does this purchase make financial sense at your target return?</div>
<div id="stepper">
  <div class="step active" id="step1"><div class="step-num" id="sn1">1</div><div class="step-label">What you expect</div></div>
  <div class="step-sep">›</div>
  <div class="step" id="step2"><div class="step-num" id="sn2">2</div><div class="step-label">Results</div></div>
</div>
<div id="main-content"></div>
<script>
var CURRENCIES=[{code:"USD",symbol:"$",label:"US Dollar"},{code:"EUR",symbol:"€",label:"Euro"},{code:"GBP",symbol:"£",label:"British Pound"},{code:"CAD",symbol:"CA$",label:"Canadian Dollar"},{code:"AUD",symbol:"AU$",label:"Australian Dollar"},{code:"NZD",symbol:"NZ$",label:"New Zealand Dollar"},{code:"JPY",symbol:"¥",label:"Japanese Yen"}];
function getSym(){var c=CURRENCIES.find(function(c){return c.code===S.currency});return c?c.symbol:"$"}
function toggleCur(){S.cur_open=!S.cur_open;var dd=document.getElementById("cur-dropdown");dd.style.display=S.cur_open?"block":"none";if(S.cur_open){dd.innerHTML="";CURRENCIES.forEach(function(c){var b=document.createElement("button");b.style.cssText="display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;background:"+(c.code===S.currency?"var(--green-soft)":"transparent")+";border:none;border-bottom:1px solid var(--border);cursor:pointer";b.innerHTML='<span style="font-family:monospace;font-size:13px;font-weight:700;color:var(--green);width:36px">'+c.symbol+'</span><span>'+c.label+'</span>';b.onclick=function(){S.currency=c.code;S.cur_open=false;render()};dd.appendChild(b);});}}

// ── ASSET TYPES ───────────────────────────────────────────────────────────────
var ASSET_TYPES=[
  {id:"vehicle",    icon:"🚗", label:"Vehicle",        wizard:"What do you currently spend on transport alternatives?",    wunit:"year",hint:"Car rental, transit passes, rideshare — annual total"},
  {id:"recreation", icon:"⛵", label:"Recreation",      wizard:"What do you currently spend on renting or hiring this type of asset?", wunit:"year",hint:"Boat charters, equipment rentals, club memberships"},
  {id:"home",       icon:"🏠", label:"Home & Appliance",wizard:"What will this save you each year in energy or service costs?",wunit:"year",hint:"Electricity savings, service contract costs, etc."},
  {id:"tools",      icon:"🔧", label:"Tools & Equipment",wizard:"What does this replace or save you each year?",              wunit:"year",hint:"Tool rental, contractor costs avoided"},
  {id:"electronics",icon:"💻", label:"Electronics",     wizard:"What is the annual value of what this replaces or enables?", wunit:"year",hint:"Software subscriptions replaced, services avoided"},
  {id:"other",      icon:"📦", label:"Other",           wizard:"What is the annual value you expect to receive?",            wunit:"year",hint:"Money saved, services replaced, or estimated value of use"}
];

var S={page:1,currency:"USD",cur_open:false,res:null,missingFields:null,
  assetType:"",show_sensitivity:false,show_wwit:false,
  bw_open:false,bw_spend:"",bw_pct:"",
  price:"",life:"",salvage:"",benefits:"",coc:""};

// ── CALC ──────────────────────────────────────────────────────────────────────
function calcNPV(price,life,salvage,benefits,coc){
  var r=coc/100;
  var pvBen=benefits*((1-Math.pow(1+r,-life))/r);
  var pvSalv=salvage/Math.pow(1+r,life);
  return -price+pvBen+pvSalv;
}
function calcWWIT(price,life,salvage,coc){
  // Min annual benefit needed for NPV=0
  var r=coc/100;var af=(1-Math.pow(1+r,-life))/r;
  var pvSalv=salvage/Math.pow(1+r,life);
  return af>0?(price-pvSalv)/af:0;
}
function calcAll(){
  var price=+S.price,life=+S.life||1,salvage=+S.salvage||0,ben=+S.benefits||0,coc=+S.coc||0;
  var npv=calcNPV(price,life,salvage,ben,coc);
  var wwit=calcWWIT(price,life,salvage,coc);
  // Robustness: how far are we from break-even relative to price?
  var robustness=Math.min(100,Math.abs(npv)/price*100);
  var robustnessLabel=robustness<5?"Very close call":robustness<15?"Marginal":robustness<30?"Moderate":robustness<50?"Clear":"Very clear";
  // Sensitivity: benefit levels at ±40%
  var benSens=[-0.40,-0.30,-0.20,-0.10,0,0.10,0.20,0.30,0.40].map(function(delta){
    var b2=ben*(1+delta);return{benefits:b2,npv:calcNPV(price,life,salvage,b2,coc),delta:delta*100};
  });
  // CoC sensitivity
  var cocSens=[-3,-2,-1,0,1,2,3].map(function(delta){
    var c2=coc+delta;if(c2<=0)return{coc:c2,npv:0};
    return{coc:c2,npv:calcNPV(price,life,salvage,ben,c2)};
  });
  return{npv:npv,wwit:wwit,pvBen:ben*((1-Math.pow(1+coc/100,-life))/(coc/100)),
    pvSalv:salvage/Math.pow(1+coc/100,life),robustness:robustness,robustnessLabel:robustnessLabel,
    benSens:benSens,cocSens:cocSens};
}

function fmt(n,d){if(n==null||isNaN(n))return"--";d=d||0;return n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d})}
function fmtM(n){if(n==null||isNaN(n))return"--";var s=getSym();return n<0?"-"+s+fmt(Math.abs(n)):s+fmt(n)}
function updateStepper(){for(var i=1;i<=2;i++){var step=document.getElementById("step"+i),sn=document.getElementById("sn"+i);step.className="step";if(i<S.page){step.classList.add("done");sn.textContent="✓"}else if(i===S.page){step.classList.add("active");sn.textContent=String(i)}else sn.textContent=String(i);var n=i;(function(n,step){step.onclick=function(){if(n<S.page||(n===2&&S.res)){S.page=n;render()}}})(n,step);step.style.cursor=(i<S.page||(i===2&&S.res))?"pointer":"default";}}

var NOTES=[
  {q:"What does this model tell me?",a:"It works out whether buying the asset is worth the money — whether what you get from owning it, plus what you can sell it for later, is worth more than what you pay today. If it is, the purchase earns at least your target return."},
  {q:"How do I estimate annual value?",a:"Think about what owning this asset does for you financially each year. For a car: money saved on alternatives. For solar panels: reduced electricity bills. For a tool: contractor costs avoided. Use the estimator to build the number step by step. Be realistic — overestimating value leads to overpaying."},
  {q:"What resale value should I use?",a:"Your estimate of what the asset will sell for at the end of your ownership period. For cars, depreciation guides (like Kelley Blue Book) give good estimates. For appliances, 5-15% of purchase price after useful life is typical. Enter 0 if you do not expect to recover anything."},
  {q:"What target return should I use?",a:"The return you could earn by investing the money elsewhere — a benchmark for what your money should earn. Five to eight percent is a reasonable range for most people, roughly matching long-term investment returns. If you borrowed to buy, use your loan rate."},
];
var NOTES2=[
  {q:"What does a positive result mean?",a:"A positive result means the purchase is expected to earn at least your target return. The asset pays for itself — the value you receive plus the resale proceeds, in today's money, exceeds what you pay."},
  {q:"What is decision robustness?",a:"Robustness measures how far the result is from the break-even point relative to the purchase price. A close call means small changes in your assumptions could flip the decision. A clear result means the purchase is justified (or not) even if your estimates are somewhat off."},
  {q:"How do I use the sensitivity table?",a:"The sensitivity table shows how the NPV changes if your annual value estimate turns out to be higher or lower than expected. Look at the -20% and -30% rows — if the purchase is still justified there, your decision is robust to some optimism in your estimates."},
  {q:"What does What Would It Take tell me?",a:"If the purchase is not currently justified, this tells you the annual value needed to make it worthwhile. Ask yourself whether that level of value is realistic for this asset. If not, the purchase price is too high for what you will get from it."}

function makeBNList(notes,id){var list=document.getElementById(id);if(!list)return;list.innerHTML="";notes.forEach(function(n,i){var item=document.createElement("div");item.className="bn-item";var head=document.createElement("div");head.className="bn-head";head.innerHTML='<div class="bn-qmark">?</div><div class="bn-q">'+n.q+'</div><div class="bn-arr" id="arr'+id+i+'">›</div>';var body=document.createElement("div");body.className="bn-body";body.textContent=n.a;head.onclick=function(){var open=body.classList.contains("open");body.classList.toggle("open");document.getElementById("arr"+id+i).style.transform=open?"rotate(0deg)":"rotate(90deg)";head.style.background=open?"":"var(--surface)";};item.appendChild(head);item.appendChild(body);list.appendChild(item);});}

function validateInputs(){
  var errs=[];
  if(+S.price<=0) errs.push("Purchase price must be greater than zero");
  if(S.life===''||+S.life<=0) errs.push("Ownership period must be greater than zero");
  if(S.salvage!==''&&+S.salvage<0) errs.push("Resale value cannot be negative");
  if(S.salvage!==''&&S.price!==''&&+S.salvage>=+S.price) errs.push("Resale value cannot equal or exceed the purchase price");
  if(S.benefits!==''&&+S.benefits<0) errs.push("Annual value cannot be negative");
  if(+S.coc<=0) errs.push("Target return must be greater than zero");
  return errs;
}
function goToResults(){
  var missing=[];
  if(!S.price)missing.push("Purchase price");if(!S.life)missing.push("How long you will keep it");
  if(!S.salvage&&S.salvage!==0)missing.push("Expected resale value");
  if(!S.benefits&&S.benefits!==0)missing.push("Annual value you expect");if(!S.coc)missing.push("Target return");
  if(missing.length>0){S.missingFields=missing;render();return;}
  S.missingFields=null;
  var valErrs=validateInputs();if(valErrs.length>0){S.missingFields=valErrs;render();return;}
  try{S.res=calcAll();S.page=2;render();}catch(e){alert("Error: "+e.message)}
}

function drawChart(canvasId,data,current){
  var canvas=document.getElementById(canvasId);if(!canvas)return;
  var ctx=canvas.getContext("2d"),W=canvas.width,H=canvas.height;
  var pad={top:16,bottom:48,left:80,right:16};var cw=W-pad.left-pad.right,ch=H-pad.top-pad.bottom;
  ctx.clearRect(0,0,W,H);
  var vals=data.map(function(d){return d.npv});var minV=Math.min.apply(null,vals),maxV=Math.max.apply(null,vals);
  var rng=maxV-minV||Math.abs(maxV||1)*0.4;var lo=minV-rng*0.15,hi=maxV+rng*0.15;
  var zeroY=(hi-lo)!==0?pad.top+ch*(hi/(hi-lo)):pad.top+ch*0.5;
  ctx.strokeStyle="#D8E8DC";ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(pad.left,zeroY);ctx.lineTo(pad.left+cw,zeroY);ctx.stroke();ctx.setLineDash([]);
  ctx.strokeStyle="#D8E8DC";ctx.lineWidth=1;
  for(var i=0;i<=4;i++){var y=pad.top+ch*(1-i/4);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cw,y);ctx.stroke();var v=lo+(hi-lo)*(i/4);ctx.fillStyle="#8A96A6";ctx.font="10px system-ui";ctx.textAlign="right";ctx.fillText((v>=0?getSym():"-"+getSym())+fmt(Math.abs(v)/1000,1)+"k",pad.left-3,y+3);}
  var bw=Math.floor(cw/data.length*0.6),gap=cw/data.length;
  data.forEach(function(d,i){var x=pad.left+gap*i+(gap-bw)/2,bh=Math.abs(d.npv)/(hi-lo)*ch,y=d.npv>=0?zeroY-bh:zeroY;var isCur=Math.abs(d.delta)<0.001;ctx.fillStyle=d.npv>=0?(isCur?"#2E7D52":"#6DBF8A"):"#E88A8A";ctx.fillRect(x,y,bw,bh);ctx.fillStyle=isCur?"var(--green)":"#8A96A6";ctx.font=isCur?"bold 10px system-ui":"10px system-ui";ctx.textAlign="center";ctx.fillText((d.delta>0?"+":"")+fmt(d.delta,0)+"%",x+bw/2,H-pad.bottom+13);});
  ctx.strokeStyle="#4A5568";ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(pad.left,pad.top+ch);ctx.lineTo(pad.left+cw,pad.top+ch);ctx.stroke();ctx.fillStyle="#4A5568";ctx.font="bold 11px system-ui";ctx.textAlign="center";ctx.fillText("Change in annual value estimate — green = purchase justified",pad.left+cw/2,H-3);
}

function initChartTooltip(canvasId,data,labelFn){
  setTimeout(function(){
    var canvas=document.getElementById(canvasId);if(!canvas)return;
    var par=canvas.parentNode;par.style.position='relative';
    var old=par.querySelector('.ctip');if(old)old.remove();
    var tip=document.createElement('div');tip.className='ctip';
    tip.style.cssText='position:absolute;pointer-events:none;background:rgba(15,29,46,.88);color:white;font-size:11px;font-weight:600;padding:5px 10px;border-radius:5px;white-space:nowrap;display:none;z-index:99;transform:translateX(-50%);top:6px';
    par.appendChild(tip);
    canvas.style.cursor='crosshair';
    canvas.onmousemove=function(e){
      var r=canvas.getBoundingClientRect();
      var scaleX=canvas.width/r.width;
      var mx=(e.clientX-r.left)*scaleX;
      var W=canvas.width,padL=80,cw=W-96;
      var n=data.length,gap=cw/n,bw=Math.floor(gap*0.6);
      var hit=null,hitPct=0;
      for(var i=0;i<n;i++){
        var bx=padL+gap*i+(gap-bw)/2;
        if(mx>=bx&&mx<=bx+bw){hit=data[i];hitPct=((bx+bw/2)/W*100);break;}
      }
      if(hit){tip.textContent=labelFn(hit);tip.style.left=hitPct.toFixed(1)+'%';tip.style.display='block';}
      else tip.style.display='none';
    };
    canvas.onmouseleave=function(){tip.style.display='none';};
  },90);
}

function render(){updateStepper();if(S.page===1)renderPage1();else if(S.page===2&&S.res)renderPage2();var cl=document.getElementById("cur-label");if(cl)cl.textContent=getSym()+" "+S.currency;}
render();
</script></body></html>
