<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapPlan Business (US) — Implied Cost of Leasing</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#F7F8FA;color:#0F1D2E;font-size:14px}
input,select,button{font-family:inherit;font-size:14px}
button{cursor:pointer;background:none;border:none}
select{-webkit-appearance:none;appearance:none}
:root{--blue:#1B3F6E;--green:#2E7D52;--surface:#F7F8FA;--panel:#fff;--border:#E2E6EC;--t1:#0F1D2E;--t2:#4A5568;--t3:#8A96A6;--warn:#C84B31;--blue-soft:rgba(27,63,110,0.08);--green-soft:rgba(46,125,82,0.09);--amber:#F59E0B;--amber-soft:#FFFBEB;--amber-dark:#92400E;--amber-mid:#FEF3C7}
#masthead{background:var(--blue);height:72px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:34px;height:34px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center}
.logo-text{font-family:Georgia,serif;font-size:22px;color:white}.logo-text span{color:#A8C5E8}
.module-name{font-size:13px;font-weight:700;color:rgba(255,255,255,0.85)}
#stepper{background:white;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px}
.step{display:flex;align-items:center;gap:8px;padding:13px 4px;border-bottom:2px solid transparent}
.step.active{border-bottom-color:var(--blue)}.step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--border);color:var(--t3)}
.step.active .step-num{background:var(--blue);color:white}.step.done .step-num{background:var(--green);color:white}
.step-label{font-size:13px;font-weight:500;color:var(--t3)}.step.active .step-label{color:var(--blue)}.step.done .step-label{color:var(--green)}
.step-sep{color:var(--border);margin:0 8px;font-size:16px}
.page{max-width:1100px;margin:0 auto;padding:24px 22px}
.page-grid{display:grid;grid-template-columns:310px 1fr;gap:22px}
.p2-grid{display:grid;grid-template-columns:280px 1fr;gap:22px}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;margin-bottom:18px}
.panel-head{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.panel-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0}
.panel-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t2)}
.field-grid{display:grid;grid-template-columns:1fr 1fr}
.field{padding:13px 18px;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.field.full{grid-column:1/-1;border-right:none}.field.last{border-bottom:none}
.field-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:6px}
.field-note{font-size:10px;color:var(--t3);margin-top:4px}
.ui{display:flex;align-items:center;gap:6px}
.ui .pfx,.ui .sfx{font-family:monospace;font-size:12px;color:var(--t3);flex-shrink:0}
.ui input{font-family:monospace;font-size:15px;font-weight:600;color:var(--t1);border:none;border-bottom:2px solid var(--border);background:transparent;width:100%;padding:2px 0;outline:none}
.ui input:focus{border-bottom-color:var(--blue)}
.ui select{font-family:monospace;font-size:14px;font-weight:600;color:var(--t1);border:none;border-bottom:2px solid var(--border);background:transparent;width:100%;padding:2px 0;outline:none;cursor:pointer}
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.pill{display:flex;align-items:center;gap:6px;padding:6px 13px;border:1.5px solid var(--border);border-radius:20px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;user-select:none}
.pill.active{border-color:var(--blue);background:var(--blue-soft);color:var(--blue)}
.pill-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--t3);flex-shrink:0}
.pill.active .pill-dot{border-color:var(--blue);background:var(--blue)}
.btn-primary{background:var(--blue);color:white;border:none;border-radius:8px;padding:11px 22px;font-size:13px;font-weight:700;cursor:pointer}
.btn-ghost{background:transparent;color:var(--t2);border:1.5px solid var(--border);border-radius:8px;padding:11px 22px;font-size:13px;font-weight:600;cursor:pointer}
.print-btn{display:flex;align-items:center;gap:6px;background:transparent;color:var(--t2);border:1.5px solid var(--border);border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer}
.print-btn:hover{border-color:var(--blue);color:var(--blue)}
.action-row{display:flex;gap:10px;margin-top:4px}
.bn-item{border-bottom:1px solid var(--border)}.bn-item:last-child{border-bottom:none}
.bn-head{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;cursor:pointer}
.bn-head:hover{background:var(--surface)}
.bn-qmark{width:21px;height:21px;border-radius:50%;background:var(--blue-soft);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--blue);flex-shrink:0;margin-top:1px;margin-right:5px}
.bn-q{font-size:13px;line-height:1.5;color:var(--blue);flex:1}
.bn-arr{color:var(--t3);font-size:14px;flex-shrink:0;margin-top:2px;transition:transform .2s}
.bn-body{padding:10px 13px 12px 44px;font-size:12.5px;line-height:1.7;color:var(--t2);background:var(--surface);border-top:1px solid var(--border);display:none}
.bn-body.open{display:block}
.watch-btn{margin-top:10px;display:flex;width:fit-content;align-items:center;gap:5px;border:1px solid var(--blue);border-radius:5px;padding:5px 12px;font-size:11px;font-weight:700;color:var(--blue);background:none;cursor:pointer}
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:11px}
.helper-card{background:var(--amber-soft);border:2px solid var(--amber);border-radius:10px;overflow:hidden;margin-bottom:18px}
.helper-head{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;background:var(--amber-mid)}
.helper-head:hover{background:#fde68a}
.helper-icon{font-size:18px;flex-shrink:0}
.helper-title{font-size:13px;font-weight:700;color:var(--amber-dark);flex:1}
.helper-toggle{font-size:11px;font-weight:600;color:var(--amber-dark);opacity:.7}
.helper-body{padding:16px;border-top:1.5px solid var(--amber);display:flex;flex-direction:column;gap:12px}
.result-banner{border-radius:10px;padding:20px 24px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.result-banner.accept{background:var(--green-soft);border:1.5px solid var(--green)}
.result-banner.reject{background:rgba(200,75,49,.07);border:1.5px solid var(--warn)}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.metric{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.metric-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:7px}
.metric-val{font-family:monospace;font-size:18px;font-weight:700;color:var(--t1)}
.metric-val.ok{color:var(--green)}.metric-val.bad{color:var(--warn)}
.metric-sub{font-size:10px;color:var(--t3);margin-top:3px}
.chart-box{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:18px}
.chart-title{font-size:14px;font-weight:700;color:var(--t2);margin-bottom:6px}
.chart-sub{font-size:11px;color:var(--t3);margin-bottom:12px}
.collapsible{background:var(--panel);border:1px solid var(--border);border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:14px;overflow:hidden}
.coll-head{padding:12px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.coll-head:hover{background:var(--surface)}
.coll-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t2)}
.coll-arr{color:var(--t3);font-size:14px;transition:transform .2s}
.coll-body{display:none;border-top:1px solid var(--border)}.coll-body.open{display:block}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{padding:8px 14px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);border-bottom:1px solid var(--border);white-space:nowrap;background:var(--surface)}
th.left{text-align:left}
td{padding:8px 14px;text-align:right;font-family:monospace;border-bottom:1px solid var(--border)}
td.left{text-align:left;font-family:inherit;color:var(--t1)}
td.sub{text-align:left;font-family:inherit;color:var(--t3);font-size:11px}
td.neg{color:var(--warn)}
tr.total-row td{font-weight:700;background:var(--surface)}
tr:nth-child(even){background:var(--surface)}
tr.highlight td{background:var(--blue-soft)!important;font-weight:700;color:var(--blue)}
.modal-overlay{position:fixed;inset:0;background:rgba(15,29,46,.82);z-index:9999;display:flex;align-items:center;justify-content:center}
.modal-box{background:white;border-radius:10px;overflow:hidden;width:min(820px,95vw)}
.modal-head{padding:11px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.modal-close{font-size:22px;color:var(--t3);line-height:1;cursor:pointer}
.video-wrap{position:relative;padding-bottom:56.25%;height:0}
.video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%}
@media print{
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  html,body{margin:0;padding:0;background:white}
  #masthead{position:static!important;height:auto!important;padding:8px 0!important}
  #stepper,.btn-ghost,.print-btn,.coll-arr{display:none!important}
  .page-grid,.p2-grid{display:block!important}
  aside{display:none!important}
  .coll-body{display:block!important}
  .coll-head{break-after:avoid!important}
  .result-banner,.metric,.chart-box,.collapsible,.helper-card{box-shadow:none!important;border:1px solid #ccc!important;break-inside:avoid}
  table{font-size:9px;table-layout:fixed}
  th,td{padding:3px 5px}
  thead{display:table-header-group}
  tr{break-inside:avoid}
  @page{margin:0.5in;size:landscape}
}

/* US-specific additions */
.macrs-panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;margin-bottom:18px}
.macrs-class-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.macrs-class-btn{padding:12px 16px;border:none;background:var(--surface);border-bottom:1px solid var(--border);border-right:1px solid var(--border);text-align:left;cursor:pointer;transition:all .15s}
.macrs-class-btn:hover{background:var(--blue-soft)}
.macrs-class-btn.active{background:var(--blue-soft);border-left:3px solid var(--blue)}
.macrs-class-label{font-size:13px;font-weight:700;color:var(--t1)}
.macrs-class-sub{font-size:10px;color:var(--t3);margin-top:2px}
.bonus-toggle{display:flex;align-items:center;gap:10px;padding:14px 18px;background:var(--green-soft);border-radius:8px;border:1.5px solid var(--green)}
#model-banner {
  background: var(--blue);
  color: white;
  text-align: center;
  padding: 10px 28px;
  font-size: 14px;
  font-weight: 600;
  font-family: Georgia, serif;
  font-style: italic;
  letter-spacing: 0.01em;
  border-bottom: 2px solid rgba(255,255,255,0.12);
}

.model-overview {
  background: var(--amber-soft);
  border: 1.5px solid var(--amber);
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 18px;
  font-size: 13px;
  color: var(--amber-dark);
  line-height: 1.6;
}
.model-overview strong { color: var(--amber-dark); }
</style>
</head>
<body>
<div id="masthead">
  <div class="logo"><div class="logo-icon"><svg viewBox="0 0 18 18" width="18" height="18" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,10 7,14 15,4"/></svg></div><div class="logo-text">Cap<span>Plan</span></div></div>
  <div class="module-name">Implied Cost of Leasing <span style="opacity:.6;font-weight:500">— US</span></div>
  <div style="position:relative"><button style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:5px;padding:6px 12px;color:white;font-size:12px;font-weight:600">$ USD</button></div>
</div>
<div id="model-banner">What is this lease actually costing us as a financing rate?</div>
<div id="stepper">
  <div class="step active" id="step1"><div class="step-num" id="sn1">1</div><div class="step-label">Asset &amp; Lease</div></div>
  <div class="step-sep">›</div>
  <div class="step" id="step2"><div class="step-num" id="sn2">2</div><div class="step-label">Results</div></div>
</div>
<div id="main-content"></div>
<script>
// ============================================================================
// CapPlan MACRS Data Layer
// Source: IRS Revenue Procedure 87-57, IRS Publication 946 (Appendix A, Table A-1)
// Last verified: June 2026
// These percentage tables are fixed by Rev. Proc. 87-57 and have not changed
// since 1987. What changes periodically is tax policy layered on top (bonus
// depreciation, Section 179 limits) — handled separately below.
// ============================================================================

// ── GDS MACRS PERCENTAGE TABLES (Half-Year Convention) ──────────────────────
// Each array entry is [year, percentage] for years 1 through N+1
// (the half-year convention creates one extra recovery year for all classes)
// Source: IRS Publication 946, Appendix A, Table A-1

var MACRS_TABLES = {
  "3-year": {
    label: "3-Year Property (200% DB)",
    method: "200% Declining Balance",
    examples: "Tractor units (over-the-road), qualified rent-to-own property",
    rates: [33.33, 44.45, 14.81, 7.41]  // 4 rows: years 1-3 + half-year tail
  },
  "5-year": {
    label: "5-Year Property (200% DB)",
    method: "200% Declining Balance",
    examples: "Automobiles, taxis, buses, trucks, computers, office machinery, appliances",
    rates: [20.00, 32.00, 19.20, 11.52, 11.52, 5.76]  // 6 rows
  },
  "7-year": {
    label: "7-Year Property (200% DB)",
    method: "200% Declining Balance",
    examples: "Office furniture & fixtures, agricultural machinery, railroad track",
    rates: [14.29, 24.49, 17.49, 12.49, 8.93, 8.92, 8.93, 4.46]  // 8 rows
  },
  "10-year": {
    label: "10-Year Property (200% DB)",
    method: "200% Declining Balance",
    examples: "Vessels, barges, tugs, single-purpose agricultural structures, fruit/nut trees",
    rates: [10.00, 18.00, 14.40, 11.52, 9.22, 7.37, 6.55, 6.55, 6.56, 6.55, 3.28]  // 11 rows
  },
  "15-year": {
    label: "15-Year Property (150% DB)",
    method: "150% Declining Balance",
    examples: "Land improvements (fences, roads, sidewalks, landscaping), qualified leasehold improvements, retail motor fuels outlets",
    rates: [5.00, 9.50, 8.55, 7.70, 6.93, 6.23, 5.90, 5.90, 5.91, 5.90, 5.91, 5.90, 5.91, 5.90, 5.91, 2.95]  // 16 rows
  },
  "20-year": {
    label: "20-Year Property (150% DB)",
    method: "150% Declining Balance",
    examples: "Farm buildings (not single-purpose), municipal sewers, initial land clearing/grading",
    rates: [3.750, 7.219, 6.677, 6.177, 5.713, 5.285, 4.888, 4.522, 4.462, 4.461,
            4.462, 4.461, 4.462, 4.461, 4.462, 4.461, 4.462, 4.461, 4.462, 4.461, 2.231]  // 21 rows
  },
  "27.5-year": {
    label: "27.5-Year Residential Rental Property (SL)",
    method: "Straight-Line / Mid-Month Convention",
    examples: "Residential rental property (apartments, houses) where 80%+ of income is from dwelling units",
    // Full-year rate = 3.636%. First/last year prorated by month placed in service.
    // For simplicity in capital planning (not tax filing), use the full-year rate.
    fullYearRate: 3.636,
    convention: "mid-month",
    rates: null  // computed dynamically based on month placed in service
  },
  "39-year": {
    label: "39-Year Nonresidential Real Property (SL)",
    method: "Straight-Line / Mid-Month Convention",
    examples: "Office buildings, stores, warehouses, commercial buildings",
    fullYearRate: 2.564,
    convention: "mid-month",
    rates: null  // computed dynamically based on month placed in service
  }
};

// ── ASSET-TO-PROPERTY-CLASS LOOKUP ─────────────────────────────────────────
// Based on IRS Publication 946, Table B-1 and Table B-2
// Grouped by common small business asset categories for the dropdown
// Users can always override; this is a starting-point suggestion only.
// Last updated: June 2026

var MACRS_ASSET_CLASSES = [
  // ── Vehicles & Transportation ──────────────────────────────────────────────
  { name: "— Select asset type for suggested property class —", class: null, note: null },
  { group: "Vehicles & Transportation" },
  { name: "Automobile / Passenger Car", class: "5-year",
    note: "IRS Table B-1 class 00.22. Subject to listed property luxury auto limits." },
  { name: "Light-Duty Truck / Van (≤ 6,000 lbs GVW)", class: "5-year",
    note: "IRS Table B-1 class 00.22. Subject to listed property limits." },
  { name: "Heavy Truck / Commercial Vehicle (> 6,000 lbs)", class: "5-year",
    note: "IRS Table B-1 class 00.23. Not subject to luxury auto limits." },
  { name: "Tractor Unit (over-the-road)", class: "3-year",
    note: "IRS Table B-1 class 00.26." },
  { name: "Trailer / Container", class: "5-year",
    note: "IRS Table B-1 class 00.27." },
  { name: "Aircraft (general aviation)", class: "5-year",
    note: "IRS Table B-2. May be listed property if personal use > 0." },
  { name: "Vessel / Barge / Tug", class: "10-year",
    note: "IRS Table B-1 class 00.28." },
  // ── Computers & Technology ─────────────────────────────────────────────────
  { group: "Computers & Technology" },
  { name: "Computer / Laptop / Tablet", class: "5-year",
    note: "IRS Table B-1 class 00.12. Listed property — business use must be > 50%." },
  { name: "Computer Peripheral / Printer", class: "5-year",
    note: "IRS Table B-1 class 00.12." },
  { name: "Point-of-Sale System / POS Hardware", class: "5-year",
    note: "IRS Table B-1 class 00.12." },
  { name: "Telephone / Communications Equipment", class: "5-year",
    note: "IRS class 00.12. Cell phones no longer listed property after 2010." },
  // ── Office Equipment & Furniture ───────────────────────────────────────────
  { group: "Office Equipment & Furniture" },
  { name: "Office Furniture & Fixtures", class: "7-year",
    note: "IRS Table B-1 class 00.11." },
  { name: "Office Equipment (copiers, fax machines)", class: "5-year",
    note: "IRS Table B-1 class 00.12." },
  { name: "Appliances / Carpeting / Furniture (rental)", class: "5-year",
    note: "Used in residential rental property; IRS Table B-1." },
  // ── Manufacturing & Industrial ─────────────────────────────────────────────
  { group: "Manufacturing & Industrial" },
  { name: "Manufacturing Machinery & Equipment", class: "7-year",
    note: "IRS Table B-2 (varies by industry). 7-year is the default for unclassified property." },
  { name: "Industrial Steam / Electric Generation Equipment", class: "15-year",
    note: "IRS Table B-1 class 00.4." },
  { name: "Distributive Trades / Services Equipment", class: "5-year",
    note: "IRS Table B-2 class 57.0. Includes restaurant/food service equipment." },
  // ── Restaurant & Food Service ──────────────────────────────────────────────
  { group: "Restaurant & Food Service" },
  { name: "Restaurant Equipment (ovens, fryers, refrigerators)", class: "5-year",
    note: "IRS Table B-2 class 57.0 (distributive trades and services)." },
  { name: "Restaurant Furniture / Fixtures", class: "7-year",
    note: "IRS Table B-1 class 00.11. Chairs, tables, bar stools." },
  // ── Agriculture ────────────────────────────────────────────────────────────
  { group: "Agriculture" },
  { name: "Agricultural Machinery & Equipment", class: "7-year",
    note: "IRS Table B-2 class 01.1." },
  { name: "Single-Purpose Agricultural / Horticultural Structure", class: "10-year",
    note: "IRS Table B-1. Structure used only for a specific agricultural purpose." },
  { name: "Farm Building (general-purpose)", class: "20-year",
    note: "IRS Table B-2 class 01.3. Excludes single-purpose structures." },
  { name: "Fruit / Nut-Bearing Trees & Vines", class: "10-year",
    note: "IRS Table B-2 class 01.23–01.25. Placed in service after planting/grafting." },
  // ── Real Property ──────────────────────────────────────────────────────────
  { group: "Real Property" },
  { name: "Residential Rental Property", class: "27.5-year",
    note: "Apartments, houses, mobile homes where 80%+ of rent is from dwelling units. Straight-line, mid-month convention." },
  { name: "Nonresidential Real Property", class: "39-year",
    note: "Office buildings, retail stores, warehouses. Straight-line, mid-month convention." },
  { name: "Qualified Improvement Property (QIP)", class: "15-year",
    note: "Interior improvements to nonresidential buildings placed in service after building. Eligible for bonus depreciation." },
  { name: "Land Improvements (fences, roads, parking lots, landscaping)", class: "15-year",
    note: "IRS Table B-1 class 00.3. Excludes land itself (not depreciable)." },
  // ── HVAC & Mechanical ──────────────────────────────────────────────────────
  { group: "HVAC & Mechanical Systems" },
  { name: "HVAC System (standalone / not structural)", class: "5-year",
    note: "Freestanding units qualify as 5-year. HVAC installed as part of a building = 39-year. Qualified improvement property rules may apply." },
  { name: "HVAC as Qualified Improvement Property", class: "15-year",
    note: "HVAC, roofing, fire protection, alarm/security systems in nonresidential buildings. Eligible for bonus depreciation." },
  // ── Other Common Assets ────────────────────────────────────────────────────
  { group: "Other Common Assets" },
  { name: "Rental Property / Any Property Not Listed Above", class: "7-year",
    note: "IRS default: property with no designated class life defaults to 7-year under MACRS GDS." },

// Get MACRS depreciation schedule for a given property class and cost
// Returns array of {year, rate, amount} for each recovery year
function getMACRSSchedule(propertyClass, cost, bonusElected, monthPlacedInService) {
  var table = MACRS_TABLES[propertyClass];
  if (!table) return [];

  // Bonus depreciation (year 1 full expensing if elected)
  if (bonusElected && table.convention !== "mid-month") {
    return [{ year: 1, rate: 100.00, amount: cost }];
  }

  // Real property: straight-line with mid-month convention
  if (table.convention === "mid-month") {
    var schedule = [];
    var fullRate = table.fullYearRate / 100;
    var life = propertyClass === "27.5-year" ? 27.5 : 39;
    var month = monthPlacedInService || 1;  // default to January
    // First year: prorated by month (mid-month: months remaining + 0.5)
    var firstYearMonths = (12 - month + 0.5) / 12;
    var firstYearRate = firstYearMonths / life;
    schedule.push({ year: 1, rate: +(firstYearRate * 100).toFixed(3), amount: cost * firstYearRate });
    // Full years
    var fullYears = Math.floor(life);
    for (var y = 2; y <= fullYears; y++) {
      schedule.push({ year: y, rate: table.fullYearRate, amount: cost * fullRate });
    }
    // Last partial year (remaining months)
    var lastYearMonths = 1 - firstYearMonths;
    if (lastYearMonths > 0.001) {
      var lastRate = lastYearMonths / life;
      schedule.push({ year: fullYears + 1, rate: +(lastRate * 100).toFixed(3), amount: cost * lastRate });
    }
    return schedule;
  }

  // Standard MACRS table lookup (personal property, half-year convention)
  var rates = table.rates;
  return rates.map(function(rate, i) {
    return { year: i + 1, rate: rate, amount: +(cost * rate / 100).toFixed(2) };
  });
}

}

function calcDeprSchedule(price){
  var base=Math.max(0,price-(+S.section179||0));
  if(!S.propertyClass)return[];
  return getMACRSSchedule(S.propertyClass,base,S.bonusElected,1);
}
function pvPurchase(price,life,salvage,depr,tx,r){
  var s179=+S.section179||0;
  var pvS179=s179*tx/(1+r);
  var pvTS=depr.reduce(function(s,d){return s+d.amount*tx/Math.pow(1+r,d.year)},0);
  var totalDepr=depr.reduce(function(s,d){return s+d.amount},0)+s179;
  var remainBasis=Math.max(0,price-totalDepr);
  var recapTax=Math.max(0,(salvage-remainBasis)*tx);
  var pvSalv=(salvage-recapTax)/Math.pow(1+r,life);
  return price-pvS179-pvTS-pvSalv;
}
function pvLease(term,depAmt,freq,leasePmt,tx,r){
  var rp=Math.pow(1+r,1/freq)-1;
  var totalN=term*freq;
  var hasDep=S.deposit&&depAmt>0;
  var n=hasDep?(totalN-1):totalN;
  var afPmt=rp>0&&n>0?(1-Math.pow(1+rp,-n))/rp:n;
  var pvDep=hasDep?depAmt:0;
  var pvDepTS=hasDep?-depAmt*tx/(1+r):0;
  var pvPmts=leasePmt*afPmt;
  var pvPmtTS=-leasePmt*tx*((1-Math.pow(1+r,-term))/r);
  return pvDep+pvDepTS+pvPmts+pvPmtTS;
}
function solveImpliedRate(price,life,salvage,depAmt,freq,leasePmt,term){
  // Pre-tax implied rate: rate at which PV(lease cash flows) = price - PV(salvage)
  var lo=0.001,hi=5.0,mid;
  for(var i=0;i<120;i++){
    mid=(lo+hi)/2;
    var rp=Math.pow(1+mid,1/freq)-1;
    var n=term*freq;
    var af=rp>0?(1-Math.pow(1+rp,-n))/rp:n;
    var hasDep=S.deposit&&depAmt>0;
    var pvL=hasDep?depAmt+leasePmt*af-depAmt/Math.pow(1+mid,term):leasePmt*af;
    var pvP=price-salvage/Math.pow(1+mid,term);
    if(pvL>pvP)lo=mid;else hi=mid;
  }
  return mid*100;
}
function calcAll(){
  var price=+S.price,life=+S.life||1,salvage=+S.salvage||0;
  var term=+S.term||life,pmt=+S.leasePmt,freq=+S.freq;
  var depAmt=S.deposit?(+S.depositAmt||0):0;
  var tx=+S.taxRate/100,borrow=+S.borrowRate;
  var depr=calcDeprSchedule(price);
  var implied=solveImpliedRate(price,life,salvage,depAmt,freq,pmt,term);
  var diff=implied-borrow;
  var pmtSens=[-0.4,-0.3,-0.2,-0.1,0,0.1,0.2,0.3,0.4].map(function(delta){
    var p2=pmt*(1+delta);
    var ir=solveImpliedRate(price,life,salvage,depAmt,freq,p2,term);
    return{delta:delta,pmt:p2,ir:ir};
  });
  return{implied:implied,diff:diff,depr:depr,pmtSens:pmtSens};
}

  html+=field("Tax Rate",uInput("",S.taxRate,"inp-tax","S.taxRate=+this.value||0","%"));
  html+=field("Your Borrowing Rate",uInput("",S.borrowRate,"inp-borrow","S.borrowRate=+this.value||0","%"),false,true,"Pre-tax — used as the comparison benchmark");
  html+='</div></div>';
  if(S.missingFields&&S.missingFields.length>0)html+='<div style="background:rgba(200,75,49,.07);border:1.5px solid var(--warn);border-radius:8px;padding:12px 16px;margin-bottom:14px;font-size:13px;color:var(--warn)"><strong>Please complete:</strong> '+S.missingFields.join(", ")+'.</div>';
  html+='<div class="action-row" style="justify-content:space-between;align-items:center"><span style="font-size:11.5px;color:var(--t3)">New here? Try <strong style="color:var(--t2)">Load Example</strong></span><div style="display:flex;gap:10px"><button class="btn-ghost" onclick="loadExample()">Load Example</button><button class="btn-ghost" onclick="resetInputs()">Reset</button><button class="btn-primary" onclick="goToResults()">Calculate ›</button></div></div>';
  html+='</main></div></div>';
  document.getElementById("main-content").innerHTML=html;
  makeBNList(NOTES1,"bn-list1");renderCoC();
  var as=document.getElementById("asset-type-sel");if(as)as.value=S.assetTypeSel||"";
}
function renderPage2(){
  var res=S.res;var expensive=res.implied>+S.borrowRate;
  var freqLabel={1:"year",4:"quarter",12:"month"}[+S.freq]||"period";
  var html='<div class="page"><div class="p2-grid"><aside><div class="section-label">Understanding Results</div><div class="panel" style="margin-bottom:14px"><div id="bn-list2"></div></div><div style="display:flex;flex-direction:column;gap:10px"><button class="btn-ghost" onclick="S.page=1;render()">&#8249; Edit Inputs</button><button class="print-btn" onclick="printSummary()">&#128438; Print</button></div></aside><main>';
  html+='<div style="border-radius:10px;padding:20px 24px;margin-bottom:18px;background:'+(expensive?"rgba(200,75,49,.07)":"var(--green-soft)")+';border:1.5px solid '+(expensive?"var(--warn)":"var(--green)")+';display:flex;align-items:center;justify-content:space-between;gap:20px"><div><div style="font-family:Georgia,serif;font-size:22px;color:'+(expensive?"var(--warn)":"var(--green)")+';line-height:1.3">'+(expensive?"This lease costs more than borrowing to buy.":"This lease is cheaper than borrowing to buy.")+'</div><div style="font-size:13px;color:var(--t2);margin-top:8px;line-height:1.6">Implied rate: <strong>'+fmt(res.implied,2)+'%</strong> vs your borrowing rate of '+S.borrowRate+'% — a difference of <strong>'+fmt(Math.abs(res.diff),2)+' percentage points</strong>.</div></div><div style="background:'+(expensive?"var(--warn)":"var(--green)")+';border-radius:10px;padding:14px 20px;text-align:center;flex-shrink:0"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.75)">Implied Rate</div><div style="font-family:monospace;font-size:26px;font-weight:800;color:white;margin-top:4px">'+fmt(res.implied,2)+'%</div></div></div>';
  html+='<div class="metrics"><div class="metric"><div class="metric-label">Implied Lease Rate</div><div class="metric-val '+(expensive?"warn":"good")+'">'+fmt(res.implied,2)+'%</div><div class="metric-sub">Effective financing rate</div></div><div class="metric"><div class="metric-label">Your Borrowing Rate</div><div class="metric-val">'+S.borrowRate+'%</div><div class="metric-sub">Benchmark</div></div><div class="metric"><div class="metric-label">Difference</div><div class="metric-val '+(expensive?"warn":"good")+'">'+fmt(Math.abs(res.diff),2)+'pp</div><div class="metric-sub">'+(expensive?"Above — lease costs more":"Below — lease costs less")+'</div></div></div>';
  html+='<div class="collapsible"><div class="coll-head" onclick="S.show_pmt_sens=!S.show_pmt_sens;renderPage2()"><span class="coll-title">Payment Sensitivity</span><span class="coll-arr" style="transform:'+(S.show_pmt_sens?'rotate(90deg)':'rotate(0deg)')+'">&#8250;</span></div>';
  if(S.show_pmt_sens){
    html+='<div class="coll-body open"><table><thead><tr><th class="left">Payment/'+freqLabel+'</th><th>Implied Rate</th><th>vs Borrowing Rate</th></tr></thead><tbody>';
    res.pmtSens.forEach(function(row){var isCur=Math.abs(row.delta)<0.001;var exp=row.ir>+S.borrowRate;html+='<tr'+(isCur?' class="highlight"':'')+'><td class="left">'+(isCur?"&#9733; ":"")+fmtM(row.pmt)+'</td><td style="color:'+(exp?"var(--warn)":"var(--green)")+'">'+fmt(row.ir,2)+'%</td><td style="color:'+(exp?"var(--warn)":"var(--green)")+'">'+(exp?"+":"")+fmt(row.ir-(+S.borrowRate),2)+'pp</td></tr>';});
    html+='</tbody></table></div>';
  }
  html+='</div>';
  html+='<div class="collapsible"><div class="coll-head" onclick="S.show_depr=!S.show_depr;renderPage2()"><span class="coll-title">MACRS Schedule (Purchase Benchmark)</span><span class="coll-arr" style="transform:'+(S.show_depr?'rotate(90deg)':'rotate(0deg)')+'">&#8250;</span></div>';
  if(S.show_depr){
    html+='<div class="coll-body open"><table><thead><tr><th class="left">Year</th><th>Depreciation</th><th>Tax Shield</th></tr></thead><tbody>';
    var tx=+S.taxRate/100;
    res.depr.forEach(function(d){html+='<tr><td class="left">'+d.year+'</td><td>'+fmtM(d.amount)+'</td><td>'+fmtM(d.amount*tx)+'</td></tr>';});
    html+='</tbody></table></div>';
  }
  html+='</div></main></div></div>';
  document.getElementById("main-content").innerHTML=html;
  makeBNList(NOTES2,"bn-list2");
}
function printSummary(){var a=S.show_pmt_sens,b=S.show_depr;S.show_pmt_sens=true;S.show_depr=true;renderPage2();setTimeout(function(){window.print();S.show_pmt_sens=a;S.show_depr=b;renderPage2();},300);}
function render(){updateStepper();if(S.page===1)renderPage1();else if(S.page===2&&S.res)renderPage2();}
render();

</script>
