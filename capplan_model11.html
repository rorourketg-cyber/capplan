<body>
<div id="masthead">
  <div class="logo"><div class="logo-icon"><svg viewBox="0 0 18 18" width="18" height="18" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,10 7,14 15,4"/></svg></div><div class="logo-text">Cap<span>Plan</span></div></div>
  <div class="module-name">Implied Cost of Leasing</div>
  <div style="position:relative">
    <button style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:5px;padding:6px 12px;color:white;font-size:12px;font-weight:600" id="cur-btn" onclick="toggleCur()"><span id="cur-label">$ USD</span> ▾</button>
    <div id="cur-dropdown" style="display:none;position:absolute;right:0;top:110%;background:white;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(15,29,46,.16);min-width:200px;z-index:300;overflow:hidden"></div>
  </div>
</div>
<div id="model-banner">What is this lease actually costing us as a financing rate?</div>
<div id="stepper">
  <div class="step active" id="step1"><div class="step-num" id="sn1">1</div><div class="step-label">Asset &amp; Lease Details</div></div>
  <div class="step-sep">›</div>
  <div class="step" id="step2"><div class="step-num" id="sn2">2</div><div class="step-label">Results</div></div>
</div>
<div id="main-content"></div>
<script>
var CURRENCIES=[{code:"USD",symbol:"$",label:"US Dollar"},{code:"EUR",symbol:"€",label:"Euro"},{code:"JPY",symbol:"¥",label:"Japanese Yen"},{code:"GBP",symbol:"£",label:"British Pound"},{code:"INR",symbol:"₹",label:"Indian Rupee"},{code:"CHF",symbol:"CHF",label:"Swiss Franc"},{code:"CAD",symbol:"CA$",label:"Canadian Dollar"},{code:"AUD",symbol:"AU$",label:"Australian Dollar"},{code:"NZD",symbol:"NZ$",label:"New Zealand Dollar"}];
function getSym(){var c=CURRENCIES.find(function(c){return c.code===S.currency});return c?c.symbol:"$"}

var S={
  page:1,currency:"USD",cur_open:false,  coc_open:false,coc_mode:"wacc",coc_kd:6,coc_ke:12,coc_wd:40,coc_rf:4.5,coc_beta:1.0,coc_mrp:5.5,
  res:null,show_dcf:false,show_pmt_sens:false,missingFields:null,
  price:"",itcPct:"",life:"",salvage:"",method:"Double-declining",hyr:true,ddbRate:"",
  term:"",deposit:true,depositAmt:"",freq:1,leasePmt:"",
  taxRate:"",borrowRate:""
};

function toggleCur(){
  S.cur_open=!S.cur_open;var dd=document.getElementById("cur-dropdown");dd.style.display=S.cur_open?"block":"none";
  if(S.cur_open){dd.innerHTML="";CURRENCIES.forEach(function(c){var b=document.createElement("button");b.style.cssText="display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;background:"+(c.code===S.currency?"var(--blue-soft)":"transparent")+";border:none;border-bottom:1px solid var(--border);cursor:pointer";b.innerHTML='<span style="font-family:monospace;font-size:13px;font-weight:700;color:var(--blue);width:36px">'+c.symbol+'</span><span>'+c.label+'</span>';b.onclick=function(){S.currency=c.code;S.cur_open=false;render()};dd.appendChild(b);});}
}

// ── CALC ──────────────────────────────────────────────────────────────────────
function calcDepr(base,life,method,hyr,ddbRate){
  var d=[];
  if(method==="Double-declining"){var rate=ddbRate/100;d.push(base*rate*(hyr?0.5:1));for(var y=2;y<=life;y++)d.push((base-d.reduce(function(s,v){return s+v},0))*rate);}
  else if(method==="Straight-line"){var y1=base/life*(hyr?0.5:1);d.push(y1);for(var y=2;y<=life;y++)d.push(hyr?(base-y1)/(life-1):base/life);}
  return d;
}

function pvPurchase(price,itcPct,life,method,hyr,ddbRate,salvage,taxRate,r){
  var tx=taxRate/100;var itc=price*itcPct/100;var base=price-itc;
  var depr=calcDepr(base,life,method,hyr,ddbRate);
  var pvITC=-itc/(1+r);
  var pvTS=-depr.reduce(function(s,d,i){return s+d*tx/Math.pow(1+r,i+1)},0);
  var pvSalv=-salvage/Math.pow(1+r,life);
  var pvLoss=salvage*tx/Math.pow(1+r,life);
  return price+pvITC+pvTS+pvSalv+pvLoss;
}

function pvLease(term,deposit,depAmt,pmt,freq,taxRate,r){
  var tx=taxRate/100;
  var rp=Math.pow(1+r,1/freq)-1;
  var totalN=term*freq;var hasDep=deposit&&depAmt>0;
  var n=hasDep?(totalN-1):totalN;
  var afPmt=rp>0&&n>0?(1-Math.pow(1+rp,-n))/rp:n;
  var pvDep=hasDep?depAmt:0;
  var pvDepTS=hasDep?-depAmt*tx/(1+r):0;
  var pvPmts=pmt*afPmt;
  var pvPmtTS=-pmt*tx*afPmt/(1+r);
  return pvDep+pvDepTS+pvPmts+pvPmtTS;
}

function solveImpliedRate(price,salvage,term,deposit,depAmt,pmt,freq){
  // Pre-tax implied rate: rate at which PV of lease cash flows = price - PV(salvage)
  var lo=0.000001,hi=5.0,mid;
  for(var i=0;i<120;i++){
    mid=(lo+hi)/2;
    var rp=Math.pow(1+mid,1/freq)-1;
    var n=term*freq;
    var af=rp>0?(1-Math.pow(1+rp,-n))/rp:n;
    var hasDep=deposit&&depAmt>0;
    var pvL=hasDep?depAmt+pmt*af-depAmt/Math.pow(1+mid,term):pmt*af;
    var pvP=price-salvage/Math.pow(1+mid,term);
    if(pvL>pvP)lo=mid;else hi=mid;
  }
  return mid*100;
}

function calcAll(){
  var price=+S.price,itcPct=+S.itcPct||0,life=+S.life||1,salvage=+S.salvage||0;
  var ddbRate=+S.ddbRate,term=+S.term||life,pmt=+S.leasePmt,freq=+S.freq;
  var depAmt=S.deposit?(+S.depositAmt||0):0;
  var taxRate=+S.taxRate||0,borrow=+S.borrowRate||0;
  
  var implied=solveImpliedRate(price,salvage,term,S.deposit,depAmt,pmt,freq);
  var r=implied/100;
  var pvP=pvPurchase(price,itcPct,life,S.method,S.hyr,ddbRate,salvage,taxRate,r,false);
  var pvL=pvLease(term,S.deposit,depAmt,pmt,freq,taxRate,r,false);

  // Sensitivity: implied rate vs lease payment
  var pmtSens=[-0.40,-0.30,-0.20,-0.10,0,0.10,0.20,0.30,0.40].map(function(delta){
    var p2=pmt*(1+delta);
    var ir=solveImpliedRate(price,itcPct,life,S.method,S.hyr,ddbRate,salvage,term,S.deposit,depAmt,p2,freq,taxRate,false);
    return{pmt:p2,rate:ir};
  });

  var depr=false?[]:calcDepr(price-price*itcPct/100,life,S.method,S.hyr,ddbRate);
  return{implied:implied,pvPurchase:pvP,pvLease:pvL,borrow:borrow,
    decision:implied>borrow?"borrow":"lease",pmtSens:pmtSens,depr:depr,
    itc:price*itcPct/100};
}

function fmt(n,d){if(n==null||isNaN(n))return"--";d=d||0;return n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d})}
function fmtM(n){if(n==null||isNaN(n))return"--";var s=getSym();return n<0?"-"+s+fmt(Math.abs(n)):s+fmt(n)}

function updateStepper(){
  for(var i=1;i<=2;i++){var step=document.getElementById("step"+i),sn=document.getElementById("sn"+i);step.className="step";if(i<S.page){step.classList.add("done");sn.textContent="✓"}else if(i===S.page){step.classList.add("active");sn.textContent=String(i)}else sn.textContent=String(i);var n=i;(function(n,step){step.onclick=function(){if(n<S.page||(n===2&&S.res)){S.page=n;render()}}})(n,step);step.style.cursor=(i<S.page||(i===2&&S.res))?"pointer":"default";}
}

var NOTES_BUS=[
  {q:"What does this model tell me?",a:"This model calculates the implied interest rate embedded in a lease contract — the rate at which the present value of your outflows under leasing equals your outflows under purchasing. Comparing this rate to your own borrowing cost tells you which option is financially better.",v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"How do I use the implied rate to make a decision?",a:"If the implied lease rate is higher than your borrowing rate, you should borrow and purchase — the lease is charging more for financing than you would pay at the bank. If the implied rate is lower than your borrowing rate, leasing is the cheaper financing option. This analysis focuses purely on the financing cost; other factors like maintenance, flexibility, and credit access may also influence your decision.",v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"What is the purchase option PV?",a:"The purchase option PV is the present value of all outflows if you buy the asset — the purchase price less the present value of the ITC, depreciation tax shields, and net salvage value, all discounted at the implied rate. This is set equal to the lease option PV at the implied rate by definition.",v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"What does the lease payment sensitivity chart tell me?",a:"The chart shows how the implied financing rate changes as the lease payment varies. Higher payments embed a higher implied rate; lower payments embed a lower rate. Use this to understand the range of payments at which leasing remains competitive with borrowing to purchase.",v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"},
  {q:"How do I calculate a cost of capital?",a:"Use the Cost of Capital Calculator on this page to estimate your WACC or CAPM rate. For this model, the relevant rate to compare against is your borrowing rate — the rate at which you could finance the purchase.",v:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"}

function validateInputs(){
  var errs=[];
  if(+S.price<=0) errs.push("Asset price must be greater than zero");
  if(+S.life<=0) errs.push("Asset life must be greater than zero");
  if(S.salvage!==''&&+S.salvage<0) errs.push("Salvage value cannot be negative");
  if(S.salvage!==''&&+S.salvage>=+S.price) errs.push("Salvage cannot equal or exceed the asset price");
  if(+S.term<=0) errs.push("Lease term must be greater than zero");
  if(+S.term>+S.life) errs.push("Lease term cannot exceed asset life");
  if(S.deposit&&+S.depositAmt<0) errs.push("Deposit amount cannot be negative");
  if(+S.leasePmt<=0) errs.push("Lease payment must be greater than zero");
  if(S.method==="Double-declining"&&!(+S.ddbRate>0)) errs.push("Depreciation rate must be greater than zero for double-declining method");
  if(+S.taxRate<0||+S.taxRate>=100) errs.push("Tax rate must be between 0 and 100");
  if(+S.borrowRate<=0) errs.push("Borrowing rate must be greater than zero");
  return errs;
}
function goToResults(){
  var missing=[];  if(!S.price)missing.push("Asset Price");
  if((S.itcPct===""||S.itcPct==null))missing.push("ITC");
  if(!S.life)missing.push("Economic Life");
  if((!S.salvage&&S.salvage!==0))missing.push("Salvage Value");
  if(S.method==="Double-declining"&&!S.ddbRate)missing.push("Depreciation Rate");
  if(!S.term)missing.push("Lease Term");
  if(S.deposit&&(!S.depositAmt&&S.depositAmt!==0))missing.push("Deposit Amount");
  if(!S.leasePmt)missing.push("Lease Payment");
  if(!S.taxRate)missing.push("Tax Rate");
  if(!S.borrowRate)missing.push("Borrowing Rate");
  if(missing.length>0){S.missingFields=missing;render();return;}
  S.missingFields=null;
  try{S.res=calcAll();S.page=2;render();}catch(e){alert("Error: "+e.message)}
}

function drawChart(canvasId,data,currentPmt){
  var canvas=document.getElementById(canvasId);if(!canvas)return;
  var ctx=canvas.getContext("2d"),W=canvas.width,H=canvas.height;
  var pad={top:16,bottom:48,left:60,right:16};var cw=W-pad.left-pad.right,ch=H-pad.top-pad.bottom;
  ctx.clearRect(0,0,W,H);
  var vals=data.map(function(d){return d.rate});
  var minV=Math.min.apply(null,vals),maxV=Math.max.apply(null,vals);
  var rng=maxV-minV||maxV*0.2;var lo=minV-rng*0.1,hi=maxV+rng*0.1;
  ctx.strokeStyle="#E2E6EC";ctx.lineWidth=1;
  for(var i=0;i<=4;i++){var y=pad.top+ch*(1-i/4);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cw,y);ctx.stroke();ctx.fillStyle="#8A96A6";ctx.font="10px system-ui";ctx.textAlign="right";ctx.fillText(fmt(lo+(hi-lo)*(i/4),1)+"%",pad.left-3,y+3);}
  var bw=Math.floor(cw/data.length*0.6),gap=cw/data.length,midIdx=Math.floor(data.length/2);
  data.forEach(function(d,i){var x=pad.left+gap*i+(gap-bw)/2,bh=(d.rate-lo)/(hi-lo)*ch,y=pad.top+ch-bh;ctx.fillStyle=i===midIdx?"#1B3F6E":"#93B4D8";ctx.fillRect(x,y,bw,bh);ctx.fillStyle=i===midIdx?"var(--blue)":"#8A96A6";ctx.font=i===midIdx?"bold 10px system-ui":"10px system-ui";ctx.textAlign="center";ctx.fillText(getSym()+fmt(d.pmt/1000,0)+"k",x+bw/2,H-pad.bottom+13);});
  ctx.strokeStyle="#4A5568";ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(pad.left,pad.top+ch);ctx.lineTo(pad.left+cw,pad.top+ch);ctx.stroke();
  ctx.fillStyle="#4A5568";ctx.font="bold 12px system-ui";ctx.textAlign="center";ctx.fillText("Lease Payment",pad.left+cw/2,H-3);
}

      var isCur=Math.abs(row.pmt-+S.leasePmt)<1;
      var diff=row.rate-res.borrow;
      html+='<tr'+(isCur?' class="highlight"':'')+'><td class="left">'+(isCur?"★ ":"")+fmtM(row.pmt)+'</td><td>'+fmt(row.rate,2)+'%</td><td>'+fmt(res.borrow,2)+'%</td><td style="color:'+(diff>0?"var(--warn)":"var(--green)")+'">'+( diff>0?"+":"")+fmt(diff,2)+'%</td><td class="left" style="font-weight:700;color:'+(diff>0?"var(--warn)":"var(--green)")+'\">'+(diff>0?"Borrow & buy":"Lease")+'</td></tr>';
    });
    html+='</tbody></table></div></div>';
  }
  html+='</div>';

  // DCF
  {
    html+='<div class="collapsible"><div class="coll-head" onclick="S.show_dcf=!S.show_dcf;renderPage2()"><span class="coll-title">DCF Detail at Implied Rate</span><span class="coll-arr" style="transform:'+(S.show_dcf?'rotate(90deg)':'rotate(0deg)')+'" >›</span></div>';
    if(S.show_dcf){
      var r=res.implied/100;
      html+='<div class="coll-body open"><div style="padding:12px 18px;font-size:12px;color:var(--t2)">At the implied rate of '+fmt(res.implied,2)+'%, present value of purchase outflows = present value of lease outflows = <strong>'+fmtM(res.pvPurchase)+'</strong></div>';
      html+='<table><thead><tr><th class="left">Component</th><th>Present Value</th></tr></thead><tbody>';
      html+='<tr class="total-row"><td class="left" colspan="1">Purchase Option</td><td></td></tr>';
      var itc=+S.price*+S.itcPct/100;
      var base=+S.price-itc;
      var pvITC=-itc/(1+r);
      var pvTS=-res.depr.reduce(function(s,d,i){return s+d*(+S.taxRate/100)/Math.pow(1+r,i+1)},0);
      var pvSalv=-+S.salvage/Math.pow(1+r,+S.life);
      var pvLoss=+S.salvage*(+S.taxRate/100)/Math.pow(1+r,+S.life);
      [["Asset cost","Year 0",+S.price],["Less: ITC","Year 1",pvITC],["Less: Depr tax shields","Yrs 1–"+S.life,pvTS],["Less: Salvage","Year "+S.life,pvSalv],["Plus: Loss of salv TS","Year "+S.life,pvLoss]].forEach(function(row){html+='<tr><td class="left">'+row[0]+'</td><td>'+fmtM(row[2])+'</td></tr>';});
      html+='<tr class="total-row"><td class="left">PV Purchase</td><td>'+fmtM(res.pvPurchase)+'</td></tr>';
      html+='<tr class="total-row"><td class="left" colspan="1">Lease Option</td><td></td></tr>';
      html+='<tr class="total-row"><td class="left">PV Lease (equals PV Purchase at implied rate)</td><td>'+fmtM(res.pvLease)+'</td></tr>';
      html+='</tbody></table></div>';
    }
    html+='</div>';
  }
  html+='</main></div></div>';
  document.getElementById("main-content").innerHTML=html;
  makeBNList(NOTES_BUS,"bn-list2");
  setTimeout(function(){drawChart("rate-chart",res.pmtSens,+S.leasePmt)},50);
  document.getElementById("cur-label").textContent=getSym()+" "+S.currency;
}

function printSummary(){
  var res=S.res;if(!res)return;
  var pd=S.show_pmt_sens,pd2=S.show_dcf;S.show_pmt_sens=true;S.show_dcf=true;renderPage2();
  setTimeout(function(){document.querySelectorAll('canvas').forEach(function(c){var img=document.createElement('img');img.src=c.toDataURL('image/png');img.style.cssText='width:100%;height:auto;display:block';c.parentNode.replaceChild(img,c);});window.print();S.show_pmt_sens=pd;S.show_dcf=pd2;renderPage2();},300);
}

function render(){updateStepper();if(S.page===1)renderPage1();else if(S.page===2&&S.res)renderPage2();var cl=document.getElementById("cur-label");if(cl)cl.textContent=getSym()+" "+S.currency;}
render();
</script>
</body>
</html>
